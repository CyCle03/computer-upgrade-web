<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>'컴퓨터 강화하기' 웹 복원판 대시보드</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React, ReactDOM, Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts Outfit & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Socket.io Client -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      font-family: 'Outfit', 'JetBrains Mono', sans-serif;
    }
    .neon-border-emerald {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.1);
    }
    .neon-border-rose {
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.4), inset 0 0 10px rgba(244, 63, 94, 0.2);
    }
    .neon-border-cyan {
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 10px rgba(6, 182, 212, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden selection:bg-emerald-500 selection:text-slate-950">

  <div id="root"></div>

  <!-- React UI 컴포넌트 마운트 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function App() {
      // ----------------------------------------------------------------------
      // 1. 핵심 유저 재화 및 강화 피드백 상태 정의
      // ----------------------------------------------------------------------
      const [minerals, setMinerals] = useState(() => {
        const saved = localStorage.getItem('sca_minerals');
        return saved !== null ? parseInt(saved, 10) : 2000;
      });
      const [normalCoins, setNormalCoins] = useState(() => {
        const saved = localStorage.getItem('sca_normalCoins');
        return saved !== null ? parseInt(saved, 10) : 50;
      });
      const [scaCoins, setScaCoins] = useState(() => {
        const saved = localStorage.getItem('sca_scaCoins');
        return saved !== null ? parseInt(saved, 10) : 0;
      });

      // 지능형 자동 구매 & 자동 강화 루프 토글 상태 신설
      const [autoBuyCpu, setAutoBuyCpu] = useState(() => localStorage.getItem('sca_autoBuyCpu') === 'true');
      const [autoBuyGpu, setAutoBuyGpu] = useState(() => localStorage.getItem('sca_autoBuyGpu') === 'true');
      const [autoBuyRam, setAutoBuyRam] = useState(() => localStorage.getItem('sca_autoBuyRam') === 'true');
      const [autoBuyCooler, setAutoBuyCooler] = useState(() => localStorage.getItem('sca_autoBuyCooler') === 'true');
      const [autoBuyStorage, setAutoBuyStorage] = useState(() => localStorage.getItem('sca_autoBuyStorage') === 'true');

      // 확률 강화 피드백 전용 상태
      const [upgradeStatus, setUpgradeStatus] = useState(null); // 'success', 'fail_keep', 'fail_drop', 'exploded', 'upgrading'
      const [upgradeMessage, setUpgradeMessage] = useState('');
      const [isUpgrading, setIsUpgrading] = useState(false);
      const [activeUpgradingPart, setActiveUpgradingPart] = useState(null);
      const [rebirthCount, setRebirthCount] = useState(() => {
        const saved = localStorage.getItem('sca_rebirthCount');
        return saved !== null ? parseInt(saved, 10) : 0;
      });

      // ----------------------------------------------------------------------
      // 2. 조립 컴퓨터 부품 상태 정의
      // ----------------------------------------------------------------------
      const [cpu, setCpu] = useState(() => {
        const saved = localStorage.getItem('sca_cpu');
        return saved !== null ? JSON.parse(saved) : { manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR4' };
      });
      const [gpu, setGpu] = useState(() => {
        const saved = localStorage.getItem('sca_gpu');
        return saved !== null ? JSON.parse(saved) : { level: 1 };
      });
      const [ram, setRam] = useState(() => {
        const saved = localStorage.getItem('sca_ram');
        return saved !== null ? JSON.parse(saved) : { level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' };
      });
      const [cooler, setCooler] = useState(() => {
        const saved = localStorage.getItem('sca_cooler');
        return saved !== null ? JSON.parse(saved) : { level: 1, coolingCapacity: 30 };
      });
      const [motherboard, setMotherboard] = useState(() => {
        const saved = localStorage.getItem('sca_motherboard');
        return saved !== null ? JSON.parse(saved) : { socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR4', shieldIncrease: 300 };
      });
      const [storage, setStorage] = useState(() => {
        const saved = localStorage.getItem('sca_storage');
        return saved !== null ? JSON.parse(saved) : { type: 'HDD', capacityGb: 250, level: 1 };
      });

      const [inventory, setInventory] = useState(() => {
        const saved = localStorage.getItem('sca_inventory');
        if (saved !== null) return JSON.parse(saved);
        return [
          { id: 'inv-cpu-1', type: 'cpu', level: 1, manufacturer: 'Intel', ddrGeneration: 'DDR4' },
          { id: 'inv-gpu-1', type: 'gpu', level: 1 },
          { id: 'inv-ram-1', type: 'ram', level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' },
          { id: 'inv-cooler-1', type: 'cooler', level: 1, coolingCapacity: 30 },
          { id: 'inv-storage-1', type: 'storage', level: 1, storageType: 'HDD', capacityGb: 250 }
        ];
      });

      // ----------------------------------------------------------------------
      // 3. 사냥터 및 다운로드 진행 상태 정의
      // ----------------------------------------------------------------------
      const [huntingGround, setHuntingGround] = useState(() => {
        const saved = localStorage.getItem('sca_huntingGround');
        return saved !== null ? JSON.parse(saved) : { name: '테이블 탑 조립소 (1단계)', multiplier: 1.0 };
      });
      const [isDownloading, setIsDownloading] = useState(false);
      const [downloadProgress, setDownloadProgress] = useState(0);
      const [downloadTarget, setDownloadTarget] = useState(() => {
        const saved = localStorage.getItem('sca_downloadTarget');
        return saved !== null ? JSON.parse(saved) : { name: '서버 랙 테마파크 (2단계)', sizeMb: 5000, requiredGb: 500, multiplier: 2.5 };
      });

      // ----------------------------------------------------------------------
      // 4. 실시간 소켓 멀티플레이 레이드 상태 정의
      // ----------------------------------------------------------------------
      const [isRaidOpen, setIsRaidOpen] = useState(false);
      const [socket, setSocket] = useState(null);
      const [raidState, setRaidState] = useState(null);
      const [rewardMessage, setRewardMessage] = useState(null);
      const [myId] = useState(() => {
        const saved = localStorage.getItem('sca_myId');
        if (saved !== null) return saved;
        const newId = `u-${Math.random().toString(36).substring(2, 8)}`;
        localStorage.setItem('sca_myId', newId);
        return newId;
      });
      const [nickname] = useState(() => {
        const saved = localStorage.getItem('sca_nickname');
        if (saved !== null) return saved;
        const newName = `Player_${Math.floor(100 + Math.random() * 900)}`;
        localStorage.setItem('sca_nickname', newName);
        return newName;
      });
      const [errorMessage, setErrorMessage] = useState(null);

      const [workerType, setWorkerType] = useState(() => {
        return localStorage.getItem('sca_workerType') || 'SCV';
      });
      const [miningMessage, setMiningMessage] = useState('');
      const [combatLogs, setCombatLogs] = useState([
        '💬 [SYSTEM] 사이버네틱 배틀 매트릭스 기동 완료.',
        '💬 [SYSTEM] 100층 레이드용 소켓 프로토콜 대기 중.'
      ]);

      const getSummonUnit = (level) => {
        const units = {
          1: { name: '테란 마린 (Marine)', emoji: '🔫', dpsFactor: 1.0 },
          2: { name: '테란 고스트 (Ghost)', emoji: '👁️', dpsFactor: 1.5 },
          3: { name: '프로토스 드라군 (Dragoon)', emoji: '🦀', dpsFactor: 2.2 },
          4: { name: '저그 히드라리스크 (Hydralisk)', emoji: '🐍', dpsFactor: 3.2 },
          5: { name: '테란 영웅 시즈 탱크 (Siege Tank)', emoji: '💥', dpsFactor: 4.8 },
          6: { name: '프로토스 하이 템플러 / 아칸 (Archon)', emoji: '⚡', dpsFactor: 7.2 },
          7: { name: '프로토스 우주모함 캐리어 (Carrier)', emoji: '🛸', dpsFactor: 11.0 },
          8: { name: '테란 전투순양함 배틀크루저 (Battlecruiser)', emoji: '🚢', dpsFactor: 16.0 },
          9: { name: '프로토스 전설 영웅 제라툴 (Zeratul)', emoji: '🗡️', dpsFactor: 25.0 },
          10: { name: '최종 테란 기함 하이페리온 (Hyperion)', emoji: '🌟', dpsFactor: 45.0 }
        };
        return units[level] || { name: '미확인 차원 유닛', emoji: '👽', dpsFactor: level * 5 };
      };

      const getRaidBossName = (floor) => {
        const bosses = {
          10: 'Guarder (폭주한 광전사 영웅)',
          20: 'Torrasque (울트라리스크 융합수)',
          30: 'Matriarch (뮤탈리스크 군락 영웅)',
          40: 'Unclean One (디파일러 불사 보스)',
          50: 'General Duke (크론 배틀크루저)',
          60: 'Fenix (드라군 기계 거신 영웅)',
          70: 'Zeratul (공허의 방랑자 제라툴)',
          80: 'Infested Kerrigan (칼날의 여왕 케리건)',
          90: 'The Overmind (초월체 생체 거대 코어)',
          100: 'Amon (어두운 공허의 지배자 아몬)'
        };
        return bosses[floor] || `Raid Boss Level ${floor} (수호 가디언)`;
      };

      const handleManualMining = () => {
        const baseIncome = Math.round(5 * specs.penalties.mineralMultiplier * huntingGround.multiplier);
        const income = Math.round(baseIncome * (1 + rebirthCount * 0.5));
        setMinerals(prev => prev + income);

        const actions = {
          SCV: [
            `🛠️ [SCV] 지지직... 융합 절단기로 미네랄 결정을 조각내어 커맨드 센터로 전송! (+${income}M)`,
            `🛠️ [SCV] "SCV 좋은데~" 융합 절단기 오버클럭 가동 완료! (+${income}M)`,
            `🛠️ [SCV] 지이잉- 광물 채굴 집게 가동! 광석을 커맨드 센터로 운반합니다. (+${income}M)`
          ],
          Probe: [
            `🔮 [Probe] 삐비빅! 사이오닉 에너지 동력장을 활성화해 광물을 넥서스로 즉시 소환! (+${income}M)`,
            `🔮 [Probe] 웅- 탐사정이 미네랄 주변에 미세 차원 워프 게이트를 개방했습니다! (+${income}M)`,
            `🔮 [Probe] 삐-익! 고주파 빔으로 광석의 핵을 정밀 분리해 넥서스로 전송 완료! (+${income}M)`
          ],
          Drone: [
            `🧬 [Drone] 쿠르릉... 날카로운 턱발톱으로 미네랄 층을 긁어 해처리로 이송! (+${income}M)`,
            `🧬 [Drone] 쉭쉭- 드론이 광석 베이스를 갉아 해처리 배양액에 누적합니다! (+${income}M)`,
            `🧬 [Drone] 크르르... 군락지의 산성 타액으로 광물을 녹여 유기 재화로 환원! (+${income}M)`
          ]
        };
        const activeList = actions[workerType];
        const randomAction = activeList[Math.floor(Math.random() * activeList.length)];
        setMiningMessage(randomAction);
      };

      // ----------------------------------------------------------------------
      // 스타1 컴퓨터강화 유즈맵 고증 부품 이름 매핑 헬퍼
      // ----------------------------------------------------------------------
      const getCpuName = (level) => {
        const names = {
          1: '똥컴 CPU (Dual-Core)',
          2: '인텔 펜티엄 4',
          3: '인텔 코어2듀오 E6600',
          4: '인텔 Core i3 4세대',
          5: '인텔 Core i5 9세대',
          6: '인텔 Core i7 12세대',
          7: '인텔 Core i9 14세대',
          8: '인텔 Xeon Platinum',
          9: 'AMD Ryzen Threadripper',
          10: '양자 슈퍼컴퓨터 코어 v1.2'
        };
        return names[level] || `차세대 퀀텀 CPU (Lv.${level})`;
      };

      const getGpuName = (level) => {
        const names = {
          1: 'Riva TNT2 (16MB)',
          2: 'NVIDIA GeForce 8600GT',
          3: 'NVIDIA GeForce GTS250',
          4: 'NVIDIA GeForce GTX460',
          5: 'NVIDIA GeForce GTX760',
          6: 'NVIDIA GeForce GTX1060 (6GB)',
          7: 'NVIDIA GeForce RTX2060 Super',
          8: 'NVIDIA GeForce RTX3060 Ti',
          9: 'NVIDIA GeForce RTX4090 D',
          10: 'NVIDIA GH200 Grace Hopper AI'
        };
        return names[level] || `AI 딥러닝 텐서 GPU (Lv.${level})`;
      };

      const getRamName = (level) => {
        const names = {
          1: 'Legacy SDRAM 4GB',
          2: 'DDR3 High-Speed 8GB',
          3: 'DDR3 Dual-Channel 16GB',
          4: 'DDR4 Gamer Edition 16GB',
          5: 'DDR4 RGB Corsair 32GB',
          6: 'DDR5 Trident Z 32GB',
          7: 'DDR5 Quad-Channel 64GB',
          8: 'DDR5 ECC Server 128GB',
          9: 'SK Hynix HBM3e 96GB',
          10: '초임계 양자 가속 HBM4 192GB'
        };
        return names[level] || `양자 초고속 메모리 (Lv.${level})`;
      };

      const getCoolerName = (level) => {
        const names = {
          1: '인텔 기본 번들 (초코파이)',
          2: '구리 히트싱크 알루미늄 공랭',
          3: '보급형 타워 싱글팬 공랭',
          4: '듀얼타워 대장급 공랭 (NH-D15)',
          5: '240mm 2열 짭수랭 (AIO)',
          6: '360mm 3열 RGB 수랭 (Kraken)',
          7: '커스텀 아크릴 수로 오픈형 수랭',
          8: '외장 거대 라디에이터 모라(MORA)',
          9: '공업용 액체 냉동 칠러 (Chiller)',
          10: 'LN2 액체질소 극한 냉각 제어탑'
        };
        return names[level] || `반중력 열복사 냉각 시스템 (Lv.${level})`;
      };

      // ----------------------------------------------------------------------
      // 5. 실시간 하드웨어 스펙 연산 (2단계 백엔드 공식과 100% 매칭)
      // ----------------------------------------------------------------------
      const specs = useMemo(() => {
        // A. 과열 시스템 감지
        const cpuHeatDemand = cpu.level * 15;
        const isOverheated = cpuHeatDemand > cooler.coolingCapacity;
        const mineralMultiplier = isOverheated ? 0.5 : 1.0;

        // B. 소켓 불일치 감지
        const isSocketMismatched = cpu.manufacturer !== motherboard.socketManufacturer;

        // C. DDR 세대 불일치 감지
        const ddrSet = new Set([cpu.ddrGeneration, ram.ddrGeneration, motherboard.supportedDdrGeneration]);
        const isDdrMismatched = ddrSet.size > 1;
        const hpDecayRate = isDdrMismatched ? (ddrSet.size === 2 ? 0.50 : 1.00) : 0.00;

        // D. 가용 유닛 수 상한
        let unitLimit = cpu.level * 2;
        if (isSocketMismatched) {
          unitLimit = Math.max(1, Math.floor(unitLimit * 0.5));
        }

        // E. 사냥터 가용 유닛 수 (RAM 용량)
        const maxHuntingUnits = Math.floor(ram.capacityGb / 4);

        // F. 유닛 체력 및 메인보드 고정 실드
        const unitHp = 100 * cpu.level;
        const unitShield = motherboard.shieldIncrease;

        // G. 공격 주기
        const calculatedAttackSpeed = 2.0 - (ram.clockMhz / 4000);
        const attackSpeedSec = Math.max(0.1, Math.round(calculatedAttackSpeed * 100) / 100);

        // H. 데미지 (GPU 기하급수 및 CPU 소환수 등급 결합 시너지 성장)
        const unitDamage = Math.round(10 * Math.pow(1.5, gpu.level - 1) * getSummonUnit(cpu.level).dpsFactor);

        // I. 방어력
        let unitDefense = cooler.level * 3;
        if (isOverheated) {
          unitDefense = Math.max(0, Math.floor(unitDefense * 0.5));
        }

        // J. 다운로드 속도 (HDD/SSD 4배 및 용량 비례)
        let downloadSpeedMb = 25 + (storage.capacityGb * 0.01);
        if (storage.type === 'SSD') {
          downloadSpeedMb = 100 + (storage.capacityGb * 0.05); // HDD의 정확한 4배 베이스 적용
        }
        downloadSpeedMb = Math.round(downloadSpeedMb * 10) / 10;

        return {
          unitLimit,
          maxHuntingUnits,
          unitHp,
          unitShield,
          attackSpeedSec,
          unitDamage,
          unitDefense,
          downloadSpeedMb,
          cpuHeatDemand,
          penalties: {
            isOverheated,
            isSocketMismatched,
            isDdrMismatched,
            hpDecayRate,
            mineralMultiplier
          }
        };
      }, [cpu, gpu, ram, cooler, motherboard, storage]);

      // ----------------------------------------------------------------------
      // 6. 초당 자동 미네랄 수급 라이프사이클 (환생 버프 적용)
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          const baseEarn = Math.round(10 * specs.penalties.mineralMultiplier * huntingGround.multiplier);
          const autoEarn = Math.round(baseEarn * (1 + rebirthCount * 0.5));
          setMinerals(prev => prev + autoEarn);
        }, 1000);

        return () => clearInterval(interval);
      }, [specs, huntingGround, rebirthCount]);

      // ----------------------------------------------------------------------
      // 6.5. 게임 진행 상태 로컬 스토리지 실시간 자동 저장 (F5/새로고침 방지)
      // ----------------------------------------------------------------------
      useEffect(() => {
        localStorage.setItem('sca_minerals', minerals.toString());
        localStorage.setItem('sca_normalCoins', normalCoins.toString());
        localStorage.setItem('sca_scaCoins', scaCoins.toString());
        localStorage.setItem('sca_rebirthCount', rebirthCount.toString());
        localStorage.setItem('sca_cpu', JSON.stringify(cpu));
        localStorage.setItem('sca_gpu', JSON.stringify(gpu));
        localStorage.setItem('sca_ram', JSON.stringify(ram));
        localStorage.setItem('sca_cooler', JSON.stringify(cooler));
        localStorage.setItem('sca_motherboard', JSON.stringify(motherboard));
        localStorage.setItem('sca_storage', JSON.stringify(storage));
        localStorage.setItem('sca_huntingGround', JSON.stringify(huntingGround));
        localStorage.setItem('sca_downloadTarget', JSON.stringify(downloadTarget));
        localStorage.setItem('sca_workerType', workerType);
        localStorage.setItem('sca_inventory', JSON.stringify(inventory));
        localStorage.setItem('sca_autoBuyCpu', autoBuyCpu.toString());
        localStorage.setItem('sca_autoBuyGpu', autoBuyGpu.toString());
        localStorage.setItem('sca_autoBuyRam', autoBuyRam.toString());
        localStorage.setItem('sca_autoBuyCooler', autoBuyCooler.toString());
        localStorage.setItem('sca_autoBuyStorage', autoBuyStorage.toString());
      }, [minerals, normalCoins, scaCoins, rebirthCount, cpu, gpu, ram, cooler, motherboard, storage, huntingGround, downloadTarget, workerType, inventory, autoBuyCpu, autoBuyGpu, autoBuyRam, autoBuyCooler, autoBuyStorage]);

      // ----------------------------------------------------------------------
      // 6.6. 가상 사냥터 실시간 전투 매트릭스 로그 생성기 (스타1 콘솔 싱크)
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          const summon = getSummonUnit(cpu.level);
          const enemies = ['카카루 (Cacaru)', '스커지 (Scourge)', '벵갈라스 (Bengalaas)', '우르사돈 (Ursadon)', '라그나로크 (Lagnasaur)', '파괴자 (Reaver)', '공허의 파편'];
          const enemy = enemies[Math.floor(Math.random() * enemies.length)];
          const earn = Math.round(10 * specs.penalties.mineralMultiplier * huntingGround.multiplier * (1 + rebirthCount * 0.5));
          const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
          
          const newLog = `[${time}] 🔫 배틀 기동 :: ${summon.emoji} ${summon.name.split(' ')[1]} ${specs.unitLimit}기가 '${enemy}'를 격퇴하고 +${earn}M 획득!`;
          
          setCombatLogs(prev => {
            const nextLogs = [...prev, newLog];
            if (nextLogs.length > 8) {
              nextLogs.shift();
            }
            return nextLogs;
          });
        }, 1500);

        return () => clearInterval(interval);
      }, [cpu.level, specs, huntingGround, rebirthCount]);

      // ----------------------------------------------------------------------
      // 6.7. 지능형 자동 구매 및 자동 강화(Auto Buy & Upgrade) 통합 루프 엔진
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          // 강화 주입 프레임 진행 중이거나, 다른 구매/강화 작업 진행 중이면 다음 턴 대기
          if (isUpgrading) return;

          const parts = ['cpu', 'gpu', 'ram', 'cooler', 'storage'];
          
          for (const type of parts) {
            let active = false;
            let setAuto = null;

            if (type === 'cpu') { active = autoBuyCpu; setAuto = setAutoBuyCpu; }
            else if (type === 'gpu') { active = autoBuyGpu; setAuto = setAutoBuyGpu; }
            else if (type === 'ram') { active = autoBuyRam; setAuto = setAutoBuyRam; }
            else if (type === 'cooler') { active = autoBuyCooler; setAuto = setAutoBuyCooler; }
            else if (type === 'storage') { active = autoBuyStorage; setAuto = setAutoBuyStorage; }

            if (!active) continue;

            // 해당 부품 유형의 인벤토리 아이템을 추출
            const owned = inventory.filter(p => p.type === type);
            
            if (owned.length === 0) {
              // A. 부품 소멸 감지 시 1강 즉시 자동 구매
              if (minerals >= 100) {
                handleBuyComponentPack(type);
                break; // 한 턴에 하나만 시도
              } else {
                setAuto(false);
                setCombatLogs(prev => [...prev.slice(-7), `⚠️ [SYSTEM] 미네랄이 부족하여 ${type.toUpperCase()} 자동 구매가 중단되었습니다.`]);
                break;
              }
            } else {
              // B. 부품 존재 시 10강 미만 중 등급이 가장 높은 부품을 타겟으로 지정
              const target = owned.filter(p => p.level < 10).sort((a, b) => b.level - a.level)[0];
              if (target) {
                const cost = getUpgradeCost(target.level);
                if (minerals >= cost) {
                  handleInventoryUpgrade(target.id);
                  break; // 한 턴에 하나만 시도
                } else {
                  setAuto(false);
                  setCombatLogs(prev => [...prev.slice(-7), `⚠️ [SYSTEM] 미네랄이 부족하여 ${type.toUpperCase()} 자동 강화가 중단되었습니다.`]);
                  break;
                }
              } else {
                // 더 이상 10강 미만의 예비 부품이 없을 경우 완성 정지
                setAuto(false);
                setCombatLogs(prev => [...prev.slice(-7), `🎉 [SYSTEM] 인벤토리에 이미 10강 이상의 ${type.toUpperCase()} 부품이 있어 자동 강화를 마칩니다.`]);
                break;
              }
            }
          }
        }, 650);

        return () => clearInterval(interval);
      }, [autoBuyCpu, autoBuyGpu, autoBuyRam, autoBuyCooler, autoBuyStorage, isUpgrading, inventory, minerals]);

      // ----------------------------------------------------------------------
      // 7. 실시간 상점 강화 비용 계산 헬퍼
      // ----------------------------------------------------------------------
      const getUpgradeCost = (level) => {
        return Math.round(100 * Math.pow(1.6, level));
      };

      // 부품 강화 확률 매핑 함수
      const getUpgradeProbability = (level) => {
        if (level === 1) return 1.0;
        if (level === 2) return 0.90;
        if (level === 3) return 0.80;
        if (level === 4) return 0.70;
        if (level === 5) return 0.60;
        if (level === 6) return 0.50;
        if (level === 7) return 0.40;
        if (level === 8) return 0.30;
        if (level === 9) return 0.20;
        return 0.10; // 10강 이상
      };

      // 1. 기본 1강 부품 팩 구매 핸들러
      const handleBuyComponentPack = (type) => {
        const cost = 100;
        if (minerals < cost) {
          alert('미네랄이 부족합니다.');
          return;
        }

        setMinerals(prev => prev - cost);
        const newId = `inv-${type}-${Math.random().toString(36).substring(2, 9)}`;
        
        let newPart = { id: newId, type: type, level: 1 };
        if (type === 'cpu') {
          newPart.manufacturer = 'Intel';
          newPart.ddrGeneration = 'DDR4';
        } else if (type === 'ram') {
          newPart.clockMhz = 2400;
          newPart.capacityGb = 8;
          newPart.ddrGeneration = 'DDR4';
        } else if (type === 'cooler') {
          newPart.coolingCapacity = 30;
        } else if (type === 'storage') {
          newPart.storageType = 'HDD';
          newPart.capacityGb = 250;
        }

        setInventory(prev => [...prev, newPart]);
        
        // 시각 피드백용 상태
        setUpgradeStatus('success');
        setUpgradeMessage(`📦 [부품 팩 구매] 새로운 1강 ${type.toUpperCase()} 부품이 인벤토리에 추가되었습니다.`);
        setTimeout(() => {
          setUpgradeStatus(null);
          setUpgradeMessage('');
        }, 3000);
      };

      // 2. 보관 장비 스왑 장착 핸들러
      const handleEquipComponent = (itemId) => {
        const partToEquip = inventory.find(p => p.id === itemId);
        if (!partToEquip) return;

        const type = partToEquip.type;

        // 메인 부품 스와핑 처리
        if (type === 'cpu') {
          const currentEquipped = { ...cpu };
          setCpu({
            manufacturer: partToEquip.manufacturer,
            level: partToEquip.level,
            ddrGeneration: partToEquip.ddrGeneration
          });
          // 인벤토리 목록에서 장착된 것 빼고 기존 장착 부품 반입
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-cpu-${Math.random().toString(36).substring(2, 7)}`,
            type: 'cpu',
            level: currentEquipped.level,
            manufacturer: currentEquipped.manufacturer,
            ddrGeneration: currentEquipped.ddrGeneration
          }));
        } else if (type === 'gpu') {
          const currentEquipped = { ...gpu };
          setGpu({ level: partToEquip.level });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-gpu-${Math.random().toString(36).substring(2, 7)}`,
            type: 'gpu',
            level: currentEquipped.level
          }));
        } else if (type === 'ram') {
          const currentEquipped = { ...ram };
          setRam({
            level: partToEquip.level,
            clockMhz: partToEquip.clockMhz,
            capacityGb: partToEquip.capacityGb,
            ddrGeneration: partToEquip.ddrGeneration
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-ram-${Math.random().toString(36).substring(2, 7)}`,
            type: 'ram',
            level: currentEquipped.level,
            clockMhz: currentEquipped.clockMhz,
            capacityGb: currentEquipped.capacityGb,
            ddrGeneration: currentEquipped.ddrGeneration
          }));
        } else if (type === 'cooler') {
          const currentEquipped = { ...cooler };
          setCooler({
            level: partToEquip.level,
            coolingCapacity: partToEquip.coolingCapacity
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-cooler-${Math.random().toString(36).substring(2, 7)}`,
            type: 'cooler',
            level: currentEquipped.level,
            coolingCapacity: currentEquipped.coolingCapacity
          }));
        } else if (type === 'storage') {
          const currentEquipped = { ...storage };
          setStorage({
            type: partToEquip.storageType, // 장착 스키마는 'type'으로 HDD/SSD 보유
            capacityGb: partToEquip.capacityGb,
            level: partToEquip.level
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-storage-${Math.random().toString(36).substring(2, 7)}`,
            type: 'storage',
            level: currentEquipped.level,
            storageType: currentEquipped.type, // 복귀 시 장착 스키마 'type'을 storageType에 매치
            capacityGb: currentEquipped.capacityGb
          }));
        }

        setUpgradeStatus('success');
        setUpgradeMessage(`🔄 [장비 교체 장착] ${type.toUpperCase()} +${partToEquip.level}강 장비가 장착 완료되었습니다.`);
        setTimeout(() => {
          setUpgradeStatus(null);
          setUpgradeMessage('');
        }, 3000);
      };

      // 2.5. 인벤토리 부품 판매 핸들러
      const handleSellComponent = (itemId) => {
        const part = inventory.find(p => p.id === itemId);
        if (!part) return;

        // 판매 가격: 1강 기준 50M + 강화 단계당 50M 추가 환급
        const sellPrice = 50 + (part.level - 1) * 50;
        setMinerals(prev => prev + sellPrice);
        setInventory(prev => prev.filter(p => p.id !== itemId));

        setUpgradeStatus('success');
        setUpgradeMessage(`💰 [부품 판매] ${part.type.toUpperCase()} +${part.level}강 장비를 판매하여 +${sellPrice}M 미네랄을 획득했습니다.`);
        setTimeout(() => {
          setUpgradeStatus(null);
          setUpgradeMessage('');
        }, 3000);
      };

      // 3. 인벤토리 부품 강화 핸들러
      const handleInventoryUpgrade = (itemId) => {
        if (isUpgrading) return;

        const partToUpgrade = inventory.find(p => p.id === itemId);
        if (!partToUpgrade) return;

        const currentLevel = partToUpgrade.level;
        const cost = getUpgradeCost(currentLevel);

        if (minerals < cost) {
          alert('미네랄이 부족합니다.');
          return;
        }

        setMinerals(prev => prev - cost);
        setIsUpgrading(true);
        setActiveUpgradingPart(partToUpgrade.type);
        setUpgradeStatus('upgrading');
        setUpgradeMessage(`보관함 ${partToUpgrade.type.toUpperCase()} +${currentLevel}강 주입 중... (창고 강화)`);

        setTimeout(() => {
          const prob = getUpgradeProbability(currentLevel);
          const rand = Math.random();
          
          let result = 'success';
          if (rand <= prob) {
            result = 'success';
          } else {
            if (currentLevel <= 4) {
              result = 'fail_keep';
            } else if (currentLevel <= 6) {
              result = 'fail_drop';
            } else {
              // 7강 실패 시 50% 폭사, 8강 실패 시 70% 폭사, 9강 실패 시 90% 폭사, 10강 이상 100% 폭사
              const explodeChance = currentLevel === 7 ? 0.5 : currentLevel === 8 ? 0.7 : currentLevel === 9 ? 0.9 : 1.0;
              if (Math.random() <= explodeChance) {
                result = 'exploded';
              } else {
                result = 'fail_drop';
              }
            }
          }

          setIsUpgrading(false);
          setUpgradeStatus(result);

          if (result === 'success') {
            const nextLvl = currentLevel + 1;
            setUpgradeMessage(`🎉 [강화 성공] 보관함 ${partToUpgrade.type.toUpperCase()} 강화 성공! (+${nextLvl}강)`);
            
            setInventory(prev => prev.map(p => {
              if (p.id !== itemId) return p;
              const upgraded = { ...p, level: nextLvl };
              
              if (p.type === 'cooler') {
                upgraded.coolingCapacity = p.coolingCapacity + 25;
              } else if (p.type === 'ram') {
                upgraded.clockMhz = p.clockMhz + 400;
                upgraded.capacityGb = p.capacityGb + 8;
              } else if (p.type === 'storage') {
                upgraded.capacityGb = p.capacityGb + 250;
                if (nextLvl >= 5) {
                  upgraded.storageType = 'SSD';
                }
              }
              return upgraded;
            }));
          } else if (result === 'fail_keep') {
            setUpgradeMessage(`⚠️ [강화 실패] 업그레이드 실패. 창고 내 부품이 보존되었습니다.`);
          } else if (result === 'fail_drop') {
            const prevLvl = Math.max(1, currentLevel - 1);
            setUpgradeMessage(`📉 [등급 하락] 전원 불일치로 등급이 하락했습니다. (+${prevLvl}강)`);
            
            setInventory(prev => prev.map(p => {
              if (p.id !== itemId) return p;
              const degraded = { ...p, level: prevLvl };
              
              if (p.type === 'cooler') {
                degraded.coolingCapacity = Math.max(30, p.coolingCapacity - 25);
              } else if (p.type === 'ram') {
                degraded.clockMhz = Math.max(2400, p.clockMhz - 400);
                degraded.capacityGb = Math.max(8, p.capacityGb - 8);
              } else if (p.type === 'storage') {
                degraded.capacityGb = Math.max(250, p.capacityGb - 250);
              }
              return degraded;
            }));
          } else if (result === 'exploded') {
            setUpgradeMessage(`💥 [창고 부품 파괴] 아아..! 창고의 부품이 과전압 합선으로 완전히 폭파되었습니다!`);
            // 인벤토리 목록에서 완전 영구 영점/삭제
            setInventory(prev => prev.filter(p => p.id !== itemId));
          }

          setTimeout(() => {
            setUpgradeStatus(null);
            setUpgradeMessage('');
          }, 4000);
        }, 600);
      };

      // GPU 환생 처리 핸들러
      const handleRebirth = () => {
        if (gpu.level < 10) {
          alert('환생은 GPU가 10강에 도달해야만 가능합니다.');
          return;
        }

        const confirmRebirth = confirm('정말 GPU 환생을 수행하시겠습니까?\n\n환생 시 모든 부품 레벨과 미네랄이 리셋되지만, SCA 클라우드 코인 +10개 획득 및 영구 자동 미네랄 수급 버프(+50% 복리 증가)가 상시 활성화됩니다.');
        if (!confirmRebirth) return;

        setScaCoins(prev => prev + 10);
        setRebirthCount(prev => prev + 1);
        setMinerals(0);

        setCpu({ manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR4' });
        setGpu({ level: 1 });
        setRam({ level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' });
        setCooler({ level: 1, coolingCapacity: 30 });
        setMotherboard({ socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR4', shieldIncrease: 300 });
        setStorage({ type: 'HDD', capacityGb: 250, level: 1 });
        setInventory([
          { id: 'inv-cpu-1', type: 'cpu', level: 1, manufacturer: 'Intel', ddrGeneration: 'DDR4' },
          { id: 'inv-gpu-1', type: 'gpu', level: 1 },
          { id: 'inv-ram-1', type: 'ram', level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' },
          { id: 'inv-cooler-1', type: 'cooler', level: 1, coolingCapacity: 30 },
          { id: 'inv-storage-1', type: 'storage', level: 1, storageType: 'HDD', capacityGb: 250 }
        ]);
        setHuntingGround({ name: '테이블 탑 조립소 (1단계)', multiplier: 1.0 });

        setUpgradeStatus('success');
        setUpgradeMessage(`✨ [환생 성공] 차원 소켓 개방 완료! 영구 수급 배율 x${(1 + (rebirthCount + 1)*0.5).toFixed(1)} 증가.`);
        
        setTimeout(() => {
          setUpgradeStatus(null);
          setUpgradeMessage('');
        }, 5000);
      };

      // 메인보드 완제품 변경 구매 핸들러
      const handlePurchaseMotherboard = (socketM, ddrGen, shieldVal, cost) => {
        if (minerals < cost) {
          alert('미네랄이 부족합니다.');
          return;
        }
        setMinerals(prev => prev - cost);
        setMotherboard({
          socketManufacturer: socketM,
          supportedDdrGeneration: ddrGen,
          shieldIncrease: shieldVal
        });
      };

      // ----------------------------------------------------------------------
      // 8. 상위 사냥터(게임) 다운로드 진행도 시뮬레이션
      // ----------------------------------------------------------------------
      const startDownload = () => {
        if (storage.capacityGb < downloadTarget.requiredGb) {
          alert(`저장장치 용량이 부족하여 이 게임을 내려받을 수 없습니다. (필요: ${downloadTarget.requiredGb}GB, 현재: ${storage.capacityGb}GB)`);
          return;
        }
        setIsDownloading(true);
        setDownloadProgress(0);
      };

      useEffect(() => {
        if (!isDownloading) return;

        const interval = setInterval(() => {
          setDownloadProgress(prev => {
            const currentSize = (prev / 100) * downloadTarget.sizeMb;
            const nextSize = currentSize + (specs.downloadSpeedMb);
            
            if (nextSize >= downloadTarget.sizeMb) {
              clearInterval(interval);
              setIsDownloading(false);
              setHuntingGround({
                name: downloadTarget.name,
                multiplier: downloadTarget.multiplier
              });
              setDownloadTarget({
                name: '데이터 웜홀 센터 (3단계)',
                sizeMb: 25000,
                requiredGb: 1000,
                multiplier: 5.0
              });
              return 100;
            }
            return (nextSize / downloadTarget.sizeMb) * 100;
          });
        }, 100);

        return () => clearInterval(interval);
      }, [isDownloading, specs.downloadSpeedMb, downloadTarget]);

      // ----------------------------------------------------------------------
      // 9. 실시간 웹소켓 100층 레이드 방 연결 핸들러
      // ----------------------------------------------------------------------
      const joinRaidRoom = () => {
        setErrorMessage(null);
        setRewardMessage(null);
        setIsRaidOpen(true);

        const socketCon = io({
          reconnection: false
        });

        socketCon.on('connect', () => {
          console.log('[Socket] Connected to server.');
          socketCon.emit('joinRoom', {
            roomId: 'carry-room-100',
            userId: myId,
            nickname: nickname,
            parts: { cpu, gpu, ram, cooler, motherboard, storage }
          });
        });

        socketCon.on('room_state', (state) => {
          setRaidState(state);
        });

        socketCon.on('milestone_reward_claimed', (data) => {
          const { clearedFloor, txResult } = data;
          if (txResult.success) {
            setScaCoins(txResult.currentTotalCoins);
            setRewardMessage(`돌파 성공. ${clearedFloor}층 마일스톤 보상 SCA 코인 +${txResult.claimedCoins} 지급 완료.`);
            setTimeout(() => setRewardMessage(null), 4000);
          }
        });

        socketCon.on('error_message', (msg) => {
          setErrorMessage(msg);
        });

        socketCon.on('disconnect', () => {
          console.log('[Socket] Disconnected.');
        });

        setSocket(socketCon);
      };

      const leaveRaidRoom = () => {
        if (socket) {
          socket.disconnect();
        }
        setSocket(null);
        setRaidState(null);
        setIsRaidOpen(false);
      };

      const toggleReady = () => {
        if (socket && raidState) {
          const me = raidState.players.find(p => p.userId === myId);
          if (me) {
            socket.emit('readyStatus', { isReady: !me.isReady });
          }
        }
      };

      const handleManualClick = () => {
        const baseIncome = Math.round(5 * specs.penalties.mineralMultiplier * huntingGround.multiplier);
        const income = Math.round(baseIncome * (1 + rebirthCount * 0.5));
        setMinerals(prev => prev + income);
      };

      return (
        <div className="container mx-auto p-4 max-w-7xl">
          
          {/* ================================================================== */}
          {/* 상단 자원 바 */}
          {/* ================================================================== */}
          <header className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 items-center bg-slate-900/60 p-4 rounded-xl border border-emerald-500/20 neon-border-emerald">
            <div className="flex items-center space-x-3">
              <div className="p-2 bg-emerald-500/10 rounded-lg text-emerald-400 border border-emerald-500/30">
                <span className="text-xl">🧠</span>
              </div>
              <div>
                <h1 className="text-sm text-slate-400 uppercase tracking-widest font-semibold">복원 제어 터미널</h1>
                <p className="text-xs text-emerald-500 font-mono">REBIRTH LEVEL: {rebirthCount} (x{(1 + rebirthCount * 0.5).toFixed(1)} BUFF)</p>
              </div>
            </div>

            <div className="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-slate-800">
              <span className="text-xs uppercase tracking-wider text-slate-400 font-mono">MINERALS</span>
              <span className="text-lg font-bold text-emerald-400 font-mono flex items-center space-x-1">
                <span>{minerals.toLocaleString()}</span>
                <span className="text-xs text-emerald-500/60 ml-1">M</span>
              </span>
            </div>

            <div className="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-slate-800">
              <span className="text-xs uppercase tracking-wider text-slate-400 font-mono">NORMAL COINS</span>
              <span className="text-lg font-bold text-cyan-400 font-mono">
                {normalCoins.toLocaleString()}
              </span>
            </div>

            <div className="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-cyan-500/30 neon-border-cyan">
              <div className="flex items-center space-x-1.5">
                <span className="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-ping"></span>
                <span className="text-xs uppercase tracking-wider text-cyan-300 font-mono">SCA CLOUD COINS</span>
              </div>
              <span className="text-lg font-bold text-cyan-300 font-mono">
                {scaCoins.toLocaleString()}
              </span>
            </div>
          </header>

                        <div className="flex flex-col space-y-2 text-xs">
                          <div className="flex justify-between">
                            <span className="text-slate-500">수령 가능 마일스톤:</span>
                            <span className="text-cyan-300 font-bold">10층 ~ 100층 (10층단위)</span>
                          </div>
                          <div className="flex justify-between text-[11px] text-slate-400">
                            <span>오늘 남은 보상 층수:</span>
                            <span className="text-emerald-400 font-bold">
                              {raidState.currentFloor <= 100 ? `${Math.ceil(raidState.currentFloor / 10) * 10}층 ~ 100층` : '모든 구간 수령 완료'}
                            </span>
                          </div>
                          <p className="text-[9px] text-slate-500 mt-2 border-t border-slate-900 pt-2 leading-relaxed">
                            * 보상은 하루에 단 한 번, 날짜가 바뀌면 수령 완료 최고 층수가 0으로 리셋되며 다시 처음부터 순차로 차분 획득 가능합니다.
                          </p>
                        </div>
                      </div>

                    </div>

                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
