    // ======================================================================
    // 로그인 게이트: 미로그인 시 로그인/회원가입 화면, 로그인 시 게임(App) 마운트
    // ======================================================================
    function AuthGate() {
      const [phase, setPhase] = useState('booting'); // booting | auth | ready
      const [mode, setMode] = useState('login');      // login | register
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);

      // 최초 로드 시 저장된 토큰이 있으면 서버 진행도를 불러와 자동 로그인
      useEffect(() => {
        const token = GameSync.getToken();
        if (!token) { setPhase('auth'); return; }
        let cancelled = false;
        const timeoutId = setTimeout(() => {
          if (cancelled) return;
          GameSync.clearAuth();
          setError('서버 동기화 시간이 초과되었습니다. 다시 로그인해 주세요.');
          setPhase('auth');
        }, 12000);
        (async () => {
          try {
            const state = await GameSync.loadFromServer();
            if (cancelled) return;
            clearTimeout(timeoutId);
            GameSync.restoreState(state);
            setPhase('ready');
          } catch (e) {
            if (cancelled) return;
            clearTimeout(timeoutId);
            GameSync.clearAuth();
            setError(e.message || '진행도를 불러오지 못했습니다.');
            setPhase('auth');
          }
        })();
        return () => {
          cancelled = true;
          clearTimeout(timeoutId);
        };
      }, []);

      const submit = async (e) => {
        e.preventDefault();
        setError(null);
        setLoading(true);
        try {
          const name = username.trim();
          const res = mode === 'login'
            ? await GameSync.login(name, password)
            : await GameSync.register(name, password);

          // 계정 전환 시 이전 계정의 로컬 데이터가 섞이지 않도록 정리
          GameSync.clearLocalGameState();
          GameSync.setAuth(res.token, res.userId, res.nickname);

          const state = await GameSync.loadFromServer();
          if (state && Object.keys(state).length > 0) {
            GameSync.restoreState(state);
          } else {
            // 서버에 저장된 진행도가 없으면(신규/초기) 현재 로컬 상태를 업로드
            await GameSync.saveToServer();
          }
          setPhase('ready');
        } catch (err) {
          setError(err.message || '오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const handleLogout = async () => {
        await GameSync.saveToServer();
        await GameSync.logout();
        GameSync.clearAuth();
        GameSync.clearLocalGameState();
        // 게임 상태를 완전히 초기화하기 위해 새로고침
        window.location.reload();
      };

      if (phase === 'booting') {
        return (
          <div className="min-h-screen flex items-center justify-center text-slate-400 font-mono text-sm">
            <span className="animate-pulse">⏳ 진행도 동기화 중...</span>
          </div>
        );
      }

      if (phase === 'ready') {
        const userId = localStorage.getItem('sca_myId');
        return <App key={userId} onLogout={handleLogout} />;
      }

      // 로그인 / 회원가입 화면
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-sm bg-slate-900/70 border border-emerald-500/20 neon-border-emerald rounded-2xl p-7 space-y-5">
            <div className="text-center space-y-1">
              <div className="text-3xl">🧠</div>
              <h1 className="text-lg font-bold text-emerald-300">컴퓨터 강화하기</h1>
              <p className="text-xs text-slate-400 font-mono">
                {mode === 'login' ? '로그인하여 진행도를 불러옵니다' : '계정을 만들어 진행도를 저장합니다'}
              </p>
            </div>

            <form onSubmit={submit} className="space-y-3">
              <div>
                <label className="block text-sm text-slate-400 font-mono mb-1">닉네임</label>
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  autoComplete="username"
                  className="w-full px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-sm text-slate-100 focus:border-emerald-500 outline-none"
                  placeholder="2~50자"
                />
              </div>
              <div>
                <label className="block text-sm text-slate-400 font-mono mb-1">비밀번호</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  autoComplete={mode === 'login' ? 'current-password' : 'new-password'}
                  className="w-full px-3 py-2 bg-slate-950 border border-slate-700 rounded-lg text-sm text-slate-100 focus:border-emerald-500 outline-none"
                  placeholder="최소 4자"
                />
              </div>

              {error && (
                <p className="text-xs text-rose-400 font-mono bg-rose-500/10 border border-rose-500/30 rounded px-3 py-2">
                  {error}
                </p>
              )}

              <button
                type="submit"
                disabled={loading}
                className="w-full py-2.5 rounded-lg bg-emerald-500/90 hover:bg-emerald-400 text-slate-950 font-bold text-sm disabled:opacity-50"
              >
                {loading ? '처리 중...' : (mode === 'login' ? '로그인' : '회원가입')}
              </button>
            </form>

            <div className="text-center text-xs text-slate-400 font-mono">
              {mode === 'login' ? '계정이 없으신가요? ' : '이미 계정이 있으신가요? '}
              <button
                onClick={() => { setMode(mode === 'login' ? 'register' : 'login'); setError(null); }}
                className="text-emerald-400 underline"
              >
                {mode === 'login' ? '회원가입' : '로그인'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(
      <ErrorBoundary>
        <AuthGate />
      </ErrorBoundary>
    );
  </script>
</body>
