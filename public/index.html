<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>'컴퓨터 강화하기' 웹 복원판 대시보드</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React, ReactDOM, Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts Outfit & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Socket.io Client (Express 서버 호스팅 소켓 연동) -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      font-family: 'Outfit', 'JetBrains Mono', sans-serif;
    }
    .neon-border-emerald {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.1);
    }
    .neon-border-rose {
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.4), inset 0 0 10px rgba(244, 63, 94, 0.2);
    }
    .neon-border-cyan {
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 10px rgba(6, 182, 212, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden selection:bg-emerald-500 selection:text-slate-950">

  <div id="root"></div>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React UI 컴포넌트 마운트 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function App() {
      // ----------------------------------------------------------------------
      // 1. 핵심 유저 재화 상태 정의
      // ----------------------------------------------------------------------
      const [minerals, setMinerals] = useState(2000);
      const [normalCoins, setNormalCoins] = useState(50);
      const [scaCoins, setScaCoins] = useState(0);

      // ----------------------------------------------------------------------
      // 2. 조립 컴퓨터 부품 상태 정의
      // ----------------------------------------------------------------------
      const [cpu, setCpu] = useState({ manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR4' });
      const [gpu, setGpu] = useState({ level: 1 });
      const [ram, setRam] = useState({ level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' });
      const [cooler, setCooler] = useState({ level: 1, coolingCapacity: 30 });
      const [motherboard, setMotherboard] = useState({ socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR4', shieldIncrease: 300 });
      const [storage, setStorage] = useState({ type: 'HDD', capacityGb: 250 });

      // ----------------------------------------------------------------------
      // 3. 사냥터 및 다운로드 진행 상태 정의
      // ----------------------------------------------------------------------
      const [huntingGround, setHuntingGround] = useState({ name: '테이블 탑 조립소 (1단계)', multiplier: 1.0 });
      const [isDownloading, setIsDownloading] = useState(false);
      const [downloadProgress, setDownloadProgress] = useState(0);
      const [downloadTarget, setDownloadTarget] = useState({ name: '서버 랙 테마파크 (2단계)', sizeMb: 5000, requiredGb: 500, multiplier: 2.5 });

      // ----------------------------------------------------------------------
      // 4. 실시간 소켓 멀티플레이 레이드 상태 정의
      // ----------------------------------------------------------------------
      const [isRaidOpen, setIsRaidOpen] = useState(false);
      const [socket, setSocket] = useState(null);
      const [raidState, setRaidState] = useState(null);
      const [rewardMessage, setRewardMessage] = useState(null);
      const [myId] = useState(`u-${Math.random().toString(36).substring(2, 8)}`);
      const [nickname] = useState(`Player_${Math.floor(100 + Math.random() * 900)}`);
      const [errorMessage, setErrorMessage] = useState(null);

      // ----------------------------------------------------------------------
      // 5. 실시간 하드웨어 스펙 연산 (2단계 백엔드 공식과 100% 매칭)
      // ----------------------------------------------------------------------
      const specs = useMemo(() => {
        // A. 과열 시스템 감지
        const cpuHeatDemand = cpu.level * 15;
        const isOverheated = cpuHeatDemand > cooler.coolingCapacity;
        const mineralMultiplier = isOverheated ? 0.5 : 1.0;

        // B. 소켓 불일치 감지
        const isSocketMismatched = cpu.manufacturer !== motherboard.socketManufacturer;

        // C. DDR 세대 불일치 감지
        const ddrSet = new Set([cpu.ddrGeneration, ram.ddrGeneration, motherboard.supportedDdrGeneration]);
        const isDdrMismatched = ddrSet.size > 1;
        const hpDecayRate = isDdrMismatched ? (ddrSet.size === 2 ? 0.50 : 1.00) : 0.00;

        // D. 가용 유닛 수 상한
        let unitLimit = cpu.level * 2;
        if (isSocketMismatched) {
          unitLimit = Math.max(1, Math.floor(unitLimit * 0.5));
        }

        // E. 사냥터 가용 유닛 수 (RAM 용량)
        const maxHuntingUnits = Math.floor(ram.capacityGb / 4);

        // F. 유닛 체력 및 메인보드 고정 실드
        const unitHp = 100 * cpu.level;
        const unitShield = motherboard.shieldIncrease;

        // G. 공격 주기
        const calculatedAttackSpeed = 2.0 - (ram.clockMhz / 4000);
        const attackSpeedSec = Math.max(0.1, Math.round(calculatedAttackSpeed * 100) / 100);

        // H. 데미지 (GPU 기하급수 성장)
        const unitDamage = Math.round(10 * Math.pow(1.5, gpu.level - 1));

        // I. 방어력
        let unitDefense = cooler.level * 3;
        if (isOverheated) {
          unitDefense = Math.max(0, Math.floor(unitDefense * 0.5));
        }

        // J. 다운로드 속도 (HDD/SSD 4배 및 용량 비례)
        let downloadSpeedMb = 25 + (storage.capacityGb * 0.01);
        if (storage.type === 'SSD') {
          downloadSpeedMb = 100 + (storage.capacityGb * 0.05); // HDD의 정확한 4배 베이스 적용
        }
        downloadSpeedMb = Math.round(downloadSpeedMb * 10) / 10;

        return {
          unitLimit,
          maxHuntingUnits,
          unitHp,
          unitShield,
          attackSpeedSec,
          unitDamage,
          unitDefense,
          downloadSpeedMb,
          cpuHeatDemand,
          penalties: {
            isOverheated,
            isSocketMismatched,
            isDdrMismatched,
            hpDecayRate,
            mineralMultiplier
          }
        };
      }, [cpu, gpu, ram, cooler, motherboard, storage]);

      // ----------------------------------------------------------------------
      // 6. 초당 자동 미네랄 수급 라이프사이클
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          // 과열 페널티가 활성화되면 초당 수익이 50% 삭감됨
          const autoEarn = Math.round(10 * specs.penalties.mineralMultiplier * huntingGround.multiplier);
          setMinerals(prev => prev + autoEarn);
        }, 1000);

        return () => clearInterval(interval);
      }, [specs, huntingGround]);

      // ----------------------------------------------------------------------
      // 7. 실시간 상점 강화 비용 계산 헬퍼
      // ----------------------------------------------------------------------
      const getUpgradeCost = (level) => {
        return Math.round(100 * Math.pow(1.6, level));
      };

      // 부품 강화 핸들러
      const handleUpgrade = (part, setter) => {
        const cost = getUpgradeCost(part.level);
        if (minerals < cost) {
          alert('미네랄이 부족합니다.');
          return;
        }

        setMinerals(prev => prev - cost);
        
        // 쿨러의 경우 쿨링 수용량도 20씩 레벨 비례 자동 증가
        if (setter === setCooler) {
          setter(prev => ({
            ...prev,
            level: prev.level + 1,
            coolingCapacity: prev.coolingCapacity + 25
          }));
        } else if (setter === setRam) {
          setter(prev => ({
            ...prev,
            level: prev.level + 1,
            clockMhz: prev.clockMhz + 400,
            capacityGb: prev.capacityGb + 8
          }));
        } else if (setter === setStorage) {
          setter(prev => ({
            ...prev,
            level: (prev.level || 1) + 1,
            capacityGb: prev.capacityGb + 250
          }));
        } else {
          setter(prev => ({
            ...prev,
            level: prev.level + 1
          }));
        }
      };

      // 메인보드 완제품 변경 구매 핸들러
      const handlePurchaseMotherboard = (socketM, ddrGen, shieldVal, cost) => {
        if (minerals < cost) {
          alert('미네랄이 부족합니다.');
          return;
        }
        setMinerals(prev => prev - cost);
        setMotherboard({
          socketManufacturer: socketM,
          supportedDdrGeneration: ddrGen,
          shieldIncrease: shieldVal
        });
      };

      // ----------------------------------------------------------------------
      // 8. 상위 사냥터(게임) 다운로드 진행도 시뮬레이션
      // ----------------------------------------------------------------------
      const startDownload = () => {
        if (storage.capacityGb < downloadTarget.requiredGb) {
          alert(`저장장치 용량이 부족하여 이 게임을 내려받을 수 없습니다. (필요: ${downloadTarget.requiredGb}GB, 현재: ${storage.capacityGb}GB)`);
          return;
        }
        setIsDownloading(true);
        setDownloadProgress(0);
      };

      useEffect(() => {
        if (!isDownloading) return;

        const interval = setInterval(() => {
          setDownloadProgress(prev => {
            const currentSize = (prev / 100) * downloadTarget.sizeMb;
            const nextSize = currentSize + (specs.downloadSpeedMb); // 스토리지의 다운로드 속도 반영
            
            if (nextSize >= downloadTarget.sizeMb) {
              clearInterval(interval);
              setIsDownloading(false);
              // 사냥터 승급 완료
              setHuntingGround({
                name: downloadTarget.name,
                multiplier: downloadTarget.multiplier
              });
              // 다음 사냥터 업그레이드 타겟팅 자동 갱신
              setDownloadTarget({
                name: '데이터 웜홀 센터 (3단계)',
                sizeMb: 25000,
                requiredGb: 1000,
                multiplier: 5.0
              });
              return 100;
            }
            return (nextSize / downloadTarget.sizeMb) * 100;
          });
        }, 100);

        return () => clearInterval(interval);
      }, [isDownloading, specs.downloadSpeedMb, downloadTarget]);

      // ----------------------------------------------------------------------
      // 9. 실시간 웹소켓 100층 레이드 방 연결 핸들러
      // ----------------------------------------------------------------------
      const joinRaidRoom = () => {
        setErrorMessage(null);
        setRewardMessage(null);
        setIsRaidOpen(true);

        // 로컬 호스팅 포트에 맞춰 Socket.io 소켓 커넥션 연결
        const socketCon = io({
          reconnection: false
        });

        socketCon.on('connect', () => {
          console.log('[Socket] Connected to server.');
          // 방 참여 이벤트 발송 (내 조립 컴퓨터 부품 스펙 함께 전송)
          socketCon.emit('joinRoom', {
            roomId: 'carry-room-100',
            userId: myId,
            nickname: nickname,
            parts: { cpu, gpu, ram, cooler, motherboard, storage }
          });
        });

        // 실시간 방 요약본 데이터 브로드캐스트 수신
        socketCon.on('room_state', (state) => {
          setRaidState(state);
        });

        // 10층 단위 돌파에 따른 트랜잭션 보상 지급 이벤트 수신
        socketCon.on('milestone_reward_claimed', (data) => {
          const { clearedFloor, txResult } = data;
          if (txResult.success) {
            setScaCoins(txResult.currentTotalCoins); // 실시간 내 SCA 잔고 갱신
            setRewardMessage(`돌파 성공. ${clearedFloor}층 마일스톤 보상 SCA 코인 +${txResult.claimedCoins} 지급 완료.`);
            setTimeout(() => setRewardMessage(null), 4000);
          }
        });

        socketCon.on('error_message', (msg) => {
          setErrorMessage(msg);
        });

        socketCon.on('disconnect', () => {
          console.log('[Socket] Disconnected.');
        });

        setSocket(socketCon);
      };

      // 레이드 취소 및 나가기
      const leaveRaidRoom = () => {
        if (socket) {
          socket.disconnect();
        }
        setSocket(null);
        setRaidState(null);
        setIsRaidOpen(false);
      };

      // 준비 토글
      const toggleReady = () => {
        if (socket && raidState) {
          const me = raidState.players.find(p => p.userId === myId);
          if (me) {
            socket.emit('readyStatus', { isReady: !me.isReady });
          }
        }
      };

      // 가상 미네랄 수동 클릭 채굴 기능
      const handleManualClick = () => {
        const income = Math.round(5 * specs.penalties.mineralMultiplier * huntingGround.multiplier);
        setMinerals(prev => prev + income);
      };

      // 아이콘 자동 바인딩을 위한 컴포넌트 헬퍼
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      return (
        <div class="container mx-auto p-4 max-w-7xl">
          
          {/* ================================================================== */}
          {/* 상단 자원 바 (SCI-FI 플랫 헤더) */}
          {/* ================================================================== */}
          <header class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 items-center bg-slate-900/60 p-4 rounded-xl border border-emerald-500/20 neon-border-emerald">
            <div class="flex items-center space-x-3">
              <div class="p-2 bg-emerald-500/10 rounded-lg text-emerald-400 border border-emerald-500/30">
                <i data-lucide="cpu" class="w-6 h-6"></i>
              </div>
              <div>
                <h1 class="text-sm text-slate-400 uppercase tracking-widest font-semibold">복원 제어 터미널</h1>
                <p class="text-xs text-emerald-500 font-mono">CONNECTION ACTIVE</p>
              </div>
            </div>

            {/* 미네랄 */}
            <div class="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-slate-800">
              <span class="text-xs uppercase tracking-wider text-slate-400 font-mono">MINERALS</span>
              <span class="text-lg font-bold text-emerald-400 font-mono flex items-center space-x-1">
                <span>{minerals.toLocaleString()}</span>
                <span class="text-xs text-emerald-500/60 ml-1">M</span>
              </span>
            </div>

            {/* 일반 코인 */}
            <div class="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-slate-800">
              <span class="text-xs uppercase tracking-wider text-slate-400 font-mono">NORMAL COINS</span>
              <span class="text-lg font-bold text-cyan-400 font-mono">
                {normalCoins.toLocaleString()}
              </span>
            </div>

            {/* SCA 코인 (클라우드 영구 재화) */}
            <div class="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-cyan-500/30 neon-border-cyan">
              <div class="flex items-center space-x-1.5">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span>
                <span class="text-xs uppercase tracking-wider text-cyan-300 font-mono">SCA CLOUD COINS</span>
              </div>
              <span class="text-lg font-bold text-cyan-300 font-mono">
                {scaCoins.toLocaleString()}
              </span>
            </div>
          </header>

          {/* ================================================================== */}
          {/* 중앙 그리드 레이아웃 */}
          {/* ================================================================== */}
          <main class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            {/* ---------------------------------------------------------------- */}
            {/* 좌측 - 내 컴퓨터 상태창 (컴퓨터 스펙 및 경고창) */}
            {/* ---------------------------------------------------------------- */}
            <section class="lg:col-span-5 bg-slate-900/40 p-6 rounded-xl border border-slate-800 flex flex-col space-y-6">
              <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <h2 class="text-md uppercase tracking-widest text-slate-300 font-mono flex items-center space-x-2">
                  <i data-lucide="monitor" class="w-5 h-5 text-emerald-400"></i>
                  <span>내 하드웨어 모니터</span>
                </h2>
                <span class="text-xs font-mono px-2 py-0.5 rounded bg-slate-800 text-slate-400 border border-slate-700">DDR {cpu.ddrGeneration} SYSTEM</span>
              </div>

              {/* 페널티 및 이상 발생 모듈 (네온 레드 시각 유도) */}
              {(specs.penalties.isOverheated || specs.penalties.isSocketMismatched || specs.penalties.isDdrMismatched) && (
                <div class="p-4 bg-rose-950/20 border border-rose-500/50 rounded-lg neon-border-rose space-y-2.5 animate-pulse">
                  <h3 class="text-xs font-bold text-rose-500 uppercase tracking-widest font-mono flex items-center space-x-1.5">
                    <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                    <span>시스템 임계 경고 감지됨</span>
                  </h3>
                  
                  {specs.penalties.isOverheated && (
                    <div class="text-xs text-rose-400 font-mono">
                      ⚠️ OVERHEAT ERROR: CPU 요구 열량({specs.cpuHeatDemand})이 쿨러 능력({cooler.coolingCapacity})을 초과했습니다. 초당 미네랄 수입이 50% 삭감되었으며 유닛 강철 피로도로 인해 방어력이 반감되었습니다.
                    </div>
                  )}

                  {specs.penalties.isSocketMismatched && (
                    <div class="text-xs text-rose-400 font-mono">
                      ⚠️ SOCKET MISMATCH: CPU 제조사({cpu.manufacturer})와 메인보드 소켓 제조사({motherboard.socketManufacturer})가 일치하지 않아 코어 접촉 불량으로 가용 필드 유닛 한도가 절반으로 축소됩니다.
                    </div>
                  )}

                  {specs.penalties.isDdrMismatched && (
                    <div class="text-xs text-rose-400 font-mono">
                      ❌ COMPATIBILITY ERROR: CPU, RAM, 메인보드의 DDR 규격이 다릅니다. 초당 극단적인 HP Decay 디버프({specs.penalties.hpDecayRate * 100}%/초 HP 자동 감소)로 유닛들이 실시간으로 파괴될 위험이 있습니다.
                    </div>
                  )}
                </div>
              )}

              {/* 장착 부품 리스트 및 세대 규격 명세 */}
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                {/* CPU */}
                <div class="p-3 bg-slate-950/60 rounded border border-slate-800 flex justify-between items-center">
                  <div>
                    <p class="text-[10px] text-slate-500 font-mono">CPU MODULE</p>
                    <p class="text-sm font-semibold text-slate-200">{cpu.manufacturer} Level {cpu.level}</p>
                  </div>
                  <span class="text-[10px] font-mono px-1.5 py-0.5 rounded bg-emerald-950/40 text-emerald-400 border border-emerald-500/20">{cpu.ddrGeneration}</span>
                </div>

                {/* GPU */}
                <div class="p-3 bg-slate-950/60 rounded border border-slate-800 flex justify-between items-center">
                  <div>
                    <p class="text-[10px] text-slate-500 font-mono">GPU ENGINE</p>
                    <p class="text-sm font-semibold text-slate-200">RTX Series Level {gpu.level}</p>
                  </div>
                  <span class="text-[10px] font-mono px-1.5 py-0.5 rounded bg-cyan-950/40 text-cyan-400 border border-cyan-500/20">PCI-E</span>
                </div>

                {/* RAM */}
                <div class="p-3 bg-slate-950/60 rounded border border-slate-800 flex justify-between items-center">
                  <div>
                    <p class="text-[10px] text-slate-500 font-mono">SYSTEM MEMORY</p>
                    <p class="text-sm font-semibold text-slate-200">{ram.capacityGb}GB Clock {ram.clockMhz}Mhz</p>
                  </div>
                  <span class="text-[10px] font-mono px-1.5 py-0.5 rounded bg-emerald-950/40 text-emerald-400 border border-emerald-500/20">{ram.ddrGeneration}</span>
                </div>

                {/* Cooler */}
                <div class="p-3 bg-slate-950/60 rounded border border-slate-800 flex justify-between items-center">
                  <div>
                    <p class="text-[10px] text-slate-500 font-mono">COOLING BLADE</p>
                    <p class="text-sm font-semibold text-slate-200">Level {cooler.level} (Cap: {cooler.coolingCapacity})</p>
                  </div>
                  <span class="text-[10px] font-mono px-1.5 py-0.5 rounded bg-slate-800 text-slate-400">LIQUID</span>
                </div>

                {/* Motherboard */}
                <div class="p-3 bg-slate-950/60 rounded border border-slate-800 flex justify-between items-center col-span-2">
                  <div>
                    <p class="text-[10px] text-slate-500 font-mono">MOTHERBOARD (NOT UPGRADABLE)</p>
                    <p class="text-sm font-semibold text-slate-200">Z-Series {motherboard.socketManufacturer} Socket Board</p>
                  </div>
                  <span class="text-[10px] font-mono px-1.5 py-0.5 rounded bg-cyan-950/40 text-cyan-400 border border-cyan-500/20">{motherboard.supportedDdrGeneration} SLOT</span>
                </div>

                {/* Storage */}
                <div class="p-3 bg-slate-950/60 rounded border border-slate-800 flex justify-between items-center col-span-2">
                  <div>

                            </span>
                          </div>
                        );
                      })}

                      {/* 빈 슬롯 연출 */}
                      {Array.from({ length: 4 - raidState.players.length }).map((_, idx) => (
                        <div key={idx} class="p-4 bg-slate-950/20 border border-slate-900 border-dashed rounded-lg flex flex-col items-center justify-center text-center text-slate-700 min-h-[120px]">
                          <i data-lucide="plus" class="w-6 h-6 stroke-dashed"></i>
                          <span class="text-[9px] font-mono mt-1">대기 중...</span>
                        </div>
                      ))}
                    </div>

                    <button 
                      onClick={toggleReady}
                      class="px-8 py-3.5 bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition text-slate-950 font-bold rounded-lg font-mono text-sm shadow-lg shadow-emerald-500/20"
                    >
                      {raidState.players.find(p => p.userId === myId)?.isReady ? '준비 취소' : '레이드 준비 완료'}
                    </button>
                  </div>
                )}

                {/* 전투 진행 중 UI */}
                {raidState && (raidState.status === 'fighting' || raidState.status === 'won' || raidState.status === 'lost') && (
                  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    {/* 좌측 2슬롯 - 층수 전광판 및 보스 HP 게이지 */}
                    <div class="lg:col-span-2 flex flex-col space-y-6">
                      
                      {/* 거대한 층수 전광판 */}
                      <div class="bg-slate-950/80 border border-cyan-500/30 p-6 rounded-xl text-center neon-border-cyan flex flex-col items-center justify-center relative overflow-hidden">
                        <div class="absolute top-2 left-3 text-[9px] font-mono text-cyan-500/40 uppercase">LIVE COMPUTE COMBAT MONITOR</div>
                        
                        {/* 층수 텍스트 */}
                        <div class="text-[10px] font-mono uppercase tracking-widest text-slate-500">BOSS RAID STAGE</div>
                        <div class="text-4xl font-extrabold text-cyan-300 font-mono tracking-wider mt-1.5">
                          FLOOR {raidState.currentFloor} <span class="text-lg text-slate-500">/ 100</span>
                        </div>

                        {/* 상태 안내 */}
                        {raidState.status === 'won' ? (
                          <span class="mt-3 text-xs font-bold text-emerald-400 uppercase tracking-widest font-mono border border-emerald-500/30 bg-emerald-950/20 px-3 py-1 rounded">100층 완전 등반 성공</span>
                        ) : raidState.status === 'lost' ? (
                          <span class="mt-3 text-xs font-bold text-rose-400 uppercase tracking-widest font-mono border border-rose-500/30 bg-rose-950/20 px-3 py-1 rounded">시간 초과 패배</span>
                        ) : (
                          <span class="mt-3 text-xs font-bold text-cyan-400 uppercase tracking-widest font-mono border border-cyan-500/30 bg-cyan-950/20 px-3 py-1 rounded animate-pulse">전투 연산 진행 중</span>
                        )}
                      </div>

                      {/* 보스 체력바 게이지 */}
                      <div class="bg-slate-900/40 border border-slate-800 p-5 rounded-xl space-y-3 flex flex-col">
                        <div class="flex justify-between items-center text-xs">
                          <span class="font-bold text-slate-300 uppercase tracking-wider font-mono flex items-center space-x-1">
                            <i data-lucide="skull" class="w-4 h-4 text-rose-500"></i>
                            <span>보스 개체 체력</span>
                          </span>
                          <span class="text-rose-400 font-mono font-bold">
                            {raidState.bossCurrentHp.toLocaleString()} / {raidState.bossMaxHp.toLocaleString()} ({Math.round((raidState.bossCurrentHp / raidState.bossMaxHp) * 100)}%)
                          </span>
                        </div>

                        {/* 보스 HP 바 */}
                        <div class="w-full bg-slate-950 rounded-full h-5 overflow-hidden border border-slate-800 p-0.5">
                          <div 
                            class="bg-rose-500 h-full rounded-full transition-all duration-300 flex justify-end items-center pr-2 relative"
                            style={{ width: `${(raidState.bossCurrentHp / raidState.bossMaxHp) * 100}%` }}
                          >
                            <span class="text-[9px] font-bold text-slate-950 font-mono z-10"></span>
                          </div>
                        </div>

                        {/* 시간 제한 Progress Bar */}
                        <div class="flex justify-between items-center text-[10px] font-mono pt-1 text-slate-500">
                          <span>남은 타임아웃 제한 시간</span>
                          <span class={`font-bold ${raidState.timeLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-slate-400'}`}>{raidState.timeLeft} 초</span>
                        </div>
                        <div class="w-full bg-slate-950 rounded-full h-2 overflow-hidden border border-slate-800">
                          <div 
                            class={`h-full rounded-full transition-all duration-1000 ${raidState.timeLeft <= 10 ? 'bg-rose-500' : 'bg-slate-600'}`}
                            style={{ width: `${(raidState.timeLeft / 30) * 100}%` }}
                          ></div>
                        </div>
                      </div>
                    </div>

                    {/* 우측 1슬롯 - 파티원 개별 DPS 기여도 및 마일스톤 */}
                    <div class="flex flex-col space-y-6">
                      
                      {/* 파티원 DPS 기여도 미니 바 차트 */}
                      <div class="bg-slate-900/40 border border-slate-800 p-5 rounded-xl flex flex-col space-y-4">
                        <h3 class="text-xs text-slate-400 font-bold uppercase tracking-widest border-b border-slate-800 pb-2 flex items-center space-x-1">
                          <i data-lucide="bar-chart" class="w-4 h-4 text-cyan-400"></i>
                          <span>실시간 파티원 기여도</span>
                        </h3>

                        <div class="space-y-4">
                          {raidState.players.map((p) => {
                            const isMe = p.userId === myId;
                            const share = raidState.totalDps > 0 ? (p.dpsContribution / raidState.totalDps) * 100 : 0;
                            return (
                              <div key={p.userId} class="space-y-1">
                                <div class="flex justify-between text-xs font-mono">
                                  <span class={`truncate max-w-[140px] ${isMe ? 'text-cyan-300 font-bold' : 'text-slate-300'}`}>
                                    {p.nickname} {isMe && '(나)'} {p.isDead && '(⚠️사망)'}
                                  </span>
                                  <span class="text-slate-500 font-bold">{p.dpsContribution.toLocaleString()} DPS</span>
                                </div>
                                
                                {/* 가로 바 차트 */}
                                <div class="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-900">
                                  <div 
                                    class={`h-full rounded-full transition-all duration-300 ${p.isDead ? 'bg-rose-500' : isMe ? 'bg-cyan-400' : 'bg-slate-700'}`}
                                    style={{ width: `${p.isDead ? 100 : share}%` }}
                                  ></div>
                                </div>
                                <div class="flex justify-between text-[9px] font-mono text-slate-500">
                                  <span>{p.isDead ? 'DDR에러 유닛 파괴됨' : `지분: ${Math.round(share)}%`}</span>
                                  {p.currentHp !== undefined && (
                                    <span>HP: {p.currentHp} / {p.maxHp}</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        {/* 합산 DPS 표기 */}
                        <div class="pt-3 border-t border-slate-800 flex justify-between items-center text-xs font-mono">
                          <span class="text-slate-500">파티 합산 누적 DPS:</span>
                          <span class="text-cyan-400 font-bold">{raidState.totalDps.toLocaleString()}</span>
                        </div>
                      </div>

                      {/* 오늘 보상 가능 구간 정보 (UI 내 텍스트 마일스톤) */}
                      <div class="bg-slate-900/40 border border-slate-800 p-5 rounded-xl flex flex-col space-y-3 font-mono">
                        <h3 class="text-xs text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-2 flex items-center space-x-1">
                          <i data-lucide="trophy" class="w-4 h-4 text-cyan-300"></i>
                          <span>오늘 남은 보상 구간</span>
                        </h3>
                        <div class="flex flex-col space-y-2 text-xs">
                          <div class="flex justify-between">
                            <span class="text-slate-500">수령 가능 마일스톤:</span>
                            <span class="text-cyan-300 font-bold">10층 ~ 100층 (10층단위)</span>
                          </div>
                          <div class="flex justify-between text-[11px] text-slate-400">
                            <span>오늘 남은 보상 층수:</span>
                            <span class="text-emerald-400 font-bold">
                              {raidState.currentFloor <= 100 ? `${Math.ceil(raidState.currentFloor / 10) * 10}층 ~ 100층` : '모든 구간 수령 완료'}
                            </span>
                          </div>
                          <p class="text-[9px] text-slate-500 mt-2 border-t border-slate-900 pt-2 leading-relaxed">
                            * 보상은 하루에 단 한 번, 날짜가 바뀌면 수령 완료 최고 층수가 0으로 리셋되며 다시 처음부터 순차로 차분 획득 가능합니다.
                          </p>
                        </div>
                      </div>

                    </div>

                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
