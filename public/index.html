<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>'컴퓨터 강화하기' 웹 복원판 대시보드</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React, ReactDOM, Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts Outfit & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Socket.io Client -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      font-family: 'Outfit', 'JetBrains Mono', sans-serif;
    }
    .neon-border-emerald {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.1);
    }
    .neon-border-rose {
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.4), inset 0 0 10px rgba(244, 63, 94, 0.2);
    }
    .neon-border-cyan {
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 10px rgba(6, 182, 212, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden selection:bg-emerald-500 selection:text-slate-950">

  <div id="root"></div>

  <!-- React UI 컴포넌트 마운트 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function App() {
      // ----------------------------------------------------------------------
      // 1. 핵심 유저 재화 및 강화 피드백 상태 정의
      // ----------------------------------------------------------------------
      const [minerals, setMinerals] = useState(2000);
      const [normalCoins, setNormalCoins] = useState(50);
      const [scaCoins, setScaCoins] = useState(0);

      // 확률 강화 피드백 전용 상태
      const [upgradeStatus, setUpgradeStatus] = useState(null); // 'success', 'fail_keep', 'fail_drop', 'exploded', 'upgrading'
      const [upgradeMessage, setUpgradeMessage] = useState('');
      const [isUpgrading, setIsUpgrading] = useState(false);
      const [activeUpgradingPart, setActiveUpgradingPart] = useState(null);
      const [rebirthCount, setRebirthCount] = useState(0);

      // ----------------------------------------------------------------------
      // 2. 조립 컴퓨터 부품 상태 정의
      // ----------------------------------------------------------------------
      const [cpu, setCpu] = useState({ manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR4' });
      const [gpu, setGpu] = useState({ level: 1 });
      const [ram, setRam] = useState({ level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' });
      const [cooler, setCooler] = useState({ level: 1, coolingCapacity: 30 });
      const [motherboard, setMotherboard] = useState({ socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR4', shieldIncrease: 300 });
      const [storage, setStorage] = useState({ type: 'HDD', capacityGb: 250, level: 1 });

      // ----------------------------------------------------------------------
      // 3. 사냥터 및 다운로드 진행 상태 정의
      // ----------------------------------------------------------------------
      const [huntingGround, setHuntingGround] = useState({ name: '테이블 탑 조립소 (1단계)', multiplier: 1.0 });
      const [isDownloading, setIsDownloading] = useState(false);
      const [downloadProgress, setDownloadProgress] = useState(0);
      const [downloadTarget, setDownloadTarget] = useState({ name: '서버 랙 테마파크 (2단계)', sizeMb: 5000, requiredGb: 500, multiplier: 2.5 });

      // ----------------------------------------------------------------------
      // 4. 실시간 소켓 멀티플레이 레이드 상태 정의
      // ----------------------------------------------------------------------
      const [isRaidOpen, setIsRaidOpen] = useState(false);
      const [socket, setSocket] = useState(null);
      const [raidState, setRaidState] = useState(null);
      const [rewardMessage, setRewardMessage] = useState(null);
      const [myId] = useState(`u-${Math.random().toString(36).substring(2, 8)}`);
      const [nickname] = useState(`Player_${Math.floor(100 + Math.random() * 900)}`);
      const [errorMessage, setErrorMessage] = useState(null);

      // ----------------------------------------------------------------------
      // 스타1 컴퓨터강화 유즈맵 고증 부품 이름 매핑 헬퍼
      // ----------------------------------------------------------------------
      const getCpuName = (level) => {
        const names = {
          1: '똥컴 CPU (Dual-Core)',
          2: '인텔 펜티엄 4',
          3: '인텔 코어2듀오 E6600',
          4: '인텔 Core i3 4세대',
          5: '인텔 Core i5 9세대',
          6: '인텔 Core i7 12세대',
          7: '인텔 Core i9 14세대',
          8: '인텔 Xeon Platinum',
          9: 'AMD Ryzen Threadripper',
          10: '양자 슈퍼컴퓨터 코어 v1.2'
        };
        return names[level] || `차세대 퀀텀 CPU (Lv.${level})`;
      };

      const getGpuName = (level) => {
        const names = {
          1: 'Riva TNT2 (16MB)',
          2: 'NVIDIA GeForce 8600GT',
          3: 'NVIDIA GeForce GTS250',
          4: 'NVIDIA GeForce GTX460',
          5: 'NVIDIA GeForce GTX760',
          6: 'NVIDIA GeForce GTX1060 (6GB)',
          7: 'NVIDIA GeForce RTX2060 Super',
          8: 'NVIDIA GeForce RTX3060 Ti',
          9: 'NVIDIA GeForce RTX4090 D',
          10: 'NVIDIA GH200 Grace Hopper AI'
        };
        return names[level] || `AI 딥러닝 텐서 GPU (Lv.${level})`;
      };

      const getRamName = (level) => {
        const names = {
          1: 'Legacy SDRAM 4GB',
          2: 'DDR3 High-Speed 8GB',
          3: 'DDR3 Dual-Channel 16GB',
          4: 'DDR4 Gamer Edition 16GB',
          5: 'DDR4 RGB Corsair 32GB',
          6: 'DDR5 Trident Z 32GB',
          7: 'DDR5 Quad-Channel 64GB',
          8: 'DDR5 ECC Server 128GB',
          9: 'SK Hynix HBM3e 96GB',
          10: '초임계 양자 가속 HBM4 192GB'
        };
        return names[level] || `양자 초고속 메모리 (Lv.${level})`;
      };

      const getCoolerName = (level) => {
        const names = {
          1: '인텔 기본 번들 (초코파이)',
          2: '구리 히트싱크 알루미늄 공랭',
          3: '보급형 타워 싱글팬 공랭',
          4: '듀얼타워 대장급 공랭 (NH-D15)',
          5: '240mm 2열 짭수랭 (AIO)',
          6: '360mm 3열 RGB 수랭 (Kraken)',
          7: '커스텀 아크릴 수로 오픈형 수랭',
          8: '외장 거대 라디에이터 모라(MORA)',
          9: '공업용 액체 냉동 칠러 (Chiller)',
          10: 'LN2 액체질소 극한 냉각 제어탑'
        };
        return names[level] || `반중력 열복사 냉각 시스템 (Lv.${level})`;
      };

      // ----------------------------------------------------------------------
      // 5. 실시간 하드웨어 스펙 연산 (2단계 백엔드 공식과 100% 매칭)
      // ----------------------------------------------------------------------
      const specs = useMemo(() => {
        // A. 과열 시스템 감지
        const cpuHeatDemand = cpu.level * 15;
        const isOverheated = cpuHeatDemand > cooler.coolingCapacity;
        const mineralMultiplier = isOverheated ? 0.5 : 1.0;

        // B. 소켓 불일치 감지
        const isSocketMismatched = cpu.manufacturer !== motherboard.socketManufacturer;

        // C. DDR 세대 불일치 감지
        const ddrSet = new Set([cpu.ddrGeneration, ram.ddrGeneration, motherboard.supportedDdrGeneration]);
        const isDdrMismatched = ddrSet.size > 1;
        const hpDecayRate = isDdrMismatched ? (ddrSet.size === 2 ? 0.50 : 1.00) : 0.00;

        // D. 가용 유닛 수 상한
        let unitLimit = cpu.level * 2;
        if (isSocketMismatched) {
          unitLimit = Math.max(1, Math.floor(unitLimit * 0.5));
        }

        // E. 사냥터 가용 유닛 수 (RAM 용량)
        const maxHuntingUnits = Math.floor(ram.capacityGb / 4);

        // F. 유닛 체력 및 메인보드 고정 실드
        const unitHp = 100 * cpu.level;
        const unitShield = motherboard.shieldIncrease;

        // G. 공격 주기
        const calculatedAttackSpeed = 2.0 - (ram.clockMhz / 4000);
        const attackSpeedSec = Math.max(0.1, Math.round(calculatedAttackSpeed * 100) / 100);

        // H. 데미지 (GPU 기하급수 성장)
        const unitDamage = Math.round(10 * Math.pow(1.5, gpu.level - 1));

        // I. 방어력
        let unitDefense = cooler.level * 3;
        if (isOverheated) {
          unitDefense = Math.max(0, Math.floor(unitDefense * 0.5));
        }

        // J. 다운로드 속도 (HDD/SSD 4배 및 용량 비례)
        let downloadSpeedMb = 25 + (storage.capacityGb * 0.01);
        if (storage.type === 'SSD') {
          downloadSpeedMb = 100 + (storage.capacityGb * 0.05); // HDD의 정확한 4배 베이스 적용
        }
        downloadSpeedMb = Math.round(downloadSpeedMb * 10) / 10;

        return {
          unitLimit,
          maxHuntingUnits,
          unitHp,
          unitShield,
          attackSpeedSec,
          unitDamage,
          unitDefense,
          downloadSpeedMb,
          cpuHeatDemand,
          penalties: {
            isOverheated,
            isSocketMismatched,
            isDdrMismatched,
            hpDecayRate,
            mineralMultiplier
          }
        };
      }, [cpu, gpu, ram, cooler, motherboard, storage]);

      // ----------------------------------------------------------------------
      // 6. 초당 자동 미네랄 수급 라이프사이클 (환생 버프 적용)
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          const baseEarn = Math.round(10 * specs.penalties.mineralMultiplier * huntingGround.multiplier);
          const autoEarn = Math.round(baseEarn * (1 + rebirthCount * 0.5));
          setMinerals(prev => prev + autoEarn);
        }, 1000);

        return () => clearInterval(interval);
      }, [specs, huntingGround, rebirthCount]);

      // ----------------------------------------------------------------------
      // 7. 실시간 상점 강화 비용 계산 헬퍼
      // ----------------------------------------------------------------------
      const getUpgradeCost = (level) => {
        return Math.round(100 * Math.pow(1.6, level));
      };

      // 부품 강화 확률 매핑 함수
      const getUpgradeProbability = (level) => {
        if (level === 1) return 1.0;
        if (level === 2) return 0.90;
        if (level === 3) return 0.80;
        if (level === 4) return 0.70;
        if (level === 5) return 0.60;
        if (level === 6) return 0.50;
        if (level === 7) return 0.40;
        if (level === 8) return 0.30;
        if (level === 9) return 0.20;
        return 0.10; // 10강 이상
      };

      // 부품 강화 핸들러
      const handleUpgrade = (part, setter, partName) => {
        if (isUpgrading) return;
        
        const cost = getUpgradeCost(part.level);
        if (minerals < cost) {
          alert('미네랄이 부족합니다.');
          return;
        }

        setMinerals(prev => prev - cost);
        setIsUpgrading(true);
        setActiveUpgradingPart(partName);
        setUpgradeStatus('upgrading');
        setUpgradeMessage(`${partName.toUpperCase()} 강화 주입 중... (체스소켓 연동)`);

        setTimeout(() => {
          const currentLevel = part.level;
          const prob = getUpgradeProbability(currentLevel);
          const rand = Math.random();
          
          let result = 'success';
          if (rand <= prob) {
            result = 'success';
          } else {
            if (currentLevel <= 5) {
              result = 'fail_keep';
            } else if (currentLevel <= 7) {
              result = 'fail_drop';
            } else {
              const explodeChance = currentLevel === 8 ? 0.5 : currentLevel === 9 ? 0.7 : 0.9;
              if (Math.random() <= explodeChance) {
                result = 'exploded';
              } else {
                result = 'fail_drop';
              }
            }
          }

          setIsUpgrading(false);
          setUpgradeStatus(result);

          if (result === 'success') {
            const nextLvl = currentLevel + 1;
            setUpgradeMessage(`🎉 [강화 성공] ${partName.toUpperCase()} 강화 성공! (+${nextLvl}강)`);
            
            if (setter === setCooler) {
              setter(prev => ({
                ...prev,
                level: prev.level + 1,
                coolingCapacity: prev.coolingCapacity + 25
              }));
            } else if (setter === setRam) {
              setter(prev => ({
                ...prev,
                level: prev.level + 1,
                clockMhz: prev.clockMhz + 400,
                capacityGb: prev.capacityGb + 8
              }));
            } else if (setter === setStorage) {
              setter(prev => ({
                ...prev,
                level: (prev.level || 1) + 1,
                capacityGb: prev.capacityGb + 250
              }));
            } else {
              setter(prev => ({
                ...prev,
                level: prev.level + 1
              }));
            }
          } else if (result === 'fail_keep') {
            setUpgradeMessage(`⚠️ [강화 실패] 업그레이드 실패. 부품이 안전하게 보존되었습니다.`);
          } else if (result === 'fail_drop') {
            const prevLvl = Math.max(1, currentLevel - 1);
            setUpgradeMessage(`📉 [등급 하락] 전원 불일치로 레벨이 하락했습니다. (+${prevLvl}강)`);
            
            if (setter === setCooler) {
              setter(prev => ({
                ...prev,
                level: prevLvl,
                coolingCapacity: Math.max(30, prev.coolingCapacity - 25)
              }));
            } else if (setter === setRam) {
              setter(prev => ({
                ...prev,
                level: prevLvl,
                clockMhz: Math.max(2400, prev.clockMhz - 400),
                capacityGb: Math.max(8, prev.capacityGb - 8)
              }));
            } else if (setter === setStorage) {
              setter(prev => ({
                ...prev,
                level: prevLvl,
                capacityGb: Math.max(250, prev.capacityGb - 250)
              }));
            } else {
              setter(prev => ({
                ...prev,
                level: prevLvl
              }));
            }
          } else if (result === 'exploded') {
            setUpgradeMessage(`💥 [부품 파괴] 아아..! 부품이 과전압 합선으로 폭발해 파괴되었습니다! (+1강 초기화)`);
            
            if (setter === setCooler) {
              setter({ manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR4', coolingCapacity: 30 });
            } else if (setter === setRam) {
              setter({ level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' });
            } else if (setter === setStorage) {
              setter({ type: 'HDD', capacityGb: 250, level: 1 });
            } else if (setter === setCpu) {
              setter(prev => ({ ...prev, level: 1 }));
            } else if (setter === setGpu) {
              setter({ level: 1 });
            }
          }

          setTimeout(() => {
            setUpgradeStatus(null);
            setUpgradeMessage('');
          }, 4000);
        }, 600);
      };

      // GPU 환생 처리 핸들러
      const handleRebirth = () => {
        if (gpu.level < 10) {
          alert('환생은 GPU가 10강에 도달해야만 가능합니다.');
          return;
        }

        const confirmRebirth = confirm('정말 GPU 환생을 수행하시겠습니까?\n\n환생 시 모든 부품 레벨과 미네랄이 리셋되지만, SCA 클라우드 코인 +10개 획득 및 영구 자동 미네랄 수급 버프(+50% 복리 증가)가 상시 활성화됩니다.');
        if (!confirmRebirth) return;

        setScaCoins(prev => prev + 10);
        setRebirthCount(prev => prev + 1);
        setMinerals(0);

        setCpu({ manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR4' });
        setGpu({ level: 1 });
        setRam({ level: 1, clockMhz: 2400, capacityGb: 8, ddrGeneration: 'DDR4' });
        setCooler({ level: 1, coolingCapacity: 30 });
        setMotherboard({ socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR4', shieldIncrease: 300 });
        setStorage({ type: 'HDD', capacityGb: 250, level: 1 });
        setHuntingGround({ name: '테이블 탑 조립소 (1단계)', multiplier: 1.0 });

        setUpgradeStatus('success');
        setUpgradeMessage(`✨ [환생 성공] 차원 소켓 개방 완료! 영구 수급 배율 x${(1 + (rebirthCount + 1)*0.5).toFixed(1)} 증가.`);
        
        setTimeout(() => {
          setUpgradeStatus(null);
          setUpgradeMessage('');
        }, 5000);
      };

      // 메인보드 완제품 변경 구매 핸들러
      const handlePurchaseMotherboard = (socketM, ddrGen, shieldVal, cost) => {
        if (minerals < cost) {
          alert('미네랄이 부족합니다.');
          return;
        }
        setMinerals(prev => prev - cost);
        setMotherboard({
          socketManufacturer: socketM,
          supportedDdrGeneration: ddrGen,
          shieldIncrease: shieldVal
        });
      };

      // ----------------------------------------------------------------------
      // 8. 상위 사냥터(게임) 다운로드 진행도 시뮬레이션
      // ----------------------------------------------------------------------
      const startDownload = () => {
        if (storage.capacityGb < downloadTarget.requiredGb) {
          alert(`저장장치 용량이 부족하여 이 게임을 내려받을 수 없습니다. (필요: ${downloadTarget.requiredGb}GB, 현재: ${storage.capacityGb}GB)`);
          return;
        }
        setIsDownloading(true);
        setDownloadProgress(0);
      };

      useEffect(() => {
        if (!isDownloading) return;

        const interval = setInterval(() => {
          setDownloadProgress(prev => {
            const currentSize = (prev / 100) * downloadTarget.sizeMb;
            const nextSize = currentSize + (specs.downloadSpeedMb);
            
            if (nextSize >= downloadTarget.sizeMb) {
              clearInterval(interval);
              setIsDownloading(false);
              setHuntingGround({
                name: downloadTarget.name,
                multiplier: downloadTarget.multiplier
              });
              setDownloadTarget({
                name: '데이터 웜홀 센터 (3단계)',
                sizeMb: 25000,
                requiredGb: 1000,
                multiplier: 5.0
              });
              return 100;
            }
            return (nextSize / downloadTarget.sizeMb) * 100;
          });
        }, 100);

        return () => clearInterval(interval);
      }, [isDownloading, specs.downloadSpeedMb, downloadTarget]);

      // ----------------------------------------------------------------------
      // 9. 실시간 웹소켓 100층 레이드 방 연결 핸들러
      // ----------------------------------------------------------------------
      const joinRaidRoom = () => {
        setErrorMessage(null);
        setRewardMessage(null);
        setIsRaidOpen(true);

        const socketCon = io({
          reconnection: false
        });

        socketCon.on('connect', () => {
          console.log('[Socket] Connected to server.');
          socketCon.emit('joinRoom', {
            roomId: 'carry-room-100',
            userId: myId,
            nickname: nickname,
            parts: { cpu, gpu, ram, cooler, motherboard, storage }
          });
        });

        socketCon.on('room_state', (state) => {
          setRaidState(state);
        });

        socketCon.on('milestone_reward_claimed', (data) => {
          const { clearedFloor, txResult } = data;
          if (txResult.success) {
            setScaCoins(txResult.currentTotalCoins);
            setRewardMessage(`돌파 성공. ${clearedFloor}층 마일스톤 보상 SCA 코인 +${txResult.claimedCoins} 지급 완료.`);
            setTimeout(() => setRewardMessage(null), 4000);
          }
        });

        socketCon.on('error_message', (msg) => {
          setErrorMessage(msg);
        });

        socketCon.on('disconnect', () => {
          console.log('[Socket] Disconnected.');
        });

        setSocket(socketCon);
      };

      const leaveRaidRoom = () => {
        if (socket) {
          socket.disconnect();
        }
        setSocket(null);
        setRaidState(null);
        setIsRaidOpen(false);
      };

      const toggleReady = () => {
        if (socket && raidState) {
          const me = raidState.players.find(p => p.userId === myId);
          if (me) {
            socket.emit('readyStatus', { isReady: !me.isReady });
          }
        }
      };

      const handleManualClick = () => {
        const baseIncome = Math.round(5 * specs.penalties.mineralMultiplier * huntingGround.multiplier);
        const income = Math.round(baseIncome * (1 + rebirthCount * 0.5));
        setMinerals(prev => prev + income);
      };

      return (
        <div className="container mx-auto p-4 max-w-7xl">
          
          {/* ================================================================== */}
          {/* 상단 자원 바 */}
          {/* ================================================================== */}
          <header className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 items-center bg-slate-900/60 p-4 rounded-xl border border-emerald-500/20 neon-border-emerald">
            <div className="flex items-center space-x-3">
              <div className="p-2 bg-emerald-500/10 rounded-lg text-emerald-400 border border-emerald-500/30">
                <span className="text-xl">🧠</span>
              </div>
              <div>
                <h1 className="text-sm text-slate-400 uppercase tracking-widest font-semibold">복원 제어 터미널</h1>

                  <div className="p-4 bg-slate-950/60 rounded border border-slate-800 flex flex-col justify-between col-span-2">
                    <div>
                      <span className="text-xs font-bold text-cyan-300 font-mono block mb-1">MOTHERBOARD RACK SHOP (PROD)</span>
                      <p className="text-xs text-slate-400 mb-3">
                        소켓과 DDR 지원 규격을 내 컴퓨터 부품과 **일치하도록 직접 매치**하여 완제품으로 구매하세요. (오조립 시 페널티 발생 가능)
                      </p>
                    </div>
                    <div className="grid grid-cols-3 gap-2.5 pt-2.5 border-t border-slate-900">
                      <button 
                        onClick={() => handlePurchaseMotherboard('Intel', 'DDR4', 500, 500)}
                        className="p-2 bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-cyan-500/30 rounded flex flex-col items-center justify-center transition text-center"
                      >
                        <span className="text-[10px] font-bold text-slate-200">인텔 호환 보드</span>
                        <span className="text-[9px] text-cyan-400 font-mono">DDR4 / 실드+500</span>
                        <span className="text-[10px] text-emerald-400 font-mono font-bold mt-1">500 M</span>
                      </button>
                      <button 
                        onClick={() => handlePurchaseMotherboard('Intel', 'DDR5', 1000, 1000)}
                        className="p-2 bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-cyan-500/30 rounded flex flex-col items-center justify-center transition text-center"
                      >
                        <span className="text-[10px] font-bold text-slate-200">인텔 하이엔드</span>
                        <span className="text-[9px] text-cyan-400 font-mono">DDR5 / 실드+1000</span>
                        <span className="text-[10px] text-emerald-400 font-mono font-bold mt-1">1,000 M</span>
                      </button>
                      <button 
                        onClick={() => handlePurchaseMotherboard('AMD', 'DDR5', 1200, 1200)}
                        className="p-2 bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-cyan-500/30 rounded flex flex-col items-center justify-center transition text-center"
                      >
                        <span className="text-[10px] font-bold text-slate-200">AMD 프리미엄</span>
                        <span className="text-[9px] text-cyan-400 font-mono">DDR5 / 실드+1200</span>
                        <span className="text-[10px] text-emerald-400 font-mono font-bold mt-1">1,200 M</span>
                      </button>
                    </div>
                  </div>

                  {/* 저장장치 교체 상점 */}
                  <div className="p-4 bg-slate-950/60 rounded border border-slate-800 flex justify-between items-center col-span-2">
                    <div className="max-w-[70%]">
                      <span className="text-xs font-bold text-emerald-400 font-mono block mb-1">STORAGE ENGINE EXCHANGE</span>
                      <p className="text-xs text-slate-400">
                        HDD를 SSD로 교체 시 게임 다운로드 속도가 **정확히 4배** 가속화되어 더 고사양 사냥터로 고속 승급 가능합니다.
                      </p>
                    </div>
                    <div className="flex space-x-2">
                      <button 
                        onClick={() => {
                          if (minerals >= 600) {
                            setMinerals(p => p - 600);
                            setStorage(prev => ({ ...prev, type: 'SSD', capacityGb: prev.capacityGb + 500 }));
                          } else alert('미네랄이 부족합니다.');
                        }}
                        className="px-3 py-2 bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-emerald-500/30 rounded flex flex-col items-center transition"
                      >
                        <span className="text-[10px] font-bold text-slate-300">SSD 교체</span>
                        <span className="text-[9px] text-emerald-400 font-bold mt-1">600 M</span>
                      </button>
                      <button 
                        onClick={() => handleUpgrade(storage, setStorage, 'storage')}
                        disabled={isUpgrading}
                        className="px-3 py-2 bg-emerald-500/10 hover:bg-emerald-500 hover:text-slate-950 text-emerald-400 border border-emerald-500/30 rounded flex flex-col items-center justify-center transition disabled:opacity-50"
                      >
                        <span className="text-[10px] font-bold">용량 강화</span>
                        <span className="text-[9px] mt-1">{getUpgradeCost(storage.level || 1).toLocaleString()} M</span>
                      </button>
                    </div>
                  </div>

                </div>
              </div>

              {/* ---------------------------------------------------------------- */}
              {/* 하단 - 사냥터 상태 및 상위 사냥터(게임) 다운로드 인터랙션 */}
              {/* ---------------------------------------------------------------- */}
              <div className="bg-slate-900/40 p-6 rounded-xl border border-slate-800 flex flex-col space-y-4">
                <h2 className="text-md uppercase tracking-widest text-slate-300 font-mono flex items-center space-x-2 border-b border-slate-800 pb-3">
                  <span className="text-emerald-400 text-lg mr-1.5">🎮</span>
                  <span>가상 사냥터 구동 엔진</span>
                </h2>

                <div className="p-4 bg-slate-950/60 rounded border border-slate-800 flex flex-col space-y-4 md:flex-row md:space-y-0 md:justify-between md:items-center">
                  <div>
                    <span className="text-[10px] text-slate-500 font-mono uppercase">CURRENT RUNNING GAME</span>
                    <p className="text-md font-bold text-emerald-400">{huntingGround.name}</p>
                    <p className="text-xs text-slate-400 mt-1">초당 자동 미네랄 수입량 배율: <strong className="text-emerald-400">x{huntingGround.multiplier.toFixed(1)}</strong></p>
                  </div>

                  <div className="flex flex-col space-y-2 min-w-[50%]">
                    <div className="flex justify-between items-center text-xs">
                      <span className="text-slate-400 font-mono">다음 사냥터 다운로드: <strong>{downloadTarget.name}</strong></span>
                      <span className="text-slate-500 font-mono">요구: {downloadTarget.requiredGb}GB</span>
                    </div>

                    <div className="w-full bg-slate-950 rounded-full h-3.5 overflow-hidden border border-slate-800 p-0.5">
                      <div 
                        className="bg-emerald-500 h-full rounded-full transition-all duration-100 flex justify-end items-center pr-1.5"
                        style={{ width: `${downloadProgress}%` }}
                      >
                        <span className="text-[8px] font-bold text-slate-950 font-mono">{Math.round(downloadProgress)}%</span>
                      </div>
                    </div>

                    <div className="flex justify-between items-center text-[10px] font-mono pt-1">
                      <span className="text-slate-500">속도: {specs.downloadSpeedMb} MB/s ({storage.type})</span>
                      {!isDownloading ? (
                        <button 
                          onClick={startDownload}
                          className="px-2.5 py-1 bg-cyan-500/10 hover:bg-cyan-500 hover:text-slate-950 text-cyan-400 border border-cyan-500/20 rounded font-bold transition text-[10px]"
                        >
                          다운로드 시작
                        </button>
                      ) : (
                        <span className="text-cyan-400 animate-pulse">다운로드 진행 중...</span>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>

          {/* ================================================================== */}
          {/* 레이드 오버레이 모달 */}
          {/* ================================================================== */}
          {isRaidOpen && (
            <div className="fixed inset-0 bg-slate-950/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
              <div className="bg-slate-950 border border-cyan-500/30 rounded-2xl w-full max-w-4xl p-6 neon-border-cyan flex flex-col space-y-6 max-h-[90vh] overflow-y-auto">
                
                <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                  <div className="flex items-center space-x-3">
                    <span className="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-ping"></span>
                    <h2 className="text-lg font-bold text-cyan-400 uppercase tracking-widest font-mono">실시간 100층 보스 등반 레이드</h2>
                  </div>
                  <button 
                    onClick={leaveRaidRoom}
                    className="p-2 hover:bg-slate-900 border border-slate-800 hover:border-rose-500/40 rounded-lg text-slate-400 hover:text-rose-500 transition"
                  >
                    <span className="text-sm">❌</span>
                  </button>
                </div>

                {errorMessage && (
                  <div className="p-3.5 bg-rose-950/20 border border-rose-500/50 rounded-lg text-xs font-mono text-rose-400 animate-pulse">
                    ⚠️ 에러 감지: {errorMessage}
                  </div>
                )}

                {rewardMessage && (
                  <div className="p-4 bg-emerald-950/30 border border-emerald-400/50 rounded-lg text-center text-sm font-bold font-mono text-emerald-400 neon-border-emerald animate-bounce">
                    🎉 {rewardMessage}
                  </div>
                )}

                {raidState && raidState.status === 'waiting' && (
                  <div className="flex flex-col items-center justify-center py-10 space-y-6">
                    <p className="text-slate-400 font-mono text-center">
                      레이드 대기실에 진입했습니다. 버스 방 번호: <strong className="text-cyan-400">carry-room-100</strong><br />
                      모든 인원이 준비 완료 버튼을 누르면 실시간 100층 시뮬레이션 전투에 돌입합니다.
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 w-full">
                      {raidState.players.map((p) => {
                        const isMe = p.userId === myId;
                        return (
                          <div key={p.userId} className={`p-4 rounded-lg border ${isMe ? 'bg-cyan-950/10 border-cyan-500/40 neon-border-cyan' : 'bg-slate-900/40 border-slate-800'} flex flex-col justify-between items-center text-center space-y-3`}>
                            <div className="flex flex-col items-center">
                              <div className={`w-10 h-10 rounded-full flex items-center justify-center ${isMe ? 'bg-cyan-500/10 text-cyan-400' : 'bg-slate-800 text-slate-400'} border border-slate-700`}>
                                <span className="text-lg">👤</span>
                              </div>
                              <span className="text-xs font-bold text-slate-200 mt-2 truncate max-w-[120px]">{p.nickname} {isMe && '(나)'}</span>
                              <span className="text-[9px] text-slate-500 font-mono">DPS: {p.dpsContribution.toLocaleString()}</span>
                            </div>

                            <span className={`text-[10px] font-bold font-mono px-2 py-0.5 rounded ${p.isReady ? 'bg-emerald-950/40 text-emerald-400 border border-emerald-500/20' : 'bg-rose-950/40 text-rose-400 border border-rose-500/20'}`}>
                              {p.isReady ? '준비 완료' : '대기 중'}
                            </span>
                          </div>
                        );
                      })}

                      {Array.from({ length: 4 - raidState.players.length }).map((_, idx) => (
                        <div key={idx} className="p-4 bg-slate-950/20 border border-slate-900 border-dashed rounded-lg flex flex-col items-center justify-center text-center text-slate-700 min-h-[120px]">
                          <span className="text-lg text-slate-700">➕</span>
                          <span className="text-[9px] font-mono mt-1">대기 중...</span>
                        </div>
                      ))}
                    </div>

                    <button 
                      onClick={toggleReady}
                      className="px-8 py-3.5 bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition text-slate-950 font-bold rounded-lg font-mono text-sm shadow-lg shadow-emerald-500/20"
                    >
                      {raidState.players.find(p => p.userId === myId)?.isReady ? '준비 취소' : '레이드 준비 완료'}
                    </button>
                  </div>
                )}

                {raidState && (raidState.status === 'fighting' || raidState.status === 'won' || raidState.status === 'lost') && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    <div className="lg:col-span-2 flex flex-col space-y-6">
                      
                      <div className="bg-slate-950/80 border border-cyan-500/30 p-6 rounded-xl text-center neon-border-cyan flex flex-col items-center justify-center relative overflow-hidden">
                        <div className="absolute top-2 left-3 text-[9px] font-mono text-cyan-500/40 uppercase">LIVE COMPUTE COMBAT MONITOR</div>
                        
                        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">BOSS RAID STAGE</div>
                        <div className="text-4xl font-extrabold text-cyan-300 font-mono tracking-wider mt-1.5">
                          FLOOR {raidState.currentFloor} <span className="text-lg text-slate-500">/ 100</span>
                        </div>

                        {raidState.status === 'won' ? (
                          <span className="mt-3 text-xs font-bold text-emerald-400 uppercase tracking-widest font-mono border border-emerald-500/30 bg-emerald-950/20 px-3 py-1 rounded">100층 완전 등반 성공</span>
                        ) : raidState.status === 'lost' ? (
                          <span className="mt-3 text-xs font-bold text-rose-400 uppercase tracking-widest font-mono border border-rose-500/30 bg-rose-950/20 px-3 py-1 rounded">시간 초과 패배</span>
                        ) : (
                          <span className="mt-3 text-xs font-bold text-cyan-400 uppercase tracking-widest font-mono border border-cyan-500/30 bg-cyan-950/20 px-3 py-1 rounded animate-pulse">전투 연산 진행 중</span>
                        )}
                      </div>

                      <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-xl space-y-3 flex flex-col">
                        <div className="flex justify-between items-center text-xs">
                          <span className="font-bold text-slate-300 uppercase tracking-wider font-mono flex items-center space-x-1">
                            <span className="text-rose-500 text-sm mr-1">💀</span>
                            <span>보스 개체 체력</span>
                          </span>
                          <span className="text-rose-400 font-mono font-bold">
                            {raidState.bossCurrentHp.toLocaleString()} / {raidState.bossMaxHp.toLocaleString()} ({Math.round((raidState.bossCurrentHp / raidState.bossMaxHp) * 100)}%)
                          </span>
                        </div>

                        <div className="w-full bg-slate-950 rounded-full h-5 overflow-hidden border border-slate-800 p-0.5">
                          <div 
                            className="bg-rose-500 h-full rounded-full transition-all duration-300 flex justify-end items-center pr-2 relative"
                            style={{ width: `${(raidState.bossCurrentHp / raidState.bossMaxHp) * 100}%` }}
                          >
                          </div>
                        </div>

                        <div className="flex justify-between items-center text-[10px] font-mono pt-1 text-slate-500">
                          <span>남은 타임아웃 제한 시간</span>
                          <span className={`font-bold ${raidState.timeLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-slate-400'}`}>{raidState.timeLeft} 초</span>
                        </div>
                        <div className="w-full bg-slate-950 rounded-full h-2 overflow-hidden border border-slate-800">
                          <div 
                            className={`h-full rounded-full transition-all duration-1000 ${raidState.timeLeft <= 10 ? 'bg-rose-500' : 'bg-slate-600'}`}
                            style={{ width: `${(raidState.timeLeft / 30) * 100}%` }}
                          ></div>
                        </div>
                      </div>
                    </div>

                    <div className="flex flex-col space-y-6">
                      
                      <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-xl flex flex-col space-y-4">
                        <h3 className="text-xs text-slate-400 font-bold uppercase tracking-widest border-b border-slate-800 pb-2 flex items-center space-x-1">
                          <span className="text-cyan-400 text-sm mr-1">📊</span>
                          <span>실시간 파티원 기여도</span>
                        </h3>

                        <div className="space-y-4">
                          {raidState.players.map((p) => {
                            const isMe = p.userId === myId;
                            const share = raidState.totalDps > 0 ? (p.dpsContribution / raidState.totalDps) * 100 : 0;
                            return (
                              <div key={p.userId} className="space-y-1">
                                <div className="flex justify-between text-xs font-mono">
                                  <span className={`truncate max-w-[140px] ${isMe ? 'text-cyan-300 font-bold' : 'text-slate-300'}`}>
                                    {p.nickname} {isMe && '(나)'} {p.isDead && '(⚠️사망)'}
                                  </span>
                                  <span className="text-slate-500 font-bold">{p.dpsContribution.toLocaleString()} DPS</span>
                                </div>
                                
                                <div className="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-900">
                                  <div 
                                    className={`h-full rounded-full transition-all duration-300 ${p.isDead ? 'bg-rose-500' : isMe ? 'bg-cyan-400' : 'bg-slate-700'}`}
                                    style={{ width: `${p.isDead ? 100 : share}%` }}
                                  ></div>
                                </div>
                                <div className="flex justify-between text-[9px] font-mono text-slate-500">
                                  <span>{p.isDead ? 'DDR에러 유닛 파괴됨' : `지분: ${Math.round(share)}%`}</span>
                                  {p.currentHp !== undefined && (
                                    <span>HP: {p.currentHp} / {p.maxHp}</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        <div className="pt-3 border-t border-slate-800 flex justify-between items-center text-xs font-mono">
                          <span className="text-slate-500">파티 합산 누적 DPS:</span>
                          <span className="text-cyan-400 font-bold">{raidState.totalDps.toLocaleString()}</span>
                        </div>
                      </div>

                      <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-xl flex flex-col space-y-3 font-mono">
                        <h3 className="text-xs text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-2 flex items-center space-x-1">
                          <span className="text-cyan-300 text-sm mr-1">🏆</span>
                          <span>오늘 남은 보상 구간</span>
                        </h3>
                        <div className="flex flex-col space-y-2 text-xs">
                          <div className="flex justify-between">
                            <span className="text-slate-500">수령 가능 마일스톤:</span>
                            <span className="text-cyan-300 font-bold">10층 ~ 100층 (10층단위)</span>
                          </div>
                          <div className="flex justify-between text-[11px] text-slate-400">
                            <span>오늘 남은 보상 층수:</span>
                            <span className="text-emerald-400 font-bold">
                              {raidState.currentFloor <= 100 ? `${Math.ceil(raidState.currentFloor / 10) * 10}층 ~ 100층` : '모든 구간 수령 완료'}
                            </span>
                          </div>
                          <p className="text-[9px] text-slate-500 mt-2 border-t border-slate-900 pt-2 leading-relaxed">
                            * 보상은 하루에 단 한 번, 날짜가 바뀌면 수령 완료 최고 층수가 0으로 리셋되며 다시 처음부터 순차로 차분 획득 가능합니다.
                          </p>
                        </div>
                      </div>

                    </div>

                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
