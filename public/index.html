<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>'컴퓨터 강화하기' 웹 복원판 대시보드</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React, ReactDOM, Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts Outfit & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Socket.io Client -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/originalMapData.js"></script>
  <style>
    body {
      font-family: 'Outfit', 'JetBrains Mono', sans-serif;
    }
    .neon-border-emerald {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.1);
    }
    .neon-border-rose {
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.4), inset 0 0 10px rgba(244, 63, 94, 0.2);
    }
    .neon-border-cyan {
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 10px rgba(6, 182, 212, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden selection:bg-emerald-500 selection:text-slate-950">

  <div id="root"></div>

  <!-- React UI 컴포넌트 마운트 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const OMG = window.OriginalMapGame;

    function App() {
      // ----------------------------------------------------------------------
      // 1. 핵심 유저 재화 및 강화 피드백 상태 정의
      // ----------------------------------------------------------------------
      const [minerals, setMinerals] = useState(() => {
        const saved = localStorage.getItem('sca_minerals');
        return saved !== null ? parseInt(saved, 10) : 2000;
      });
      const [normalCoins, setNormalCoins] = useState(() => {
        const saved = localStorage.getItem('sca_normalCoins');
        return saved !== null ? parseInt(saved, 10) : 0;
      });
      const [scaCoins, setScaCoins] = useState(() => {
        const saved = localStorage.getItem('sca_scaCoins');
        return saved !== null ? parseInt(saved, 10) : 0;
      });

      // 지능형 자동 구매 & 자동 강화 루프 토글 상태 신설
      const [autoBuyCpu, setAutoBuyCpu] = useState(() => localStorage.getItem('sca_autoBuyCpu') === 'true');
      const [autoBuyGpu, setAutoBuyGpu] = useState(() => localStorage.getItem('sca_autoBuyGpu') === 'true');
      const [autoBuyRam, setAutoBuyRam] = useState(() => localStorage.getItem('sca_autoBuyRam') === 'true');
      const [autoBuyCooler, setAutoBuyCooler] = useState(() => localStorage.getItem('sca_autoBuyCooler') === 'true');
      const [autoBuyStorage, setAutoBuyStorage] = useState(() => localStorage.getItem('sca_autoBuyStorage') === 'true');

      // 확률 강화 피드백 전용 상태
      const [upgradeStatus, setUpgradeStatus] = useState(null); // 'success', 'fail_keep', 'fail_drop', 'exploded', 'upgrading'
      const [upgradeMessage, setUpgradeMessage] = useState('');
      const [isUpgrading, setIsUpgrading] = useState(false);
      const [activeUpgradingPart, setActiveUpgradingPart] = useState(null);
      const [rebirthCount, setRebirthCount] = useState(() => {
        const saved = localStorage.getItem('sca_rebirthCount');
        return saved !== null ? parseInt(saved, 10) : 0;
      });
      const [rebirthStat, setRebirthStat] = useState(() => {
        const saved = localStorage.getItem('sca_rebirthStat');
        return saved !== null ? parseInt(saved, 10) : 0;
      });
      const defaultAutoTargets = { cpu: 1, gpu: 1, ram: 1, cooler: 1, storage: 1 };
      const [autoTargetLevels, setAutoTargetLevels] = useState(() => {
        try {
          return { ...defaultAutoTargets, ...JSON.parse(localStorage.getItem('sca_autoTargetLevels') || '{}') };
        } catch (e) { return defaultAutoTargets; }
      });
      const [scaUpgrades, setScaUpgrades] = useState(() => JSON.parse(localStorage.getItem('sca_scaUpgrades') || '{}'));
      const [showScaCenter, setShowScaCenter] = useState(false);
      const [partyHuntingTier, setPartyHuntingTier] = useState(0);
      const [isPartyHunting, setIsPartyHunting] = useState(false);
      const [cpuBuyManufacturer, setCpuBuyManufacturer] = useState('Intel');
      const [coolerBuyKind, setCoolerBuyKind] = useState('air');
      const [storageBuyKind, setStorageBuyKind] = useState('hdd');

      // ----------------------------------------------------------------------
      // 2. 조립 컴퓨터 부품 상태 정의
      // ----------------------------------------------------------------------
      const [cpu, setCpu] = useState(() => {
        const saved = localStorage.getItem('sca_cpu');
        return saved !== null ? JSON.parse(saved) : { manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR3' };
      });
      const [gpu, setGpu] = useState(() => {
        const saved = localStorage.getItem('sca_gpu');
        return saved !== null ? JSON.parse(saved) : { level: 1 };
      });
      const [ram, setRam] = useState(() => {
        const saved = localStorage.getItem('sca_ram');
        return saved !== null ? JSON.parse(saved) : { level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' };
      });
      const [cooler, setCooler] = useState(() => {
        const saved = localStorage.getItem('sca_cooler');
        return saved !== null ? JSON.parse(saved) : { level: 1, coolingCapacity: 100, coolerKind: 'air' };
      });
      const [motherboard, setMotherboard] = useState(() => {
        const saved = localStorage.getItem('sca_motherboard');
        return saved !== null ? JSON.parse(saved) : { socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR3', shieldIncrease: 200 };
      });
      const [storage, setStorage] = useState(() => {
        const saved = localStorage.getItem('sca_storage');
        return saved !== null ? JSON.parse(saved) : { type: 'HDD', capacityGb: 60, level: 1, storageKind: 'hdd' };
      });

      const [inventory, setInventory] = useState(() => {
        const saved = localStorage.getItem('sca_inventory');
        if (saved !== null) return JSON.parse(saved);
        return [
          { id: 'inv-cpu-1', type: 'cpu', level: 1, manufacturer: 'Intel', ddrGeneration: 'DDR3' },
          { id: 'inv-gpu-1', type: 'gpu', level: 1 },
          { id: 'inv-ram-1', type: 'ram', level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' },
          { id: 'inv-cooler-1', type: 'cooler', level: 1, coolingCapacity: 100, coolerKind: 'air' },
          { id: 'inv-storage-1', type: 'storage', level: 1, storageType: 'HDD', storageKind: 'hdd', capacityGb: 60 }
        ];
      });

      // ----------------------------------------------------------------------
      // 3. 사냥터 및 다운로드 진행 상태 정의
      // ----------------------------------------------------------------------
      const [huntingGround, setHuntingGround] = useState(() => {
        const saved = localStorage.getItem('sca_huntingGround');
        if (saved !== null) return JSON.parse(saved); const g = OMG.WORK_HUNTING_GROUNDS[0]; return { name: g.name, multiplier: g.multiplier, mineralBase: g.mineralBase, groundIndex: 0 };
      });
      const [isDownloading, setIsDownloading] = useState(false);
      const [downloadProgress, setDownloadProgress] = useState(0);
      const [downloadTarget, setDownloadTarget] = useState(() => {
        const saved = localStorage.getItem('sca_downloadTarget');
        if (saved !== null) return JSON.parse(saved); const t = OMG.DOWNLOAD_TARGETS[0]; return { name: t.name, sizeMb: t.sizeMb, requiredGb: t.requiredGb, groundIndex: t.groundIndex };
      });

      // ----------------------------------------------------------------------
      // 4. 실시간 소켓 멀티플레이 레이드 상태 정의
      // ----------------------------------------------------------------------
      const [isRaidOpen, setIsRaidOpen] = useState(false);
      const [socket, setSocket] = useState(null);
      const [raidState, setRaidState] = useState(null);
      const [rewardMessage, setRewardMessage] = useState(null);
      const [myId] = useState(() => {
        const saved = localStorage.getItem('sca_myId');
        // [고증 보안 패치] PostgreSQL UUID 규격 준수를 위한 클렌징 작업 (36글자 UUID 규격 준수 검사)
        const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
        if (saved !== null && uuidRegex.test(saved)) {
          return saved;
        }
        
        // 표준 RFC4122 v4 UUID 생성기
        const newId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
        
        localStorage.setItem('sca_myId', newId);
        return newId;
      });
      const [nickname] = useState(() => {
        const saved = localStorage.getItem('sca_nickname');
        if (saved !== null) return saved;
        const newName = `Player_${Math.floor(100 + Math.random() * 900)}`;
        localStorage.setItem('sca_nickname', newName);
        return newName;
      });
      const [errorMessage, setErrorMessage] = useState(null);

      const [combatLogs, setCombatLogs] = useState([
        '💬 [SYSTEM] 사이버네틱 배틀 매트릭스 기동 완료.',
        '💬 [SYSTEM] 100층 레이드용 소켓 프로토콜 대기 중.'
      ]);

      const getSummonUnit = (level) => {
        const units = {
          1: { name: '테란 마린 (Marine)', emoji: '🔫', dpsFactor: 1.0 },
          2: { name: '테란 고스트 (Ghost)', emoji: '👁️', dpsFactor: 1.5 },
          3: { name: '프로토스 드라군 (Dragoon)', emoji: '🦀', dpsFactor: 2.2 },
          4: { name: '저그 히드라리스크 (Hydralisk)', emoji: '🐍', dpsFactor: 3.2 },
          5: { name: '테란 영웅 시즈 탱크 (Siege Tank)', emoji: '💥', dpsFactor: 4.8 },
          6: { name: '프로토스 하이 템플러 / 아칸 (Archon)', emoji: '⚡', dpsFactor: 7.2 },
          7: { name: '프로토스 우주모함 캐리어 (Carrier)', emoji: '🛸', dpsFactor: 11.0 },
          8: { name: '테란 전투순양함 배틀크루저 (Battlecruiser)', emoji: '🚢', dpsFactor: 16.0 },
          9: { name: '프로토스 전설 영웅 제라툴 (Zeratul)', emoji: '🗡️', dpsFactor: 25.0 },
          10: { name: '최종 테란 기함 하이페리온 (Hyperion)', emoji: '🌟', dpsFactor: 45.0 }
        };
        return units[level] || { name: '미확인 차원 유닛', emoji: '👽', dpsFactor: level * 5 };
      };

      const getRaidBossName = (floor) => {
        const bosses = {
          10: 'Guarder (폭주한 광전사 영웅)',
          20: 'Torrasque (울트라리스크 융합수)',
          30: 'Matriarch (뮤탈리스크 군락 영웅)',
          40: 'Unclean One (디파일러 불사 보스)',
          50: 'General Duke (크론 배틀크루저)',
          60: 'Fenix (드라군 기계 거신 영웅)',
          70: 'Zeratul (공허의 방랑자 제라툴)',
          80: 'Infested Kerrigan (칼날의 여왕 케리건)',
          90: 'The Overmind (초월체 생체 거대 코어)',
          100: 'Amon (어두운 공허의 지배자 아몬)'
        };
        return bosses[floor] || `Raid Boss Level ${floor} (수호 가디언)`;
      };

      // ----------------------------------------------------------------------
      // 스타1 컴퓨터강화 유즈맵 고증 부품 이름 매핑 헬퍼
      // ----------------------------------------------------------------------
      const incomeBonusRate = useMemo(() => OMG.calcIncomeBonus(scaUpgrades), [scaUpgrades]);
      const probBonusRate = useMemo(() => OMG.calcProbBonus(scaUpgrades), [scaUpgrades]);
      const rebirthIncomeMult = useMemo(() => OMG.calcRebirthIncomeMultiplier(rebirthStat), [rebirthStat]);
      const gameSpeedFrames = useMemo(() => OMG.calcGameSpeedFrames(scaUpgrades), [scaUpgrades]);
      const gameSpeedMult = useMemo(() => OMG.calcGameSpeedMultiplier(scaUpgrades), [scaUpgrades]);
      const gpuGrade = useMemo(() => OMG.calcGpuGrade(scaUpgrades), [scaUpgrades]);
      const gpuAttackFrames = useMemo(() => OMG.calcGpuAttackFrames(scaUpgrades), [scaUpgrades]);
      const getCpuName = (level, m) => OMG.getPartName('cpu', level, { type: 'cpu', manufacturer: m || cpu.manufacturer });
      const getGpuName = (level) => OMG.getPartName('gpu', level, { type: 'gpu' });
      const getRamName = (level, part) => OMG.getPartName('ram', level, part || ram);
      const getCoolerName = (level, part) => OMG.getPartName('cooler', level, part || cooler);
      const getStorageName = (level, part) => OMG.getPartName('storage', level, part || storage);

      // ----------------------------------------------------------------------
      // 5. 실시간 하드웨어 스펙 연산 (2단계 백엔드 공식과 100% 매칭)
      // ----------------------------------------------------------------------
      const specs = useMemo(() => {
        // A. 과열 시스템 감지
        const cpuHeatDemand = OMG.getCpuCoolingRequired(cpu);
        const isOverheated = cpuHeatDemand > cooler.coolingCapacity;
        const mineralMultiplier = isOverheated ? 0.5 : 1.0;

        // B. 소켓 불일치 감지
        const isSocketMismatched = cpu.manufacturer !== motherboard.socketManufacturer;

        // C. DDR 세대 불일치 감지
        const ddrSet = new Set([cpu.ddrGeneration, ram.ddrGeneration, motherboard.supportedDdrGeneration]);
        const isDdrMismatched = ddrSet.size > 1;
        const hpDecayRate = isDdrMismatched ? (ddrSet.size === 2 ? 0.50 : 1.00) : 0.00;

        // D. 가용 유닛 수 상한
        let unitLimit = OMG.getCpuCores(cpu) * 2;
        if (isSocketMismatched) {
          unitLimit = Math.max(1, Math.floor(unitLimit * 0.5));
        }

        // E. 사냥터 가용 유닛 수 (RAM 용량)
        const maxHuntingUnits = Math.floor(ram.capacityGb / 4);

        // F. 유닛 체력 및 메인보드 고정 실드
        const unitHp = 100 * cpu.level;
        const unitShield = motherboard.shieldIncrease;

        // G. 공격 주기 (v1.1.6: GPU 등급 → 20/16/12/8 프레임)
        const attackSpeedSec = Math.max(0.1, Math.round((gpuAttackFrames / 24) * 100) / 100);

        // H. 데미지 (GPU 기하급수 및 CPU 소환수 등급 결합 시너지 성장)
        const unitDamage = Math.round(10 * Math.pow(1.5, gpu.level - 1) * getSummonUnit(cpu.level).dpsFactor);

        // I. 방어력
        let unitDefense = cooler.level * 3;
        if (isOverheated) {
          unitDefense = Math.max(0, Math.floor(unitDefense * 0.5));
        }

        // J. 다운로드 속도 (§3.8 HDD x1 / NVMe x4 + SCA +10%)
        const storageDownloadMult = OMG.getStorageDownloadMultiplier(storage);
        const downloadSpeedMb = OMG.calcDownloadSpeedMb(storage, scaUpgrades);

        return {
          unitLimit,
          maxHuntingUnits,
          unitHp,
          unitShield,
          attackSpeedSec,
          unitDamage,
          unitDefense,
          downloadSpeedMb,
          storageDownloadMult,
          gpuGrade,
          gpuAttackFrames,
          gameSpeedFrames,
          cpuHeatDemand,
          penalties: {
            isOverheated,
            isSocketMismatched,
            isDdrMismatched,
            hpDecayRate,
            mineralMultiplier
          }
        };
      }, [cpu, gpu, ram, cooler, motherboard, storage, scaUpgrades, gpuAttackFrames, gpuGrade]);

      useEffect(() => {
        if (localStorage.getItem('sca_rebirthStatMigrated')) return;
        if (rebirthCount > 0 && rebirthStat === 0) {
          setRebirthStat(rebirthCount * 10000);
        }
        localStorage.setItem('sca_rebirthStatMigrated', '1');
      }, []);

      useEffect(() => {
        if (cooler.level === 1 && cooler.coolingCapacity === 30) {
          setCooler(c => ({ ...c, coolingCapacity: 100, coolerKind: c.coolerKind || 'air' }));
        }
      }, []);

      useEffect(() => {
        // 레거시 저장값 마이그레이션: HDD 1강인데 250GB로 저장된 경우(이전 기본값) 60GB로 보정
        if ((storage.storageKind || 'hdd') === 'hdd' && (storage.level || 1) === 1 && storage.type === 'HDD' && storage.capacityGb === 250) {
          setStorage((s) => ({ ...s, capacityGb: 60, storageKind: s.storageKind || 'hdd' }));
        }
        // 인벤토리 저장장치도 동일 보정
        setInventory((prev) => prev.map((p) => {
          if (p.type !== 'storage') return p;
          if ((p.storageKind || 'hdd') === 'hdd' && (p.level || 1) === 1 && p.storageType === 'HDD' && p.capacityGb === 250) {
            return { ...p, capacityGb: 60, storageKind: p.storageKind || 'hdd' };
          }
          return p;
        }));
      }, []);

      useEffect(() => {
        if (minerals >= OMG.MINERAL_PER_COIN) {
          const { coins, remainder } = OMG.convertMineralsToCoins(minerals);
          if (coins > 0) { setMinerals(remainder); setNormalCoins(p => p + coins); }
        }
      }, [minerals]);
      useEffect(() => {
        if (isPartyHunting) return;
        const tickMs = Math.max(50, Math.round(1000 / gameSpeedMult));
        const interval = setInterval(() => {
          const base = huntingGround.mineralBase || 10 * huntingGround.multiplier;
          setMinerals(p => p + Math.round(base * specs.penalties.mineralMultiplier * rebirthIncomeMult * (1 + incomeBonusRate)));
        }, tickMs);
        return () => clearInterval(interval);
      }, [specs, huntingGround, rebirthIncomeMult, incomeBonusRate, isPartyHunting, gameSpeedMult]);
      useEffect(() => {
        if (!isPartyHunting) return;
        const tier = OMG.PARTY_HUNTING_TIERS[partyHuntingTier];
        if (!tier) return;
        const tickMs = Math.max(100, Math.round(3000 / gameSpeedMult));
        const iv = setInterval(() => {
          setMinerals(p => p + Math.round(tier.mineralPerTick * (1 + incomeBonusRate)));
          setScaCoins(p => p + tier.scaCoins);
        }, tickMs);
        return () => clearInterval(iv);
      }, [isPartyHunting, partyHuntingTier, incomeBonusRate, gameSpeedMult]);

      // ----------------------------------------------------------------------
      // 6.5. 게임 진행 상태 로컬 스토리지 실시간 자동 저장 (F5/새로고침 방지)
      // ----------------------------------------------------------------------
      useEffect(() => {
        localStorage.setItem('sca_minerals', minerals.toString());
        localStorage.setItem('sca_normalCoins', normalCoins.toString());
        localStorage.setItem('sca_scaCoins', scaCoins.toString());
        localStorage.setItem('sca_rebirthCount', rebirthCount.toString());
        localStorage.setItem('sca_rebirthStat', rebirthStat.toString());
        localStorage.setItem('sca_autoTargetLevels', JSON.stringify(autoTargetLevels));
        localStorage.setItem('sca_scaUpgrades', JSON.stringify(scaUpgrades));
        localStorage.setItem('sca_partyHuntingTier', String(partyHuntingTier));
        localStorage.setItem('sca_cpu', JSON.stringify(cpu));
        localStorage.setItem('sca_gpu', JSON.stringify(gpu));
        localStorage.setItem('sca_ram', JSON.stringify(ram));
        localStorage.setItem('sca_cooler', JSON.stringify(cooler));
        localStorage.setItem('sca_motherboard', JSON.stringify(motherboard));
        localStorage.setItem('sca_storage', JSON.stringify(storage));
        localStorage.setItem('sca_huntingGround', JSON.stringify(huntingGround));
        localStorage.setItem('sca_downloadTarget', JSON.stringify(downloadTarget));
        localStorage.setItem('sca_inventory', JSON.stringify(inventory));
        localStorage.setItem('sca_autoBuyCpu', autoBuyCpu.toString());
        localStorage.setItem('sca_autoBuyGpu', autoBuyGpu.toString());
        localStorage.setItem('sca_autoBuyRam', autoBuyRam.toString());
        localStorage.setItem('sca_autoBuyCooler', autoBuyCooler.toString());
        localStorage.setItem('sca_autoBuyStorage', autoBuyStorage.toString());
      }, [minerals, normalCoins, scaCoins, rebirthCount, rebirthStat, autoTargetLevels, scaUpgrades, partyHuntingTier, cpu, gpu, ram, cooler, motherboard, storage, huntingGround, downloadTarget, inventory, autoBuyCpu, autoBuyGpu, autoBuyRam, autoBuyCooler, autoBuyStorage]);

      // ----------------------------------------------------------------------
      // 6.6. 가상 사냥터 실시간 전투 매트릭스 로그 생성기 (스타1 콘솔 싱크)
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
          let newLog;
          if (isPartyHunting) {
            const tier = OMG.PARTY_HUNTING_TIERS[partyHuntingTier];
            if (!tier) return;
            const mEarn = Math.round(tier.mineralPerTick * (1 + incomeBonusRate));
            newLog = `[${time}] 👥 파티 :: ${tier.name} +${mEarn}원 +${tier.scaCoins}C`;
          } else {
            const base = huntingGround.mineralBase || 10 * huntingGround.multiplier;
            const earn = Math.round(base * specs.penalties.mineralMultiplier * rebirthIncomeMult * (1 + incomeBonusRate));
            newLog = `[${time}] 💼 작업 :: ${huntingGround.name} 자동 수입 +${earn}원`;
          }
          setCombatLogs(prev => {
            const nextLogs = [...prev, newLog];
            if (nextLogs.length > 8) nextLogs.shift();
            return nextLogs;
          });
        }, 1500);
        return () => clearInterval(interval);
      }, [cpu.level, specs, huntingGround, rebirthIncomeMult, incomeBonusRate, isPartyHunting, partyHuntingTier]);

      // ----------------------------------------------------------------------
      // 6.7. 지능형 자동 구매 및 자동 강화(Auto Buy & Upgrade) 통합 루프 엔진
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          // 강화 주입 프레임 진행 중이거나, 다른 구매/강화 작업 진행 중이면 다음 턴 대기
          if (isUpgrading) return;

          const parts = ['cpu', 'gpu', 'ram', 'cooler', 'storage'];
          
          for (const type of parts) {
            let active = false;
            let setAuto = null;

            if (type === 'cpu') { active = autoBuyCpu; setAuto = setAutoBuyCpu; }
            else if (type === 'gpu') { active = autoBuyGpu; setAuto = setAutoBuyGpu; }
            else if (type === 'ram') { active = autoBuyRam; setAuto = setAutoBuyRam; }
            else if (type === 'cooler') { active = autoBuyCooler; setAuto = setAutoBuyCooler; }
            else if (type === 'storage') { active = autoBuyStorage; setAuto = setAutoBuyStorage; }

            if (!active) continue;

            // 해당 부품 유형의 인벤토리 아이템을 추출
            const owned = inventory.filter(p => p.type === type);
            
            if (owned.length === 0) {
              const buyMeta = { type, manufacturer: type === 'cpu' ? cpuBuyManufacturer : undefined, coolerKind: type === 'cooler' ? coolerBuyKind : undefined, storageKind: type === 'storage' ? storageBuyKind : undefined };
              if (normalCoins >= OMG.getUpgradeCost(type, 0, buyMeta)) { handleBuyComponentPack(type); break; }
              setAuto(false); break;
            } else {
              const goal = autoTargetLevels[type] || 1;
              const target = owned.filter(p => p.level < goal && p.level < OMG.getMaxLevel(type, p)).sort((a, b) => b.level - a.level)[0];
              if (target) {
                // 원작 규칙: 강화는 비용이 들지 않음(구매/팩만 비용 지불)
                handleInventoryUpgrade(target.id);
                break;
              } else {
                setAuto(false);
                setCombatLogs(prev => [...prev.slice(-7), `🎉 [SYSTEM] ${type.toUpperCase()} 자동강화 목표 ${goal}강 달성.`]);
                break;
              }
            }
          }
        }, 650);

        return () => clearInterval(interval);
      }, [autoBuyCpu, autoBuyGpu, autoBuyRam, autoBuyCooler, autoBuyStorage, autoTargetLevels, isUpgrading, inventory, normalCoins, cpuBuyManufacturer, coolerBuyKind, storageBuyKind]);

      // ----------------------------------------------------------------------
      // 7. V1.2.9 원작 강화 (Normal 코인)
      // ----------------------------------------------------------------------
      const getUpgradeCost = (type, level, part) => OMG.getUpgradeCost(type, level, part || { type });
      const getUpgradeProbability = (type, level, part) => OMG.getUpgradeProbability(type, level, part || { type }, probBonusRate);

      const adjustAutoTarget = (type, delta) => {
        setAutoTargetLevels(prev => {
          const sample = inventory.find(p => p.type === type) || { type };
          const maxLv = OMG.getMaxLevel(type, sample);
          const next = Math.max(1, Math.min(maxLv, (prev[type] || 1) + delta));
          return { ...prev, [type]: next };
        });
      };

      const handlePurchaseScaItem = (item) => {
        const bought = scaUpgrades[item.id] || 0;
        if (bought >= item.maxPurchases) { alert('최대 구매 횟수 도달'); return; }
        if (scaCoins < item.cost) { alert('SCA 코인 부족'); return; }
        setScaCoins((prev) => prev - item.cost);
        setScaUpgrades((prev) => ({ ...prev, [item.id]: bought + 1 }));
        if (item.id === 'intelCpu11') {
          setInventory((prev) => [...prev, OMG.createIntelCpu11InventoryItem()]);
          setUpgradeMessage('📦 SCA Intel CPU 11강이 창고에 추가되었습니다.');
          setUpgradeStatus('success');
        }
      };

      const handleBuyComponentPack = (type) => {
        const buyMeta = { type, manufacturer: type === 'cpu' ? cpuBuyManufacturer : undefined, coolerKind: type === 'cooler' ? coolerBuyKind : undefined, storageKind: type === 'storage' ? storageBuyKind : undefined };
        const cost = OMG.getUpgradeCost(type, 0, buyMeta);
        if (normalCoins < cost) { alert('Normal 코인 부족 (미네랄 10,000원 = 1코인)'); return; }
        setNormalCoins((prev) => prev - cost);
        const newId = `inv-${type}-${Math.random().toString(36).substring(2, 9)}`;
        let newPart = { id: newId, type, level: 1 };
        if (type === 'cpu') { newPart.manufacturer = cpuBuyManufacturer; newPart.ddrGeneration = motherboard.supportedDdrGeneration || 'DDR3'; }
        else if (type === 'ram') { const t = OMG.getTier('ram', newPart, 1); newPart.clockMhz = t.clockMhz; newPart.capacityGb = t.capacityGb; newPart.ddrGeneration = t.ddrGeneration; }
        else if (type === 'cooler') { newPart.coolerKind = coolerBuyKind; newPart.coolingCapacity = OMG.getTier('cooler', newPart, 1).coolingCapacity; }
        else if (type === 'storage') { newPart.storageKind = storageBuyKind; const t = OMG.getTier('storage', newPart, 1); newPart.storageType = t.storageType; newPart.capacityGb = t.capacityGb; }
        setInventory((prev) => [...prev, newPart]);
        setUpgradeStatus('success');
        setUpgradeMessage(`📦 [구매] ${type.toUpperCase()} 1강 (+${cost}C)`);
        setTimeout(() => { setUpgradeStatus(null); setUpgradeMessage(''); }, 2500);
      };

      const handleSellComponent = (itemId) => {
        const part = inventory.find(p => p.id === itemId);
        if (!part) return;
        const sellPrice = Math.max(1, Math.floor(OMG.getUpgradeCost(part.type, Math.max(0, part.level - 1), part) * 0.5));
        setNormalCoins((prev) => prev + sellPrice);
        setInventory((prev) => prev.filter(p => p.id !== itemId));
        setUpgradeMessage(`💰 판매 +${sellPrice}C`);
        setUpgradeStatus('success');
        setTimeout(() => { setUpgradeStatus(null); setUpgradeMessage(''); }, 2500);
      };

      const handleInventoryUpgrade = (itemId) => {
        if (isUpgrading) return;
        const partToUpgrade = inventory.find(p => p.id === itemId);
        if (!partToUpgrade) return;
        const currentLevel = partToUpgrade.level;
        setIsUpgrading(true);
        setActiveUpgradingPart(partToUpgrade.type);
        setUpgradeStatus('upgrading');
        setUpgradeMessage(`강화 중... ${partToUpgrade.type.toUpperCase()} +${currentLevel}강`);
        setTimeout(() => {
          const prob = OMG.getUpgradeProbability(partToUpgrade.type, currentLevel, partToUpgrade, probBonusRate);
          const result = Math.random() <= prob ? 'success' : 'exploded';
          setIsUpgrading(false);
          setUpgradeStatus(result);
          if (result === 'success') {
            setInventory((prev) => prev.map(p => p.id === itemId ? OMG.applyTierStats(p, currentLevel + 1) : p));
            setUpgradeMessage(`🎉 강화 성공! +${currentLevel + 1}강`);
          } else {
            setInventory((prev) => prev.filter(p => p.id !== itemId));
            setUpgradeMessage('💥 [강화 실패] 장비가 폭파되었습니다!');
          }
          setTimeout(() => { setUpgradeStatus(null); setUpgradeMessage(''); }, 3500);
        }, 600);
      };

      const handleRebirth = () => {
        if (gpu.level < 10) { alert('GPU 10강 필요'); return; }
        if (isDownloading) { alert('게임 다운로드 중에는 환생할 수 없습니다. (v1.0.6)'); return; }
        if (!confirm('환생 시 부품·미네랄·Normal 코인이 초기화됩니다. SCA 코인/센터·환생 수치는 유지됩니다.')) return;
        const parts = { cpu, gpu, ram, cooler, storage };
        const outcome = OMG.calcRebirthOutcome(parts, rebirthStat);
        const startMinerals = OMG.calcRebirthStartMinerals(scaUpgrades);
        setScaCoins((prev) => prev + outcome.scaReward);
        setRebirthStat(outcome.correctedStat);
        setRebirthCount((prev) => prev + 1);
        setMinerals(startMinerals);
        setNormalCoins(0);
setCpu({ manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR3' });
        setGpu({ level: 1 });
        setRam({ level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' });
        setCooler({ level: 1, coolingCapacity: 100, coolerKind: 'air' });
        setMotherboard({ socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR3', shieldIncrease: 200 });
        setStorage({ type: 'HDD', capacityGb: 60, level: 1, storageKind: 'hdd' });
        setInventory([
          { id: 'inv-cpu-1', type: 'cpu', level: 1, manufacturer: 'Intel', ddrGeneration: 'DDR3' },
          { id: 'inv-gpu-1', type: 'gpu', level: 1 },
          { id: 'inv-ram-1', type: 'ram', level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' },
          { id: 'inv-cooler-1', type: 'cooler', level: 1, coolingCapacity: 100, coolerKind: 'air' },
          { id: 'inv-storage-1', type: 'storage', level: 1, storageType: 'HDD', storageKind: 'hdd', capacityGb: 60 }
        ]);
        const g0 = OMG.WORK_HUNTING_GROUNDS[0];
        setHuntingGround({ name: g0.name, multiplier: g0.multiplier, mineralBase: g0.mineralBase, groundIndex: 0 });
        const dt = OMG.DOWNLOAD_TARGETS[0];
        setDownloadTarget({ name: dt.name, sizeMb: dt.sizeMb, requiredGb: dt.requiredGb, groundIndex: dt.groundIndex });
        setIsDownloading(false);
        setDownloadProgress(0);
        setIsPartyHunting(false);
        setAutoTargetLevels(defaultAutoTargets);
        setUpgradeMessage(`✨ 환생 +${outcome.statGain.toLocaleString()} (보정 전 ${outcome.baseStat.toLocaleString()} → 보정 후 ${outcome.correctedStat.toLocaleString()}) · SCA +${outcome.scaReward.toLocaleString()}C · 시작 미네랄 ${startMinerals.toLocaleString()}원`);
        setUpgradeStatus('success');
      };

      const handlePurchaseMotherboard = (board) => {
        if (normalCoins < board.cost) { alert('Normal 코인 부족'); return; }
        setNormalCoins((prev) => prev - board.cost);
        setMotherboard({ socketManufacturer: board.socketManufacturer, supportedDdrGeneration: board.supportedDdrGeneration, shieldIncrease: board.shieldIncrease });
      };

            // 2. 보관 장비 스왑 장착 핸들러
      const handleEquipComponent = (itemId) => {
        const partToEquip = inventory.find(p => p.id === itemId);
        if (!partToEquip) return;

        const type = partToEquip.type;

        // 메인 부품 스와핑 처리
        if (type === 'cpu') {
          const currentEquipped = { ...cpu };
          setCpu({
            manufacturer: partToEquip.manufacturer,
            level: partToEquip.level,
            ddrGeneration: partToEquip.ddrGeneration
          });
          // 인벤토리 목록에서 장착된 것 빼고 기존 장착 부품 반입
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-cpu-${Math.random().toString(36).substring(2, 7)}`,
            type: 'cpu',
            level: currentEquipped.level,
            manufacturer: currentEquipped.manufacturer,
            ddrGeneration: currentEquipped.ddrGeneration
          }));
        } else if (type === 'gpu') {
          const currentEquipped = { ...gpu };
          setGpu({ level: partToEquip.level });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-gpu-${Math.random().toString(36).substring(2, 7)}`,
            type: 'gpu',
            level: currentEquipped.level
          }));
        } else if (type === 'ram') {
          const currentEquipped = { ...ram };
          setRam({
            level: partToEquip.level,
            clockMhz: partToEquip.clockMhz,
            capacityGb: partToEquip.capacityGb,
            ddrGeneration: partToEquip.ddrGeneration
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-ram-${Math.random().toString(36).substring(2, 7)}`,
            type: 'ram',
            level: currentEquipped.level,
            clockMhz: currentEquipped.clockMhz,
            capacityGb: currentEquipped.capacityGb,
            ddrGeneration: currentEquipped.ddrGeneration
          }));
        } else if (type === 'cooler') {
          const currentEquipped = { ...cooler };
          setCooler({
            level: partToEquip.level,
            coolingCapacity: partToEquip.coolingCapacity
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-cooler-${Math.random().toString(36).substring(2, 7)}`,
            type: 'cooler',
            level: currentEquipped.level,
            coolingCapacity: currentEquipped.coolingCapacity
          }));
        } else if (type === 'storage') {
          const currentEquipped = { ...storage };
          setStorage({
            type: partToEquip.storageType, // 장착 스키마는 'type'으로 HDD/SSD 보유
            capacityGb: partToEquip.capacityGb,
            level: partToEquip.level
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-storage-${Math.random().toString(36).substring(2, 7)}`,
            type: 'storage',
            level: currentEquipped.level,
            storageType: currentEquipped.type, // 복귀 시 장착 스키마 'type'을 storageType에 매치
            capacityGb: currentEquipped.capacityGb
          }));
        }

        setUpgradeStatus('success');
        setUpgradeMessage(`🔄 [장비 교체 장착] ${type.toUpperCase()} +${partToEquip.level}강 장비가 장착 완료되었습니다.`);
        setTimeout(() => {
          setUpgradeStatus(null);
          setUpgradeMessage('');
        }, 3000);
      };

      // ----------------------------------------------------------------------
      // 8. 상위 사냥터(게임) 다운로드 진행도 시뮬레이션
      // ----------------------------------------------------------------------
      const startDownload = () => {
        if (storage.capacityGb < downloadTarget.requiredGb) {
          alert(`저장장치 용량이 부족하여 이 게임을 내려받을 수 없습니다. (필요: ${downloadTarget.requiredGb}GB, 현재: ${storage.capacityGb}GB)`);
          return;
        }
        setIsDownloading(true);
        setDownloadProgress(0);
      };

      useEffect(() => {
        if (!isDownloading) return;

        const interval = setInterval(() => {
          setDownloadProgress(prev => {
            const currentSize = (prev / 100) * downloadTarget.sizeMb;
            const nextSize = currentSize + (specs.downloadSpeedMb);
            
            if (nextSize >= downloadTarget.sizeMb) {
              clearInterval(interval);
              setIsDownloading(false);
              const ground = OMG.WORK_HUNTING_GROUNDS[downloadTarget.groundIndex];
              setHuntingGround({ name: ground.name, multiplier: ground.multiplier, mineralBase: ground.mineralBase, groundIndex: downloadTarget.groundIndex });
              const nextTarget = OMG.DOWNLOAD_TARGETS.find(t => t.groundIndex === downloadTarget.groundIndex + 1);
              if (nextTarget) setDownloadTarget({ name: nextTarget.name, sizeMb: nextTarget.sizeMb, requiredGb: nextTarget.requiredGb, groundIndex: nextTarget.groundIndex });
              return 100;
            }
            return (nextSize / downloadTarget.sizeMb) * 100;
          });
        }, Math.max(20, Math.round(100 / gameSpeedMult)));

        return () => clearInterval(interval);
      }, [isDownloading, specs.downloadSpeedMb, downloadTarget, gameSpeedMult]);

      // ----------------------------------------------------------------------
      // 9. 실시간 웹소켓 100층 레이드 방 연결 핸들러
      // ----------------------------------------------------------------------
      const joinRaidRoom = () => {
        setErrorMessage(null);
        setRewardMessage(null);
        setIsRaidOpen(true);

        const socketCon = io({
          reconnection: false
        });

        socketCon.on('connect', () => {
          console.log('[Socket] Connected to server.');
          socketCon.emit('joinRoom', {
            roomId: 'carry-room-100',
            userId: myId,
            nickname: nickname,
            parts: { cpu, gpu, ram, cooler, motherboard, storage }
          });
        });

        socketCon.on('room_state', (state) => {
          setRaidState(state);
        });

        socketCon.on('milestone_reward_claimed', (data) => {
          const { clearedFloor, txResult } = data;
          if (txResult.success) {
            setScaCoins(txResult.currentTotalCoins);
            setRewardMessage(`돌파 성공. ${clearedFloor}층 마일스톤 보상 SCA 코인 +${txResult.claimedCoins} 지급 완료.`);
            setTimeout(() => setRewardMessage(null), 4000);
          }
        });

        socketCon.on('error_message', (msg) => {
          setErrorMessage(msg);
        });

        socketCon.on('disconnect', (reason) => {
          console.log('[Socket] Disconnected:', reason);
          setErrorMessage(`🔴 [실시간 연결 끊김] 서버와의 실시간 네트워크 연결이 유실되었습니다 (원인: ${reason}). 레이드 참여방에서 이탈되었으니 다시 [레이드 입장]을 눌러 도전해 주시기 바랍니다.`);
          setRaidState(null);
          setSocket(null);
        });

        setSocket(socketCon);
      };

      const leaveRaidRoom = () => {
        if (socket) {
          socket.disconnect();
        }
        setSocket(null);
        setRaidState(null);
        setIsRaidOpen(false);
      };

      const toggleReady = () => {
        if (socket && raidState) {
          const me = raidState.players.find(p => p.userId === myId);
          if (me) {
            socket.emit('readyStatus', { isReady: !me.isReady });
          }
        }
      };

      return (
        <div className="container mx-auto p-4 max-w-7xl">
          
          {/* ================================================================== */}
          {/* 상단 자원 바 */}
          {/* ================================================================== */}
          <header className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 items-center bg-slate-900/60 p-4 rounded-xl border border-emerald-500/20 neon-border-emerald">
            <div className="flex items-center space-x-3">
              <div className="p-2 bg-emerald-500/10 rounded-lg text-emerald-400 border border-emerald-500/30">
                <span className="text-xl">🧠</span>
              </div>
              <div>
                <h1 className="text-sm text-slate-400 uppercase tracking-widest font-semibold">복원 제어 터미널</h1>
                <p className="text-xs text-emerald-500 font-mono">환생 {rebirthCount}회 · 환생수치 {rebirthStat.toLocaleString()} · 수입 x{rebirthIncomeMult.toFixed(2)} · 배속 {gameSpeedFrames}f</p>
              </div>
            </div>

            <div className="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-slate-800">
              <span className="text-xs uppercase tracking-wider text-slate-400 font-mono">MINERALS (원)</span>
              <span className="text-lg font-bold text-emerald-400 font-mono flex items-center space-x-1">
                <span>{minerals.toLocaleString()}</span>
                <span className="text-xs text-emerald-500/60 ml-1">/ 10,000→1C</span>
              </span>
            </div>

            <div className="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-slate-800">
              <span className="text-xs uppercase tracking-wider text-slate-400 font-mono">NORMAL COINS (가스)</span>
              <span className="text-lg font-bold text-cyan-400 font-mono">
                {normalCoins.toLocaleString()}
              </span>
            </div>

            <div className="flex items-center justify-between p-3 bg-slate-950/80 rounded-lg border border-cyan-500/30 neon-border-cyan">
              <div className="flex items-center space-x-1.5">
                <span className="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-ping"></span>
                <span className="text-xs uppercase tracking-wider text-cyan-300 font-mono">SCA CLOUD COINS</span>
              </div>
              <span className="text-lg font-bold text-cyan-300 font-mono">
                {scaCoins.toLocaleString()}
              </span>
            </div>
          </header>
          <div className="mb-4 flex gap-2 flex-wrap">
            <button onClick={() => setShowScaCenter(v => !v)} className="px-3 py-2 text-xs font-mono border border-cyan-500/30 rounded text-cyan-300">🏛️ SCA 센터</button>
          </div>
          {showScaCenter && (
            <section className="mb-4 p-4 border border-cyan-500/20 rounded-xl space-y-3">
              <p className="text-[10px] font-mono text-cyan-300/80">다음 환생 시작 미네랄: <strong>{OMG.calcRebirthStartMinerals(scaUpgrades).toLocaleString()}원</strong> (SCA 상점 구매분 합산 · 상한 {OMG.REBIRTH_MINERAL_CAP.toLocaleString()}원)</p>
              <p className="text-[10px] font-mono text-cyan-300/70">게임 배속 {gameSpeedFrames}프레임 (x{gameSpeedMult.toFixed(2)}) · GPU {OMG.GPU_GRADE_NAMES[gpuGrade]} ({gpuAttackFrames}f) · 다운로드 x{OMG.calcDownloadSpeedBonus(scaUpgrades).toFixed(1)}</p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
              {OMG.SCA_SHOP_ITEMS.map(item => {
                const bought = scaUpgrades[item.id] || 0;
                const soldOut = bought >= item.maxPurchases;
                return (
                  <button key={item.id} onClick={() => handlePurchaseScaItem(item)} disabled={soldOut} className={`p-2 bg-slate-950 border rounded text-[10px] font-mono text-left ${soldOut ? 'border-slate-900 opacity-40' : 'border-slate-800 hover:border-cyan-500/40'}`}>
                    <div>{item.name}</div>
                    <div className="text-cyan-400">{item.cost} SCA</div>
                    <div className="text-slate-500 mt-1">{bought}/{item.maxPurchases}</div>
                  </button>
                );
              })}
              </div>
            </section>
          )}

          {/* ================================================================== */}
          {/* 강화 플래시 스크린 */}
          {/* ================================================================== */}
          {upgradeStatus && (
            <div className={`mb-6 p-4 rounded-xl border transition-all duration-300 font-mono text-center ${
              upgradeStatus === 'upgrading' ? 'bg-blue-950/30 border-blue-500/50 text-blue-400 neon-border-cyan animate-pulse' :
              upgradeStatus === 'success' ? 'bg-emerald-950/30 border-emerald-500/50 text-emerald-400 neon-border-emerald' :
              upgradeStatus === 'fail_keep' ? 'bg-amber-950/30 border-amber-500/50 text-amber-400' :
              upgradeStatus === 'fail_drop' ? 'bg-yellow-950/30 border-yellow-500/50 text-yellow-400 animate-bounce' :
              'bg-rose-950/40 border-rose-500/80 text-rose-400 neon-border-rose animate-ping'
            }`}>
              <div className="flex items-center justify-center space-x-2">
                {upgradeStatus === 'upgrading' && <span className="w-2.5 h-2.5 rounded-full bg-blue-400 animate-ping"></span>}
                {upgradeStatus === 'success' && <span className="text-emerald-400 text-lg mr-1">✅</span>}
                {upgradeStatus === 'exploded' && <span className="text-rose-500 text-xl animate-bounce">💥</span>}
                <span className="text-sm font-bold uppercase tracking-wider">{upgradeMessage}</span>
              </div>
            </div>
          )}

          {/* ================================================================== */}
          {/* 중앙 그리드 레이아웃 */}

                                </div>
                                <div className="flex justify-between text-[9px] font-mono text-slate-500">
                                  <span>{p.isDead ? 'DDR에러 유닛 파괴됨' : `지분: ${Math.round(share)}%`}</span>
                                  {p.currentHp !== undefined && (
                                    <span>HP: {p.currentHp} / {p.maxHp}</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        <div className="pt-3 border-t border-slate-800 flex justify-between items-center text-xs font-mono">
                          <span className="text-slate-500">파티 합산 누적 DPS:</span>
                          <span className="text-cyan-400 font-bold">{raidState.totalDps.toLocaleString()}</span>
                        </div>
                      </div>

                      <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-xl flex flex-col space-y-3 font-mono">
                        <h3 className="text-xs text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-2 flex items-center space-x-1">
                          <span className="text-cyan-300 text-sm mr-1">🏆</span>
                          <span>오늘 남은 보상 구간</span>
                        </h3>
                        <div className="flex flex-col space-y-2 text-xs">
                          <div className="flex justify-between">
                            <span className="text-slate-500">수령 가능 마일스톤:</span>
                            <span className="text-cyan-300 font-bold">10층 ~ 100층 (10층단위)</span>
                          </div>
                          <div className="flex justify-between text-[11px] text-slate-400">
                            <span>오늘 남은 보상 층수:</span>
                            <span className="text-emerald-400 font-bold">
                              {raidState.currentFloor <= 100 ? `${Math.ceil(raidState.currentFloor / 10) * 10}층 ~ 100층` : '모든 구간 수령 완료'}
                            </span>
                          </div>
                          <p className="text-[9px] text-slate-500 mt-2 border-t border-slate-900 pt-2 leading-relaxed">
                            * 보상은 하루에 단 한 번, 날짜가 바뀌면 수령 완료 최고 층수가 0으로 리셋되며 다시 처음부터 순차로 차분 획득 가능합니다.
                          </p>
                        </div>
                      </div>

                    </div>

                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
