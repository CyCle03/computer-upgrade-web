<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>'컴퓨터 강화하기' 웹 복원판 대시보드</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React, ReactDOM, Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts Outfit & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Socket.io Client -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/originalMapData.js"></script>
  <style>
    body {
      font-family: 'Outfit', 'JetBrains Mono', sans-serif;
    }
    .neon-border-emerald {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.1);
    }
    .neon-border-rose {
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.4), inset 0 0 10px rgba(244, 63, 94, 0.2);
    }
    .neon-border-cyan {
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 10px rgba(6, 182, 212, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden selection:bg-emerald-500 selection:text-slate-950">

  <div id="root"></div>

  <!-- React UI 컴포넌트 마운트 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const OMG = window.OriginalMapGame;

    function App() {
      // ----------------------------------------------------------------------
      // 1. 핵심 유저 재화 및 강화 피드백 상태 정의
      // ----------------------------------------------------------------------
      const [minerals, setMinerals] = useState(() => {
        const saved = localStorage.getItem('sca_minerals');
        return saved !== null ? parseInt(saved, 10) : 2000;
      });
      useEffect(() => {
        const legacy = localStorage.getItem('sca_normalCoins');
        if (!legacy) return;
        const coins = parseInt(legacy, 10);
        localStorage.removeItem('sca_normalCoins');
        if (coins > 0) setMinerals((m) => m + coins);
      }, []);

      const [scaCoins, setScaCoins] = useState(() => {
        const saved = localStorage.getItem('sca_scaCoins');
        return saved !== null ? parseInt(saved, 10) : 0;
      });

      // 지능형 자동 구매 & 자동 강화 루프 토글 상태 신설
      const [autoBuyCpu, setAutoBuyCpu] = useState(() => localStorage.getItem('sca_autoBuyCpu') === 'true');
      const [autoBuyGpu, setAutoBuyGpu] = useState(() => localStorage.getItem('sca_autoBuyGpu') === 'true');
      const [autoBuyRam, setAutoBuyRam] = useState(() => localStorage.getItem('sca_autoBuyRam') === 'true');
      const [autoBuyCooler, setAutoBuyCooler] = useState(() => localStorage.getItem('sca_autoBuyCooler') === 'true');
      const [autoBuyStorage, setAutoBuyStorage] = useState(() => localStorage.getItem('sca_autoBuyStorage') === 'true');

      // 확률 강화 피드백 전용 상태
      const [upgradeStatus, setUpgradeStatus] = useState(null); // 'success', 'fail_keep', 'fail_drop', 'exploded', 'upgrading'
      const [upgradeMessage, setUpgradeMessage] = useState('');
      const [isUpgrading, setIsUpgrading] = useState(false);
      const [activeUpgradingPart, setActiveUpgradingPart] = useState(null);
      const [rebirthCount, setRebirthCount] = useState(() => {
        const saved = localStorage.getItem('sca_rebirthCount');
        return saved !== null ? parseInt(saved, 10) : 0;
      });
      const [rebirthStat, setRebirthStat] = useState(() => {
        const saved = localStorage.getItem('sca_rebirthStat');
        return saved !== null ? parseInt(saved, 10) : 0;
      });
      const defaultAutoTargets = { cpu: 1, gpu: 1, ram: 1, cooler: 1, storage: 1 };
      const [autoTargetLevels, setAutoTargetLevels] = useState(() => {
        try {
          return { ...defaultAutoTargets, ...JSON.parse(localStorage.getItem('sca_autoTargetLevels') || '{}') };
        } catch (e) { return defaultAutoTargets; }
      });
      const [scaUpgrades, setScaUpgrades] = useState(() => JSON.parse(localStorage.getItem('sca_scaUpgrades') || '{}'));
      const [showScaCenter, setShowScaCenter] = useState(false);
      const [partyHuntingTier, setPartyHuntingTier] = useState(0);
      const [isPartyHunting, setIsPartyHunting] = useState(false);
      const [cpuBuyManufacturer, setCpuBuyManufacturer] = useState('Intel');
      const [coolerBuyKind, setCoolerBuyKind] = useState('air');
      const [storageBuyKind, setStorageBuyKind] = useState('hdd');
      const [buyLevelIndex, setBuyLevelIndex] = useState({ cpu: 0, gpu: 0, ram: 0, cooler: 0, storage: 0 });

      // ----------------------------------------------------------------------
      // 2. 조립 컴퓨터 부품 상태 정의
      // ----------------------------------------------------------------------
      const [cpu, setCpu] = useState(() => {
        const saved = localStorage.getItem('sca_cpu');
        return saved !== null ? JSON.parse(saved) : { manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR3' };
      });
      const [gpu, setGpu] = useState(() => {
        const saved = localStorage.getItem('sca_gpu');
        return saved !== null ? JSON.parse(saved) : { level: 1 };
      });
      const [ram, setRam] = useState(() => {
        const saved = localStorage.getItem('sca_ram');
        return saved !== null ? JSON.parse(saved) : { level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' };
      });
      const [cooler, setCooler] = useState(() => {
        const saved = localStorage.getItem('sca_cooler');
        return saved !== null ? JSON.parse(saved) : { level: 1, coolingCapacity: 500, coolerKind: 'air' };
      });
      const [motherboard, setMotherboard] = useState(() => {
        const saved = localStorage.getItem('sca_motherboard');
        return saved !== null ? JSON.parse(saved) : { socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR3', shieldIncrease: 0 };
      });
      const [storage, setStorage] = useState(() => {
        const saved = localStorage.getItem('sca_storage');
        return saved !== null ? JSON.parse(saved) : { type: 'HDD', capacityGb: 60, level: 1, storageKind: 'hdd' };
      });

      const [inventory, setInventory] = useState(() => {
        const saved = localStorage.getItem('sca_inventory');
        if (saved !== null) return JSON.parse(saved);
        return [
          { id: 'inv-cpu-1', type: 'cpu', level: 1, manufacturer: 'Intel', ddrGeneration: 'DDR3' },
          { id: 'inv-gpu-1', type: 'gpu', level: 1 },
          { id: 'inv-ram-1', type: 'ram', level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' },
          { id: 'inv-cooler-1', type: 'cooler', level: 1, coolingCapacity: 500, coolerKind: 'air' },
          { id: 'inv-storage-1', type: 'storage', level: 1, storageType: 'HDD', storageKind: 'hdd', capacityGb: 60 }
        ];
      });

      // ----------------------------------------------------------------------
      // 3. 사냥터 및 다운로드 진행 상태 정의
      // ----------------------------------------------------------------------
      const [workTaskIndex, setWorkTaskIndex] = useState(() => {
        const saved = localStorage.getItem('sca_workTaskIndex');
        if (saved !== null) return parseInt(saved, 10);
        const legacy = localStorage.getItem('sca_huntingGround');
        if (legacy) { try { return JSON.parse(legacy).groundIndex ?? 0; } catch (e) {} }
        return 0;
      });
      const [workUnitMode, setWorkUnitMode] = useState(() => localStorage.getItem('sca_workUnitMode') || 'auto');
      const [manualWorkUnits, setManualWorkUnits] = useState(() => {
        const saved = localStorage.getItem('sca_manualWorkUnits');
        return saved !== null ? parseInt(saved, 10) : 1;
      });
      const [unlockedGameIndex, setUnlockedGameIndex] = useState(() => {
        const saved = localStorage.getItem('sca_unlockedGameIndex');
        return saved !== null ? parseInt(saved, 10) : -1;
      });
      const [isDownloading, setIsDownloading] = useState(false);
      const [downloadProgress, setDownloadProgress] = useState(0);
      const [downloadTarget, setDownloadTarget] = useState(() => {
        const saved = localStorage.getItem('sca_downloadTarget');
        if (saved !== null) return JSON.parse(saved);
        const t = OMG.DOWNLOAD_TARGETS[0];
        return { name: t.name, sizeMb: t.sizeMb, requiredGb: t.requiredGb, gameIndex: t.gameIndex };
      });

      // ----------------------------------------------------------------------
      // 4. 실시간 소켓 멀티플레이 레이드 상태 정의
      // ----------------------------------------------------------------------
      const [isRaidOpen, setIsRaidOpen] = useState(false);
      const [socket, setSocket] = useState(null);
      const [raidState, setRaidState] = useState(null);
      const [rewardMessage, setRewardMessage] = useState(null);
      const [myId] = useState(() => {
        const saved = localStorage.getItem('sca_myId');
        // [고증 보안 패치] PostgreSQL UUID 규격 준수를 위한 클렌징 작업 (36글자 UUID 규격 준수 검사)
        const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
        if (saved !== null && uuidRegex.test(saved)) {
          return saved;
        }
        
        // 표준 RFC4122 v4 UUID 생성기
        const newId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
        
        localStorage.setItem('sca_myId', newId);
        return newId;
      });
      const [nickname] = useState(() => {
        const saved = localStorage.getItem('sca_nickname');
        if (saved !== null) return saved;
        const newName = `Player_${Math.floor(100 + Math.random() * 900)}`;
        localStorage.setItem('sca_nickname', newName);
        return newName;
      });
      const [errorMessage, setErrorMessage] = useState(null);

      const [combatLogs, setCombatLogs] = useState([
        '💬 [SYSTEM] 사이버네틱 배틀 매트릭스 기동 완료.',
        '💬 [SYSTEM] 100층 레이드용 소켓 프로토콜 대기 중.'
      ]);

      const getSummonUnit = (level) => {
        const units = {
          1: { name: '테란 마린 (Marine)', emoji: '🔫', dpsFactor: 1.0 },
          2: { name: '테란 고스트 (Ghost)', emoji: '👁️', dpsFactor: 1.5 },
          3: { name: '프로토스 드라군 (Dragoon)', emoji: '🦀', dpsFactor: 2.2 },
          4: { name: '저그 히드라리스크 (Hydralisk)', emoji: '🐍', dpsFactor: 3.2 },
          5: { name: '테란 영웅 시즈 탱크 (Siege Tank)', emoji: '💥', dpsFactor: 4.8 },
          6: { name: '프로토스 하이 템플러 / 아칸 (Archon)', emoji: '⚡', dpsFactor: 7.2 },
          7: { name: '프로토스 우주모함 캐리어 (Carrier)', emoji: '🛸', dpsFactor: 11.0 },
          8: { name: '테란 전투순양함 배틀크루저 (Battlecruiser)', emoji: '🚢', dpsFactor: 16.0 },
          9: { name: '프로토스 전설 영웅 제라툴 (Zeratul)', emoji: '🗡️', dpsFactor: 25.0 },
          10: { name: '최종 테란 기함 하이페리온 (Hyperion)', emoji: '🌟', dpsFactor: 45.0 }
        };
        return units[level] || { name: '미확인 차원 유닛', emoji: '👽', dpsFactor: level * 5 };
      };

      const getRaidBossName = (floor) => {
        const bosses = {
          10: 'Guarder (폭주한 광전사 영웅)',
          20: 'Torrasque (울트라리스크 융합수)',
          30: 'Matriarch (뮤탈리스크 군락 영웅)',
          40: 'Unclean One (디파일러 불사 보스)',
          50: 'General Duke (크론 배틀크루저)',
          60: 'Fenix (드라군 기계 거신 영웅)',
          70: 'Zeratul (공허의 방랑자 제라툴)',
          80: 'Infested Kerrigan (칼날의 여왕 케리건)',
          90: 'The Overmind (초월체 생체 거대 코어)',
          100: 'Amon (어두운 공허의 지배자 아몬)'
        };
        return bosses[floor] || `Raid Boss Level ${floor} (수호 가디언)`;
      };

      // ----------------------------------------------------------------------
      // 스타1 컴퓨터강화 유즈맵 고증 부품 이름 매핑 헬퍼
      // ----------------------------------------------------------------------
      const incomeBonusRate = useMemo(() => OMG.calcIncomeBonus(scaUpgrades), [scaUpgrades]);
      const probBonusRate = useMemo(() => OMG.calcProbBonus(scaUpgrades), [scaUpgrades]);
      const rebirthIncomeMult = useMemo(() => OMG.calcRebirthIncomeMultiplier(rebirthStat), [rebirthStat]);
      const gameSpeedFrames = useMemo(() => OMG.calcGameSpeedFrames(scaUpgrades), [scaUpgrades]);
      const gameSpeedMult = useMemo(() => OMG.calcGameSpeedMultiplier(scaUpgrades), [scaUpgrades]);
      const gpuGrade = useMemo(() => OMG.calcGpuGrade(scaUpgrades), [scaUpgrades]);
      const gpuAttackFrames = useMemo(() => OMG.calcGpuAttackFrames(scaUpgrades), [scaUpgrades]);

      const workParts = useMemo(() => ({ cpu, gpu, ram, cooler, storage, motherboard }), [cpu, gpu, ram, cooler, storage, motherboard]);
      const effectiveUnitLimit = useMemo(() => {
        let limit = OMG.getCpuCores(cpu);
        if (cpu.manufacturer !== motherboard.socketManufacturer) {
          limit = Math.max(1, Math.floor(limit * 0.5));
        }
        return limit;
      }, [cpu, motherboard]);
      const workSpecStatus = useMemo(
        () => OMG.evaluateWorkTaskSpec(workParts, workTaskIndex),
        [workParts, workTaskIndex]
      );
      const maxWorkUnits = workSpecStatus.activeWorkUnits || 0;
      const workMineralMultiplier = useMemo(() => {
        const cpuHeatDemand = OMG.getCpuCoolingRequired(cpu);
        return cpuHeatDemand > cooler.coolingCapacity ? 0.5 : 1.0;
      }, [cpu, cooler]);
      const currentWorkTask = useMemo(() => OMG.getWorkTask(workTaskIndex), [workTaskIndex]);
      const activeGame = useMemo(
        () => (unlockedGameIndex >= 0 ? OMG.getGameHunt(unlockedGameIndex) : null),
        [unlockedGameIndex]
      );
      const downloadValidation = useMemo(
        () => OMG.validateDownloadStart(workParts, unlockedGameIndex, downloadTarget, isDownloading, minerals),
        [workParts, unlockedGameIndex, downloadTarget, isDownloading, minerals]
      );

      const getCpuName = (level, m) => OMG.getPartName('cpu', level, { type: 'cpu', manufacturer: m || cpu.manufacturer });
      const getGpuName = (level) => OMG.getPartName('gpu', level, { type: 'gpu' });
      const getRamName = (level, part) => OMG.getPartName('ram', level, part || ram);
      const getCoolerName = (level, part) => OMG.getPartName('cooler', level, part || cooler);
      const getStorageName = (level, part) => OMG.getPartName('storage', level, part || storage);

      // ----------------------------------------------------------------------
      // 5. 실시간 하드웨어 스펙 연산 (2단계 백엔드 공식과 100% 매칭)
      // ----------------------------------------------------------------------
      const specs = useMemo(() => {
        // A. 과열 시스템 감지
        const cpuHeatDemand = OMG.getCpuCoolingRequired(cpu);
        const isOverheated = cpuHeatDemand > cooler.coolingCapacity;
        const mineralMultiplier = isOverheated ? 0.5 : 1.0;

        // B. 소켓 불일치 감지
        const isSocketMismatched = cpu.manufacturer !== motherboard.socketManufacturer;

        // C. DDR 세대 불일치 감지
        const ddrSet = new Set([cpu.ddrGeneration, ram.ddrGeneration, motherboard.supportedDdrGeneration]);
        const isDdrMismatched = ddrSet.size > 1;
        const hpDecayRate = isDdrMismatched ? (ddrSet.size === 2 ? 0.50 : 1.00) : 0.00;

        // D. 가용 유닛 수 상한
        let unitLimit = OMG.getCpuCores(cpu);
        if (isSocketMismatched) {
          unitLimit = Math.max(1, Math.floor(unitLimit * 0.5));
        }

        // E. RAM 분배: 작업 점유 후 남은 RAM으로 사냥 유닛 (GPU 1기당 RAM × CPU 코어)
        const _workUnitsForSpecs = workUnitMode === 'auto'
          ? OMG.calcOptimalWorkUnits(workParts, workTaskIndex, unlockedGameIndex, effectiveUnitLimit, mineralMultiplier, rebirthIncomeMult, incomeBonusRate, isDownloading)
          : Math.min(Math.max(0, manualWorkUnits), workSpecStatus.activeWorkUnits || 0);
        const ramAllocation = OMG.calcRamAllocation(workParts, workTaskIndex, effectiveUnitLimit, _workUnitsForSpecs);
        const maxHuntingUnits = ramAllocation.activeHuntingUnits;

        // F. 유닛 체력 및 메인보드 고정 실드
        const unitHp = 100 * cpu.level;
        const unitShield = motherboard.shieldIncrease;

        // G. 공격 주기 (v1.1.6: GPU 등급 → 20/16/12/8 프레임)
        const attackSpeedSec = Math.max(0.1, Math.round((gpuAttackFrames / 24) * 100) / 100);

        // H. 데미지 (GPU 기하급수 및 CPU 소환수 등급 결합 시너지 성장)
        const unitDamage = Math.round(10 * Math.pow(1.5, gpu.level - 1) * getSummonUnit(cpu.level).dpsFactor);

        // I. 방어력
        let unitDefense = cooler.level * 3;
        if (isOverheated) {
          unitDefense = Math.max(0, Math.floor(unitDefense * 0.5));
        }

        // J. 다운로드 속도 (§3.8 HDD x1 / NVMe x4 + SCA +10%)
        const storageDownloadMult = OMG.getStorageDownloadMultiplier(storage);
        const downloadSpeedMb = OMG.calcDownloadSpeedMb(storage, scaUpgrades);

        return {
          unitLimit,
          maxHuntingUnits,
          unitHp,
          unitShield,
          attackSpeedSec,
          unitDamage,
          unitDefense,
          downloadSpeedMb,
          storageDownloadMult,
          ramAllocation,
          workRamUsed: ramAllocation.workRamUsed,
          huntRamFree: ramAllocation.huntRamFree,
          gpuRamPerUnit: ramAllocation.ramPerUnit,
          gpuGrade,
          gpuAttackFrames,
          gameSpeedFrames,
          cpuHeatDemand,
          penalties: {
            isOverheated,
            isSocketMismatched,
            isDdrMismatched,
            hpDecayRate,
            mineralMultiplier
          }
        };
      }, [cpu, gpu, ram, cooler, motherboard, storage, scaUpgrades, gpuAttackFrames, gpuGrade, workParts, workTaskIndex, effectiveUnitLimit, workUnitMode, manualWorkUnits, workSpecStatus, unlockedGameIndex, rebirthIncomeMult, incomeBonusRate, isDownloading]);

      const effectiveWorkUnits = useMemo(() => {
        if (!workSpecStatus.ok || maxWorkUnits <= 0) return 0;
        if (workUnitMode === 'auto') {
          return OMG.calcOptimalWorkUnits(
            workParts, workTaskIndex, unlockedGameIndex, effectiveUnitLimit,
            workMineralMultiplier, rebirthIncomeMult, incomeBonusRate, isDownloading
          );
        }
        return Math.min(Math.max(0, manualWorkUnits), maxWorkUnits);
      }, [workParts, workTaskIndex, workUnitMode, manualWorkUnits, maxWorkUnits, workSpecStatus.ok, unlockedGameIndex, effectiveUnitLimit, workMineralMultiplier, rebirthIncomeMult, incomeBonusRate, isDownloading]);

      const ramAlloc = useMemo(
        () => OMG.calcRamAllocation(workParts, workTaskIndex, effectiveUnitLimit, effectiveWorkUnits),
        [workParts, workTaskIndex, effectiveUnitLimit, effectiveWorkUnits]
      );

      useEffect(() => {
        if (manualWorkUnits > maxWorkUnits) {
          setManualWorkUnits(maxWorkUnits);
        }
      }, [maxWorkUnits, manualWorkUnits]);

      useEffect(() => {
        if (localStorage.getItem('sca_rebirthStatMigrated')) return;
        if (rebirthCount > 0 && rebirthStat === 0) {
          setRebirthStat(rebirthCount * 10000);
        }
        localStorage.setItem('sca_rebirthStatMigrated', '1');
      }, []);

      useEffect(() => {
        if (cooler.level === 1 && cooler.coolingCapacity === 30) {
          setCooler(c => ({ ...c, coolingCapacity: 500, coolerKind: c.coolerKind || 'air' }));
        }
      }, []);

      useEffect(() => {
        // 레거시 저장값 마이그레이션: HDD 1강인데 250GB로 저장된 경우(이전 기본값) 60GB로 보정
        if ((storage.storageKind || 'hdd') === 'hdd' && (storage.level || 1) === 1 && storage.type === 'HDD' && storage.capacityGb === 250) {
          setStorage((s) => ({ ...s, capacityGb: 60, storageKind: s.storageKind || 'hdd' }));
        }
        // 인벤토리 저장장치도 동일 보정
        setInventory((prev) => prev.map((p) => {
          if (p.type !== 'storage') return p;
          if ((p.storageKind || 'hdd') === 'hdd' && (p.level || 1) === 1 && p.storageType === 'HDD' && p.capacityGb === 250) {
            return { ...p, capacityGb: 60, storageKind: p.storageKind || 'hdd' };
          }
          return p;
        }));
      }, []);

      useEffect(() => {
        if (OMG.canSelectWorkTask(workParts, workTaskIndex)) return;
        for (let i = workTaskIndex - 1; i >= 0; i--) {
          if (OMG.canSelectWorkTask(workParts, i)) {
            setWorkTaskIndex(i);
            return;
          }
        }
        setWorkTaskIndex(0);
      }, [workParts, workTaskIndex, cpu.level, gpu.level, ram.level, ram.capacityGb, motherboard.shieldIncrease]);

      useEffect(() => {
        const normalized = OMG.normalizeGameProgress(unlockedGameIndex, downloadTarget);
        if (normalized.unlockedGameIndex !== unlockedGameIndex) setUnlockedGameIndex(normalized.unlockedGameIndex);
        const dt = normalized.downloadTarget;
        const dtChanged = (downloadTarget && downloadTarget.gameIndex) !== (dt && dt.gameIndex) || (downloadTarget && downloadTarget.name) !== (dt && dt.name);
        if (dtChanged) setDownloadTarget(dt);
      }, []);

      useEffect(() => {
        if (isPartyHunting) return;
        const tickMs = OMG.calcIncomeEventIntervalMs(scaUpgrades, gpuAttackFrames);
        const interval = setInterval(() => {
          const earn = OMG.calcWorkIncomePerTick(
            workParts,
            workTaskIndex,
            specs.penalties.mineralMultiplier,
            rebirthIncomeMult,
            incomeBonusRate,
            effectiveUnitLimit,
            effectiveWorkUnits
          );
          if (earn > 0) setMinerals((p) => p + earn);
        }, tickMs);
        return () => clearInterval(interval);
      }, [specs, workParts, workTaskIndex, rebirthIncomeMult, incomeBonusRate, isPartyHunting, gameSpeedMult, gpuAttackFrames, scaUpgrades, effectiveUnitLimit, effectiveWorkUnits]);

      useEffect(() => {
        const tickMs = OMG.calcIncomeEventIntervalMs(scaUpgrades, gpuAttackFrames);
        const interval = setInterval(() => {
          if (isDownloading) return;
          const earn = OMG.calcHuntIncomePerTick(workParts, workTaskIndex, unlockedGameIndex, incomeBonusRate, isDownloading, effectiveUnitLimit, effectiveWorkUnits);
          if (earn > 0) setMinerals((p) => p + earn);
        }, tickMs);
        return () => clearInterval(interval);
      }, [workParts, workTaskIndex, unlockedGameIndex, incomeBonusRate, gameSpeedMult, gpuAttackFrames, scaUpgrades, isDownloading, effectiveUnitLimit, effectiveWorkUnits]);
      useEffect(() => {
        if (!isPartyHunting) return;
        const tier = OMG.PARTY_HUNTING_TIERS[partyHuntingTier];
        if (!tier) return;
        const tickMs = OMG.calcGameSpeedTickMs(scaUpgrades, 3000);
        const iv = setInterval(() => {
          setMinerals(p => p + Math.round(tier.mineralPerTick * (1 + incomeBonusRate)));
          setScaCoins(p => p + tier.scaCoins);
        }, tickMs);
        return () => clearInterval(iv);
      }, [isPartyHunting, partyHuntingTier, incomeBonusRate, gameSpeedMult]);

      // ----------------------------------------------------------------------
      // 6.5. 게임 진행 상태 로컬 스토리지 실시간 자동 저장 (F5/새로고침 방지)
      // ----------------------------------------------------------------------
      useEffect(() => {
        localStorage.setItem('sca_minerals', minerals.toString());
        localStorage.setItem('sca_scaCoins', scaCoins.toString());
        localStorage.setItem('sca_rebirthCount', rebirthCount.toString());
        localStorage.setItem('sca_rebirthStat', rebirthStat.toString());
        localStorage.setItem('sca_autoTargetLevels', JSON.stringify(autoTargetLevels));
        localStorage.setItem('sca_scaUpgrades', JSON.stringify(scaUpgrades));
        localStorage.setItem('sca_partyHuntingTier', String(partyHuntingTier));
        localStorage.setItem('sca_cpu', JSON.stringify(cpu));
        localStorage.setItem('sca_gpu', JSON.stringify(gpu));
        localStorage.setItem('sca_ram', JSON.stringify(ram));
        localStorage.setItem('sca_cooler', JSON.stringify(cooler));
        localStorage.setItem('sca_motherboard', JSON.stringify(motherboard));
        localStorage.setItem('sca_storage', JSON.stringify(storage));
        localStorage.setItem('sca_workTaskIndex', String(workTaskIndex));
        localStorage.setItem('sca_workUnitMode', workUnitMode);
        localStorage.setItem('sca_manualWorkUnits', String(manualWorkUnits));
        localStorage.setItem('sca_unlockedGameIndex', String(unlockedGameIndex));
        localStorage.setItem('sca_downloadTarget', JSON.stringify(downloadTarget));
        localStorage.setItem('sca_inventory', JSON.stringify(inventory));
        localStorage.setItem('sca_autoBuyCpu', autoBuyCpu.toString());
        localStorage.setItem('sca_autoBuyGpu', autoBuyGpu.toString());
        localStorage.setItem('sca_autoBuyRam', autoBuyRam.toString());
        localStorage.setItem('sca_autoBuyCooler', autoBuyCooler.toString());
        localStorage.setItem('sca_autoBuyStorage', autoBuyStorage.toString());
      }, [minerals, scaCoins, rebirthCount, rebirthStat, autoTargetLevels, scaUpgrades, partyHuntingTier, cpu, gpu, ram, cooler, motherboard, storage, workTaskIndex, workUnitMode, manualWorkUnits, unlockedGameIndex, downloadTarget, inventory, autoBuyCpu, autoBuyGpu, autoBuyRam, autoBuyCooler, autoBuyStorage]);

      // ----------------------------------------------------------------------
      // 6.6. 가상 사냥터 실시간 전투 매트릭스 로그 생성기 (스타1 콘솔 싱크)
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
          let newLog;
          if (isPartyHunting) {
            const tier = OMG.PARTY_HUNTING_TIERS[partyHuntingTier];
            if (!tier) return;
            const mEarn = Math.round(tier.mineralPerTick * (1 + incomeBonusRate));
            newLog = `[${time}] 👥 파티 :: ${tier.name} +${mEarn}원 +${tier.scaCoins}C`;
          } else {
            const workEarn = OMG.calcWorkIncomePerTick(workParts, workTaskIndex, specs.penalties.mineralMultiplier, rebirthIncomeMult, incomeBonusRate, effectiveUnitLimit, effectiveWorkUnits);
            const huntEarn = OMG.calcHuntIncomePerTick(workParts, workTaskIndex, unlockedGameIndex, incomeBonusRate, isDownloading, effectiveUnitLimit, effectiveWorkUnits);
            const gameName = activeGame ? activeGame.name : '게임 없음';
            newLog = `[${time}] 💼작업 +${workEarn}원 · 🎮${gameName} ${specs.maxHuntingUnits}기 +${huntEarn}원`;
          }
          setCombatLogs(prev => {
            const nextLogs = [...prev, newLog];
            if (nextLogs.length > 8) nextLogs.shift();
            return nextLogs;
          });
        }, 1500);
        return () => clearInterval(interval);
      }, [cpu.level, specs, workParts, workTaskIndex, unlockedGameIndex, activeGame, rebirthIncomeMult, incomeBonusRate, isPartyHunting, partyHuntingTier, effectiveUnitLimit, effectiveWorkUnits, isDownloading]);

      // ----------------------------------------------------------------------
      // 6.7. 지능형 자동 구매 및 자동 강화(Auto Buy & Upgrade) 통합 루프 엔진
      // ----------------------------------------------------------------------
      useEffect(() => {
        const interval = setInterval(() => {
          // 강화 주입 프레임 진행 중이거나, 다른 구매/강화 작업 진행 중이면 다음 턴 대기
          if (isUpgrading) return;

          const parts = ['cpu', 'gpu', 'ram', 'cooler', 'storage'];
          
          for (const type of parts) {
            let active = false;
            let setAuto = null;

            if (type === 'cpu') { active = autoBuyCpu; setAuto = setAutoBuyCpu; }
            else if (type === 'gpu') { active = autoBuyGpu; setAuto = setAutoBuyGpu; }
            else if (type === 'ram') { active = autoBuyRam; setAuto = setAutoBuyRam; }
            else if (type === 'cooler') { active = autoBuyCooler; setAuto = setAutoBuyCooler; }
            else if (type === 'storage') { active = autoBuyStorage; setAuto = setAutoBuyStorage; }

            if (!active) continue;

            // 해당 부품 유형의 인벤토리 아이템을 추출
            const owned = inventory.filter(p => p.type === type);
            
            if (owned.length === 0) {
              if (type === 'ram' && !OMG.canPurchaseRam(inventory)) {
                setAuto(false);
                setCombatLogs(prev => [...prev.slice(-7), `⚠️ [SYSTEM] RAM 창고 한도(${OMG.MAX_RAM_INVENTORY}개)로 ${type.toUpperCase()} 자동 구매가 중단되었습니다.`]);
                break;
              }
              const buyMeta = getComponentBuyMeta(type);
              const costM = OMG.getShopTierCostMinerals(type, 1, buyMeta);
              if (minerals >= costM) { handleBuyComponentPack(type, 1); break; }
              setAuto(false);
              setCombatLogs(prev => [...prev.slice(-7), `⚠️ [SYSTEM] 미네랄 부족으로 ${type.toUpperCase()} 자동 구매가 중단되었습니다.`]);
              break;
            } else {
              const goal = autoTargetLevels[type] || 1;
              const target = owned.filter(p => p.level < goal && p.level < OMG.getMaxLevel(type, p)).sort((a, b) => b.level - a.level)[0];
              if (target) {
                // 원작 규칙: 강화는 비용이 들지 않음(구매/팩만 비용 지불)
                handleInventoryUpgrade(target.id);
                break;
              } else {
                setAuto(false);
                setCombatLogs(prev => [...prev.slice(-7), `🎉 [SYSTEM] ${type.toUpperCase()} 자동강화 목표 ${goal}강 달성.`]);
                break;
              }
            }
          }
        }, 650);

        return () => clearInterval(interval);
      }, [autoBuyCpu, autoBuyGpu, autoBuyRam, autoBuyCooler, autoBuyStorage, autoTargetLevels, isUpgrading, inventory, cpuBuyManufacturer, coolerBuyKind, storageBuyKind]);

      // ----------------------------------------------------------------------
      // 7. V1.2.9 원작 강화 (미네랄 상점)
      // ----------------------------------------------------------------------
      const getUpgradeCost = (type, level, part) => OMG.getUpgradeCost(type, level, part || { type });
      const getUpgradeProbability = (type, level, part) => OMG.getUpgradeProbability(type, level, part || { type }, probBonusRate);

      const adjustAutoTarget = (type, delta) => {
        setAutoTargetLevels(prev => {
          const sample = inventory.find(p => p.type === type) || { type };
          const maxLv = OMG.getMaxLevel(type, sample);
          const next = Math.max(1, Math.min(maxLv, (prev[type] || 1) + delta));
          return { ...prev, [type]: next };
        });
      };


      const adjustBuyLevel = (type, delta, count) => {
        setBuyLevelIndex(prev => {
          const cur = Math.min(prev[type] || 0, Math.max(0, count - 1));
          const next = Math.max(0, Math.min(count - 1, cur + delta));
          return { ...prev, [type]: next };
        });
      };

      const getComponentBuyMeta = (type) => ({
        type,
        manufacturer: type === 'cpu' ? cpuBuyManufacturer : undefined,
        coolerKind: type === 'cooler' ? coolerBuyKind : undefined,
        storageKind: type === 'storage' ? storageBuyKind : undefined,
      });

      const handlePurchaseScaItem = (item) => {
        const bought = scaUpgrades[item.id] || 0;
        if (bought >= item.maxPurchases) { alert('최대 구매 횟수 도달'); return; }
        if (scaCoins < item.cost) { alert('SCA 코인 부족'); return; }
        setScaCoins((prev) => prev - item.cost);
        setScaUpgrades((prev) => ({ ...prev, [item.id]: bought + 1 }));
        if (item.id === 'intelCpu11') {
          setInventory((prev) => [...prev, OMG.createIntelCpu11InventoryItem()]);
          setUpgradeMessage('📦 SCA Intel CPU 11강이 창고에 추가되었습니다.');
          setUpgradeStatus('success');
        }
      };

      const handleBuyComponentPack = (type, level = 1) => {
        if (type === 'ram' && !OMG.canPurchaseRam(inventory)) {
          alert(`RAM은 최대 ${OMG.MAX_RAM_INVENTORY}개까지 창고에 보관할 수 있습니다.`);
          return;
        }
        const buyMeta = getComponentBuyMeta(type);
        if (!OMG.isPurchasableLevel(type, level, buyMeta)) {
          const buyable = OMG.getPurchasableLevels(type, buyMeta);
          const list = buyable.length ? buyable.map((lv) => `+${lv}강`).join(', ') : '없음';
          alert(`${type.toUpperCase()} +${level}강은 상점에서 직접 구매할 수 없습니다. 구매 가능: ${list}. 그 외 강은 강화로 올려야 합니다.`);
          return;
        }
        const costM = OMG.getShopTierCostMinerals(type, level, buyMeta);
        if (minerals < costM) {
          alert(`미네랄 부족 (필요 ${OMG.formatMineral(costM)} · 보유 ${OMG.formatMineral(minerals)})`);
          return;
        }
        setMinerals((prev) => prev - costM);
        const newPart = OMG.buildInventoryPart(type, level, {
          manufacturer: cpuBuyManufacturer,
          ddrGeneration: motherboard.supportedDdrGeneration || 'DDR3',
          coolerKind: coolerBuyKind,
          storageKind: storageBuyKind,
        });
        setInventory((prev) => [...prev, newPart]);
        const tierName = OMG.getPartName(type, level, newPart);
        setUpgradeStatus('success');
        setUpgradeMessage(`📦 [구매] ${tierName} (+${level}강, -${OMG.formatMineral(costM)})`);
        setTimeout(() => { setUpgradeStatus(null); setUpgradeMessage(''); }, 2500);
      };

      const handleSellComponent = (itemId) => {
        const part = inventory.find(p => p.id === itemId);
        if (!part) return;
        const sellM = OMG.getShopSellPriceMinerals(part.type, part.level, part);
        setMinerals((prev) => prev + sellM);
        setInventory((prev) => prev.filter(p => p.id !== itemId));
        setUpgradeMessage(`💰 [판매] +${OMG.formatMineral(sellM)} (${OMG.getPartName(part.type, part.level, part)})`);
        setUpgradeStatus('success');
        setTimeout(() => { setUpgradeStatus(null); setUpgradeMessage(''); }, 2500);
      };

      const handleInventoryUpgrade = (itemId) => {
        if (isUpgrading) return;
        const partToUpgrade = inventory.find(p => p.id === itemId);
        if (!partToUpgrade) return;
        const currentLevel = partToUpgrade.level;
        setIsUpgrading(true);
        setActiveUpgradingPart(partToUpgrade.type);
        setUpgradeStatus('upgrading');
        setUpgradeMessage(`강화 중... ${partToUpgrade.type.toUpperCase()} +${currentLevel}강`);
        setTimeout(() => {
          const prob = OMG.getUpgradeProbability(partToUpgrade.type, currentLevel, partToUpgrade, probBonusRate);
          const result = Math.random() <= prob ? 'success' : 'exploded';
          setIsUpgrading(false);
          setUpgradeStatus(result);
          if (result === 'success') {
            setInventory((prev) => prev.map(p => p.id === itemId ? OMG.applyTierStats(p, currentLevel + 1) : p));
            setUpgradeMessage(`🎉 강화 성공! +${currentLevel + 1}강`);
          } else {
            setInventory((prev) => prev.filter(p => p.id !== itemId));
            setUpgradeMessage('💥 [강화 실패] 장비가 폭파되었습니다!');
          }
          setTimeout(() => { setUpgradeStatus(null); setUpgradeMessage(''); }, 3500);
        }, 600);
      };

      const handleRebirth = () => {
        if (gpu.level < 10) { alert('GPU 10강 필요'); return; }
        if (isDownloading) { alert('게임 다운로드 중에는 환생할 수 없습니다. (v1.0.6)'); return; }
        if (!confirm('환생 시 부품·미네랄이 초기화됩니다. SCA 코인/센터·환생 수치는 유지됩니다.')) return;
        const parts = { cpu, gpu, ram, cooler, storage };
        const outcome = OMG.calcRebirthOutcome(parts, rebirthStat);
        const startMinerals = OMG.calcRebirthStartMinerals(scaUpgrades);
        setScaCoins((prev) => prev + outcome.scaReward);
        setRebirthStat(outcome.correctedStat);
        setRebirthCount((prev) => prev + 1);
        setMinerals(startMinerals);
setCpu({ manufacturer: 'Intel', level: 1, ddrGeneration: 'DDR3' });
        setGpu({ level: 1 });
        setRam({ level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' });
        setCooler({ level: 1, coolingCapacity: 500, coolerKind: 'air' });
        setMotherboard({ socketManufacturer: 'Intel', supportedDdrGeneration: 'DDR3', shieldIncrease: 0 });
        setStorage({ type: 'HDD', capacityGb: 60, level: 1, storageKind: 'hdd' });
        setInventory([
          { id: 'inv-cpu-1', type: 'cpu', level: 1, manufacturer: 'Intel', ddrGeneration: 'DDR3' },
          { id: 'inv-gpu-1', type: 'gpu', level: 1 },
          { id: 'inv-ram-1', type: 'ram', level: 1, clockMhz: 1333, capacityGb: 1, ddrGeneration: 'DDR3' },
          { id: 'inv-cooler-1', type: 'cooler', level: 1, coolingCapacity: 500, coolerKind: 'air' },
          { id: 'inv-storage-1', type: 'storage', level: 1, storageType: 'HDD', storageKind: 'hdd', capacityGb: 60 }
        ]);
        setWorkTaskIndex(0);
        setUnlockedGameIndex(-1);
        const dt = OMG.DOWNLOAD_TARGETS[0];
        setDownloadTarget({ name: dt.name, sizeMb: dt.sizeMb, requiredGb: dt.requiredGb, mineralCost: dt.mineralCost || 0, gameIndex: dt.gameIndex });
        setIsDownloading(false);
        setDownloadProgress(0);
        setIsPartyHunting(false);
        setAutoTargetLevels(defaultAutoTargets);
        setUpgradeMessage(`✨ 환생 +${outcome.statGain.toLocaleString()} (보정 전 ${outcome.baseStat.toLocaleString()} → 보정 후 ${outcome.correctedStat.toLocaleString()}) · SCA +${outcome.scaReward.toLocaleString()}C · 시작 미네랄 ${startMinerals.toLocaleString()}원`);
        setUpgradeStatus('success');
      };

      const handlePurchaseMotherboard = (board) => {
        const mbCost = OMG.costToMinerals(board.cost);
        if (minerals < mbCost) { alert(`미네랄 부족 (필요 ${OMG.formatMineral(mbCost)})`); return; }
        setMinerals((prev) => prev - mbCost);
        setMotherboard({ socketManufacturer: board.socketManufacturer, supportedDdrGeneration: board.supportedDdrGeneration, shieldIncrease: board.shieldIncrease });
      };

            // 2. 보관 장비 스왑 장착 핸들러
      const handleEquipComponent = (itemId) => {
        const partToEquip = inventory.find(p => p.id === itemId);
        if (!partToEquip) return;

        const type = partToEquip.type;

        // 메인 부품 스와핑 처리
        if (type === 'cpu') {
          const currentEquipped = { ...cpu };
          setCpu({
            manufacturer: partToEquip.manufacturer,
            level: partToEquip.level,
            ddrGeneration: partToEquip.ddrGeneration
          });
          // 인벤토리 목록에서 장착된 것 빼고 기존 장착 부품 반입
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-cpu-${Math.random().toString(36).substring(2, 7)}`,
            type: 'cpu',
            level: currentEquipped.level,
            manufacturer: currentEquipped.manufacturer,
            ddrGeneration: currentEquipped.ddrGeneration
          }));
        } else if (type === 'gpu') {
          const currentEquipped = { ...gpu };
          setGpu({ level: partToEquip.level });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-gpu-${Math.random().toString(36).substring(2, 7)}`,
            type: 'gpu',
            level: currentEquipped.level
          }));
        } else if (type === 'ram') {
          const currentEquipped = { ...ram };
          setRam({
            level: partToEquip.level,
            clockMhz: partToEquip.clockMhz,
            capacityGb: partToEquip.capacityGb,
            ddrGeneration: partToEquip.ddrGeneration
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-ram-${Math.random().toString(36).substring(2, 7)}`,
            type: 'ram',
            level: currentEquipped.level,
            clockMhz: currentEquipped.clockMhz,
            capacityGb: currentEquipped.capacityGb,
            ddrGeneration: currentEquipped.ddrGeneration
          }));
        } else if (type === 'cooler') {
          const currentEquipped = { ...cooler };
          setCooler({
            level: partToEquip.level,
            coolingCapacity: partToEquip.coolingCapacity
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-cooler-${Math.random().toString(36).substring(2, 7)}`,
            type: 'cooler',
            level: currentEquipped.level,
            coolingCapacity: currentEquipped.coolingCapacity
          }));
        } else if (type === 'storage') {
          const currentEquipped = { ...storage };
          setStorage({
            type: partToEquip.storageType, // 장착 스키마는 'type'으로 HDD/SSD 보유
            capacityGb: partToEquip.capacityGb,
            level: partToEquip.level
          });
          setInventory(prev => prev.filter(p => p.id !== itemId).concat({
            id: `inv-storage-${Math.random().toString(36).substring(2, 7)}`,
            type: 'storage',
            level: currentEquipped.level,
            storageType: currentEquipped.type, // 복귀 시 장착 스키마 'type'을 storageType에 매치
            capacityGb: currentEquipped.capacityGb
          }));
        }

        setUpgradeStatus('success');
        setUpgradeMessage(`🔄 [장비 교체 장착] ${type.toUpperCase()} +${partToEquip.level}강 장비가 장착 완료되었습니다.`);
        setTimeout(() => {
          setUpgradeStatus(null);
          setUpgradeMessage('');
        }, 3000);
      };

      // ----------------------------------------------------------------------
      // 8. 상위 사냥터(게임) 다운로드 진행도 시뮬레이션
      // ----------------------------------------------------------------------
      const startDownload = () => {
        const check = OMG.validateDownloadStart(workParts, unlockedGameIndex, downloadTarget, isDownloading, minerals);
        if (!check.ok) {
          alert(check.reason);
          return;
        }
        if (check.mineralCost > 0) {
          setMinerals((prev) => prev - check.mineralCost);
        }
        setIsDownloading(true);
        setDownloadProgress(0);
      };

      useEffect(() => {
        if (!isDownloading) return;

        const interval = setInterval(() => {
          setDownloadProgress(prev => {
            const currentSize = (prev / 100) * downloadTarget.sizeMb;
            const nextSize = currentSize + (specs.downloadSpeedMb);
            
            if (nextSize >= downloadTarget.sizeMb) {
              clearInterval(interval);
              setIsDownloading(false);
              setUnlockedGameIndex(downloadTarget.gameIndex);
              const nextTarget = OMG.DOWNLOAD_TARGETS.find(t => t.gameIndex === downloadTarget.gameIndex + 1);
              if (nextTarget) {
                setDownloadTarget({
                  name: nextTarget.name,
                  sizeMb: nextTarget.sizeMb,
                  requiredGb: nextTarget.requiredGb,
                  mineralCost: nextTarget.mineralCost || 0,
                  gameIndex: nextTarget.gameIndex,
                });
              } else {
                setDownloadTarget(null);
              }
              return 100;
            }
            return (nextSize / downloadTarget.sizeMb) * 100;
          });
        }, Math.max(20, Math.round(OMG.calcGameSpeedTickMs(scaUpgrades, 100))));

        return () => clearInterval(interval);
      }, [isDownloading, specs.downloadSpeedMb, downloadTarget, gameSpeedMult]);

      // ----------------------------------------------------------------------
      // 9. 실시간 웹소켓 100층 레이드 방 연결 핸들러
      // ----------------------------------------------------------------------
      const joinRaidRoom = () => {
        setErrorMessage(null);
        setRewardMessage(null);
        setIsRaidOpen(true);

        const socketCon = io({
          reconnection: false
        });

        socketCon.on('connect', () => {
          console.log('[Socket] Connected to server.');
          socketCon.emit('joinRoom', {
            roomId: 'carry-room-100',
            userId: myId,
            nickname: nickname,
            parts: { cpu, gpu, ram, cooler, motherboard, storage }
          });
        });

        socketCon.on('room_state', (state) => {
          setRaidState(state);
        });

        socketCon.on('milestone_reward_claimed', (data) => {
          const { clearedFloor, txResult } = data;
          if (txResult.success) {
            setScaCoins(txResult.currentTotalCoins);
            setRewardMessage(`돌파 성공. ${clearedFloor}층 마일스톤 보상 SCA 코인 +${txResult.claimedCoins} 지급 완료.`);
            setTimeout(() => setRewardMessage(null), 4000);
          }
        });

        socketCon.on('error_message', (msg) => {
          setErrorMessage(msg);
        });

              </div>

              <div className="p-4 bg-slate-950/90 rounded border border-emerald-500/30 neon-border-emerald flex flex-col space-y-2.5">
                <div className="flex justify-between items-center border-b border-emerald-950 pb-2">
                  <span className="text-[10px] text-emerald-400 font-mono tracking-widest uppercase flex items-center space-x-1.5 font-bold">
                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                    <span>수입 로그</span>
                  </span>
                  <span className="text-[9px] text-emerald-600 font-mono">{isPartyHunting ? 'PARTY' : 'WORK'}</span>
                </div>
                <div className="h-36 overflow-y-auto font-mono text-[10px] text-emerald-400/90 space-y-1.5 select-text leading-relaxed">
                  {combatLogs.map((log, idx) => (
                    <div key={idx} className="transition-all duration-300 hover:text-emerald-300">{log}</div>
                  ))}
                </div>
              </div>
            </section>
          </main>

          {/* ================================================================== */}
          {/* 레이드 오버레이 모달 */}
          {/* ================================================================== */}
          {isRaidOpen && (
            <div className="fixed inset-0 bg-slate-950/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
              <div className="bg-slate-950 border border-cyan-500/30 rounded-2xl w-full max-w-4xl p-6 neon-border-cyan flex flex-col space-y-6 max-h-[90vh] overflow-y-auto">
                
                <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                  <div className="flex items-center space-x-3">
                    <span className="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-ping"></span>
                    <h2 className="text-lg font-bold text-cyan-400 uppercase tracking-widest font-mono">실시간 100층 보스 등반 레이드</h2>
                  </div>
                  <button 
                    onClick={leaveRaidRoom}
                    className="p-2 hover:bg-slate-900 border border-slate-800 hover:border-rose-500/40 rounded-lg text-slate-400 hover:text-rose-500 transition"
                  >
                    <span className="text-sm">❌</span>
                  </button>
                </div>

                {errorMessage && (
                  <div className="p-3.5 bg-rose-950/20 border border-rose-500/50 rounded-lg text-xs font-mono text-rose-400 animate-pulse">
                    ⚠️ 에러 감지: {errorMessage}
                  </div>
                )}

                {rewardMessage && (
                  <div className="p-4 bg-emerald-950/30 border border-emerald-400/50 rounded-lg text-center text-sm font-bold font-mono text-emerald-400 neon-border-emerald animate-bounce">
                    🎉 {rewardMessage}
                  </div>
                )}

                {raidState && raidState.status === 'waiting' && (
                  <div className="flex flex-col items-center justify-center py-10 space-y-6">
                    <p className="text-slate-400 font-mono text-center">
                      레이드 대기실에 진입했습니다. 버스 방 번호: <strong className="text-cyan-400">carry-room-100</strong><br />
                      모든 인원이 준비 완료 버튼을 누르면 실시간 100층 시뮬레이션 전투에 돌입합니다.
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 w-full">
                      {raidState.players.map((p) => {
                        const isMe = p.userId === myId;
                        return (
                          <div key={p.userId} className={`p-4 rounded-lg border ${isMe ? 'bg-cyan-950/10 border-cyan-500/40 neon-border-cyan' : 'bg-slate-900/40 border-slate-800'} flex flex-col justify-between items-center text-center space-y-3`}>
                            <div className="flex flex-col items-center">
                              <div className={`w-10 h-10 rounded-full flex items-center justify-center ${isMe ? 'bg-cyan-500/10 text-cyan-400' : 'bg-slate-800 text-slate-400'} border border-slate-700`}>
                                <span className="text-lg">👤</span>
                              </div>
                              <span className="text-xs font-bold text-slate-200 mt-2 truncate max-w-[120px]">{p.nickname} {isMe && '(나)'}</span>
                              <span className="text-[9px] text-slate-500 font-mono">DPS: {p.dpsContribution.toLocaleString()}</span>
                            </div>

                            <span className={`text-[10px] font-bold font-mono px-2 py-0.5 rounded ${p.isReady ? 'bg-emerald-950/40 text-emerald-400 border border-emerald-500/20' : 'bg-rose-950/40 text-rose-400 border border-rose-500/20'}`}>
                              {p.isReady ? '준비 완료' : '대기 중'}
                            </span>
                          </div>
                        );
                      })}

                      {Array.from({ length: 4 - raidState.players.length }).map((_, idx) => (
                        <div key={idx} className="p-4 bg-slate-950/20 border border-slate-900 border-dashed rounded-lg flex flex-col items-center justify-center text-center text-slate-700 min-h-[120px]">
                          <span className="text-lg text-slate-700">➕</span>
                          <span className="text-[9px] font-mono mt-1">대기 중...</span>
                        </div>
                      ))}
                    </div>

                    <button 
                      onClick={toggleReady}
                      className="px-8 py-3.5 bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition text-slate-950 font-bold rounded-lg font-mono text-sm shadow-lg shadow-emerald-500/20"
                    >
                      {raidState.players.find(p => p.userId === myId)?.isReady ? '준비 취소' : '레이드 준비 완료'}
                    </button>
                  </div>
                )}

                {raidState && (raidState.status === 'fighting' || raidState.status === 'won' || raidState.status === 'lost') && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    <div className="lg:col-span-2 flex flex-col space-y-6">
                      
                      <div className="bg-slate-950/80 border border-cyan-500/30 p-6 rounded-xl text-center neon-border-cyan flex flex-col items-center justify-center relative overflow-hidden">
                        <div className="absolute top-2 left-3 text-[9px] font-mono text-cyan-500/40 uppercase">LIVE COMPUTE COMBAT MONITOR</div>
                        
                        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500">BOSS RAID STAGE</div>
                        <div className="text-4xl font-extrabold text-cyan-300 font-mono tracking-wider mt-1.5">
                          FLOOR {raidState.currentFloor} <span className="text-lg text-slate-500">/ 100</span>
                        </div>
                        <div className="text-xs font-bold text-rose-400 font-mono mt-2 animate-pulse uppercase tracking-wider">
                          🎯 타겟 보스: {getRaidBossName(raidState.currentFloor)}
                        </div>

                        {raidState.status === 'won' ? (
                          <span className="mt-3 text-xs font-bold text-emerald-400 uppercase tracking-widest font-mono border border-emerald-500/30 bg-emerald-950/20 px-3 py-1 rounded">100층 완전 등반 성공</span>
                        ) : raidState.status === 'lost' ? (
                          <span className="mt-3 text-xs font-bold text-rose-400 uppercase tracking-widest font-mono border border-rose-500/30 bg-rose-950/20 px-3 py-1 rounded">시간 초과 패배</span>
                        ) : (
                          <span className="mt-3 text-xs font-bold text-cyan-400 uppercase tracking-widest font-mono border border-cyan-500/30 bg-cyan-950/20 px-3 py-1 rounded animate-pulse">전투 연산 진행 중</span>
                        )}
                      </div>

                      <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-xl space-y-3 flex flex-col">
                        <div className="flex justify-between items-center text-xs">
                          <span className="font-bold text-slate-300 uppercase tracking-wider font-mono flex items-center space-x-1">
                            <span className="text-rose-500 text-sm mr-1">💀</span>
                            <span>보스 개체 체력</span>
                          </span>
                          <span className="text-rose-400 font-mono font-bold">
                            {raidState.bossCurrentHp.toLocaleString()} / {raidState.bossMaxHp.toLocaleString()} ({Math.round((raidState.bossCurrentHp / raidState.bossMaxHp) * 100)}%)
                          </span>
                        </div>

                        <div className="w-full bg-slate-950 rounded-full h-5 overflow-hidden border border-slate-800 p-0.5">
                          <div 
                            className="bg-rose-500 h-full rounded-full transition-all duration-300 flex justify-end items-center pr-2 relative"
                            style={{ width: `${(raidState.bossCurrentHp / raidState.bossMaxHp) * 100}%` }}
                          >
                          </div>
                        </div>

                        <div className="flex justify-between items-center text-[10px] font-mono pt-1 text-slate-500">
                          <span>남은 타임아웃 제한 시간</span>
                          <span className={`font-bold ${raidState.timeLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-slate-400'}`}>{raidState.timeLeft} 초</span>
                        </div>
                        <div className="w-full bg-slate-950 rounded-full h-2 overflow-hidden border border-slate-800">
                          <div 
                            className={`h-full rounded-full transition-all duration-1000 ${raidState.timeLeft <= 10 ? 'bg-rose-500' : 'bg-slate-600'}`}
                            style={{ width: `${(raidState.timeLeft / 30) * 100}%` }}
                          ></div>
                        </div>
                      </div>
                    </div>

                    <div className="flex flex-col space-y-6">
                      
                      <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-xl flex flex-col space-y-4">
                        <h3 className="text-xs text-slate-400 font-bold uppercase tracking-widest border-b border-slate-800 pb-2 flex items-center space-x-1">
                          <span className="text-cyan-400 text-sm mr-1">📊</span>
                          <span>실시간 파티원 기여도</span>
                        </h3>

                        <div className="space-y-4">
                          {raidState.players.map((p) => {
                            const isMe = p.userId === myId;
                            const share = raidState.totalDps > 0 ? (p.dpsContribution / raidState.totalDps) * 100 : 0;
                            return (
                              <div key={p.userId} className="space-y-1">
                                <div className="flex justify-between text-xs font-mono">
                                  <span className={`truncate max-w-[140px] ${isMe ? 'text-cyan-300 font-bold' : 'text-slate-300'}`}>
                                    {p.nickname} {isMe && '(나)'} {p.isDead && '(⚠️사망)'}
                                  </span>
                                  <span className="text-slate-500 font-bold">{p.dpsContribution.toLocaleString()} DPS</span>
                                </div>
                                
                                <div className="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-900">
                                  <div 
                                    className={`h-full rounded-full transition-all duration-300 ${p.isDead ? 'bg-rose-500' : isMe ? 'bg-cyan-400' : 'bg-slate-700'}`}
                                    style={{ width: `${p.isDead ? 100 : share}%` }}
                                  ></div>
                                </div>
                                <div className="flex justify-between text-[9px] font-mono text-slate-500">
                                  <span>{p.isDead ? 'DDR에러 유닛 파괴됨' : `지분: ${Math.round(share)}%`}</span>
                                  {p.currentHp !== undefined && (
                                    <span>HP: {p.currentHp} / {p.maxHp}</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        <div className="pt-3 border-t border-slate-800 flex justify-between items-center text-xs font-mono">
                          <span className="text-slate-500">파티 합산 누적 DPS:</span>
                          <span className="text-cyan-400 font-bold">{raidState.totalDps.toLocaleString()}</span>
                        </div>
                      </div>

                      <div className="bg-slate-900/40 border border-slate-800 p-5 rounded-xl flex flex-col space-y-3 font-mono">
                        <h3 className="text-xs text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-2 flex items-center space-x-1">
                          <span className="text-cyan-300 text-sm mr-1">🏆</span>
                          <span>오늘 남은 보상 구간</span>
                        </h3>
                        <div className="flex flex-col space-y-2 text-xs">
                          <div className="flex justify-between">
                            <span className="text-slate-500">수령 가능 마일스톤:</span>
                            <span className="text-cyan-300 font-bold">10층 ~ 100층 (10층단위)</span>
                          </div>
                          <div className="flex justify-between text-[11px] text-slate-400">
                            <span>오늘 남은 보상 층수:</span>
                            <span className="text-emerald-400 font-bold">
                              {raidState.currentFloor <= 100 ? `${Math.ceil(raidState.currentFloor / 10) * 10}층 ~ 100층` : '모든 구간 수령 완료'}
                            </span>
                          </div>
                          <p className="text-[9px] text-slate-500 mt-2 border-t border-slate-900 pt-2 leading-relaxed">
                            * 보상은 하루에 단 한 번, 날짜가 바뀌면 수령 완료 최고 층수가 0으로 리셋되며 다시 처음부터 순차로 차분 획득 가능합니다.
                          </p>
                        </div>
                      </div>

                    </div>

                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
